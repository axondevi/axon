      function calculateExpr(expr) {
        const e = String(expr).trim();
        // Only allow digits, whitespace, basic math ops, parens, dot, comma, %, and 'e'/'E' for scientific notation
        if (!/^[-+*/().,%\d\seE]+$/.test(e)) {
          throw new Error('Expression has disallowed characters. Only numbers and + - * / % ( ) are allowed.');
        }
        try {
          const val = Function('"use strict"; return (' + e.replace(/,/g, '.') + ')')();
          if (typeof val !== 'number' || !isFinite(val)) throw new Error('Not a finite number');
          return { expression: expr, value: val };
        } catch (err) {
          throw new Error('Invalid math: ' + err.message);
        }
      }

      function getDatetimeInfo(timezone) {
        const now = new Date();
        const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        try {
          const fmt = new Intl.DateTimeFormat('en-US', {
            timeZone: tz,
            dateStyle: 'full',
            timeStyle: 'long',
            hour12: false,
          });
          return {
            iso_utc: now.toISOString(),
            local: fmt.format(now),
            timezone: tz,
            timestamp_ms: now.getTime(),
            day_of_week: now.toLocaleDateString('en-US', { weekday: 'long', timeZone: tz }),
          };
        } catch (e) {
          throw new Error('Invalid timezone: "' + tz + '". Use IANA format like "America/Sao_Paulo".');
        }
      }

      // --- search_arxiv: arXiv returns Atom XML, so we parse client-side ---
      async function searchArxivTool(args) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const t0 = Date.now();
        const params = new URLSearchParams({
          search_query: args.query,
          max_results: String(args.max_results || 5),
          sortBy: 'relevance',
          sortOrder: 'descending',
        });
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), TOOL_TIMEOUT_MS);
        let res;
        try {
          res = await fetch(`${b}/v1/call/arxiv/search?${params.toString()}`, {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + k },
            signal: controller.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          const err = new Error('arxiv ' + res.status + ' ' + text.slice(0, 200));
          err.cost = cost; err.cache = cache; err.latency = latency; err.status = res.status;
          throw err;
        }
        const xml = await res.text();
        let entries = [];
        try {
          const doc = new DOMParser().parseFromString(xml, 'application/xml');
          if (doc.querySelector('parsererror')) throw new Error('xml parse error');
          entries = Array.from(doc.getElementsByTagName('entry')).map((e) => {
            const get = (sel) => {
              const node = e.getElementsByTagName(sel)[0];
              return node ? node.textContent.trim().replace(/\s+/g, ' ') : '';
            };
            const authors = Array.from(e.getElementsByTagName('author')).map((a) => {
              const n = a.getElementsByTagName('name')[0];
              return n ? n.textContent.trim() : '';
            }).filter(Boolean);
            let pdfUrl = '';
            for (const link of Array.from(e.getElementsByTagName('link'))) {
              if (link.getAttribute('type') === 'application/pdf') {
                pdfUrl = link.getAttribute('href') || '';
                break;
              }
            }
            return {
              title: get('title'),
              authors,
              published: get('published'),
              updated: get('updated'),
              summary: get('summary').slice(0, 800),
              arxiv_url: get('id'),
              pdf_url: pdfUrl,
            };
          });
        } catch (parseErr) {
          // Fall back: include raw XML head for the agent to interpret
          return {
            body: { error: 'xml-parse-failed', raw: xml.slice(0, 2000) },
            cost, cache, latency,
          };
        }
        return {
          body: { query: args.query, count: entries.length, entries },
          cost, cache, latency,
        };
      }

      // --- generate_image: Stability SDXL with placeholder system ---
      // Base64 images are huge (~2MB), so we never put the data URL in
      // the LLM message history. We store it under a short id and let
      // the agent reference it as @img:<id> which we expand at render.
      async function generateImageTool(args) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const t0 = Date.now();
        const textPrompts = [{ text: args.prompt, weight: 1 }];
        if (args.negative_prompt) {
          textPrompts.push({ text: args.negative_prompt, weight: -1 });
        }
        const body = {
          text_prompts: textPrompts,
          cfg_scale: 7,
          width: 1024,
          height: 1024,
          samples: 1,
          steps: 30,
        };
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 45000);
        let res;
        try {
          res = await fetch(b + '/v1/call/stability/generate-xl', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + k,
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify(body),
            signal: controller.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const err = new Error(errBody.message || errBody.detail || ('stability ' + res.status));
          err.cost = cost; err.cache = cache; err.latency = latency; err.status = res.status;
          throw err;
        }
        const data = await res.json();
        const artifact = (data.artifacts && data.artifacts[0]) || {};
        if (!artifact.base64) throw new Error('no image returned');
        const shortId = 'img' + Math.random().toString(36).slice(2, 10);
        const dataUrl = 'data:image/png;base64,' + artifact.base64;
        if (!agentSession.images) agentSession.images = {};
        agentSession.images[shortId] = dataUrl;
        addToGallery(shortId, dataUrl, args.prompt);
        return {
          body: {
            status: 'generated',
            ref: '@img:' + shortId,
            seed: artifact.seed,
            size: '1024x1024',
            note: 'Image shown to user. Reference it in your reply as ![short description](@img:' + shortId + ').'
          },
          cost,
          cache,
          latency: Date.now() - t0,
          _imageUrl: dataUrl,
        };
      }

      async function runJsSandbox(code) {
        const workerCode = [
          'self.fetch = undefined;',
          'self.XMLHttpRequest = undefined;',
          'self.importScripts = undefined;',
          'self.onmessage = async (e) => {',
          '  try {',
          '    const fn = new Function("return (async () => { " + e.data + "\\n })()");',
          '    const result = await fn();',
          '    let serialized;',
          '    try { serialized = JSON.stringify(result, null, 2); if (serialized === undefined) serialized = String(result); }',
          '    catch (_) { serialized = String(result); }',
          '    self.postMessage({ ok: true, result: serialized });',
          '  } catch (err) {',
          '    self.postMessage({ ok: false, error: err && err.message ? err.message : String(err) });',
          '  }',
          '};',
        ].join('\n');
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const worker = new Worker(url);
        return new Promise((resolve, reject) => {
          const timer = setTimeout(() => {
            worker.terminate(); URL.revokeObjectURL(url);
            reject(new Error('JS execution timeout (5s)'));
          }, 5000);
          worker.onmessage = (ev) => {
            clearTimeout(timer); URL.revokeObjectURL(url); worker.terminate();
            if (ev.data.ok) resolve({ code: code, result: ev.data.result });
            else reject(new Error(ev.data.error));
          };
          worker.onerror = (ev) => {
            clearTimeout(timer); URL.revokeObjectURL(url); worker.terminate();
            reject(new Error(ev.message || 'worker error'));
          };
          worker.postMessage(code);
        });
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      }

      // ============================================================
      // Persisted gallery — IndexedDB-backed, holds hundreds of images.
      // ============================================================
      // IDB lets us blow past the ~5-10MB localStorage cap (each image is
      // ~2MB base64, so localStorage capped us at 3-5 images). With IDB
      // we comfortably keep 50+ recent images and only evict for UI hygiene.
      const IDB_NAME = 'axon-gallery';
      const IDB_STORE = 'images';
      const IDB_VERSION = 1;
      const MAX_GALLERY = 50;          // soft cap, eviction kicks in past this
      const LEGACY_LS_KEY = 'axon.gallery.v1';

      // In-memory mirror so synchronous code paths (resetAgentSession) keep working
      const IMAGE_CACHE = new Map();   // id -> { id, dataUrl, prompt, createdAt }
      let _idbReady = null;            // Promise<IDBDatabase | null>

      function openImageDB() {
        if (_idbReady) return _idbReady;
        _idbReady = new Promise((resolve) => {
          if (typeof indexedDB === 'undefined') { resolve(null); return; }
          let req;
          try { req = indexedDB.open(IDB_NAME, IDB_VERSION); }
          catch { resolve(null); return; }
          req.onerror = () => resolve(null);
          req.onblocked = () => resolve(null);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(IDB_STORE)) {
              const s = db.createObjectStore(IDB_STORE, { keyPath: 'id' });
              s.createIndex('createdAt', 'createdAt');
            }
          };
          req.onsuccess = () => resolve(req.result);
        });
        return _idbReady;
      }

      async function idbPut(item) {
        const db = await openImageDB();
        if (!db) return false;
        return new Promise((resolve) => {
          try {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            tx.objectStore(IDB_STORE).put(item);
            tx.oncomplete = () => resolve(true);
            tx.onerror = () => resolve(false);
            tx.onabort = () => resolve(false);
          } catch { resolve(false); }
        });
      }

      async function idbGetAll() {
        const db = await openImageDB();
        if (!db) return [];
        return new Promise((resolve) => {
          try {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).getAll();
            req.onsuccess = () => {
              const items = (req.result || []).slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
              resolve(items);
            };
            req.onerror = () => resolve([]);
          } catch { resolve([]); }
        });
      }

      async function idbDelete(id) {
        const db = await openImageDB();
        if (!db) return;
        try {
          const tx = db.transaction(IDB_STORE, 'readwrite');
          tx.objectStore(IDB_STORE).delete(id);
        } catch {}
      }

      async function idbClear() {
        const db = await openImageDB();
        if (!db) return;
        try {
          const tx = db.transaction(IDB_STORE, 'readwrite');
          tx.objectStore(IDB_STORE).clear();
        } catch {}
      }

      // One-shot migration: copy any legacy localStorage items into IDB, then drop the key.
      async function migrateLegacyGallery() {
        let legacy;
        try {
          const raw = localStorage.getItem(LEGACY_LS_KEY);
          if (!raw) return;
          legacy = JSON.parse(raw);
        } catch { legacy = null; }
        if (!legacy || !Array.isArray(legacy.items)) {
          try { localStorage.removeItem(LEGACY_LS_KEY); } catch {}
          return;
        }
        for (const it of legacy.items) {
          if (it && it.id && it.dataUrl) await idbPut(it);
        }
        try { localStorage.removeItem(LEGACY_LS_KEY); } catch {}
      }

      // Build a tile element for an image and wire up its handlers
      function buildGalleryTile(id, dataUrl, prompt) {
        const tile = document.createElement('div');
        tile.className = 'gallery-tile';
        tile.dataset.id = id;
        tile.title = prompt || id;
        tile.innerHTML = `
          <img src="${dataUrl}" alt="${escapeHtml(prompt || '')}" />
          <button class="dl-btn" type="button" data-dl="${id}" title="Download">↓</button>
        `;
        tile.addEventListener('click', (e) => {
          if (e.target.closest('.dl-btn')) return;
          openLightbox(id);
        });
        tile.querySelector('.dl-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = `axon-${id}.png`;
          document.body.appendChild(a); a.click(); a.remove();
          showToast('Image downloaded', 'success');
        });
        return tile;
      }

      // Append a generated image to the strip and persist it. Persistence is async
      // (fire-and-forget) so callers stay synchronous; cache + DOM update immediately.
      function addToGallery(id, dataUrl, prompt, opts) {
        opts = opts || {};
        const strip = document.getElementById('gallery-strip');
        if (!strip) return;

        // Sync: cache + DOM
        const item = { id, dataUrl, prompt: prompt || '', createdAt: Date.now() };
        IMAGE_CACHE.set(id, item);
        if (!opts.skipPersist) {
          if (!agentSession) agentSession = { images: {} };
          if (!agentSession.images) agentSession.images = {};
          agentSession.images[id] = dataUrl;
        }
        strip.appendChild(buildGalleryTile(id, dataUrl, prompt));
        strip.hidden = false;
        strip.scrollTo({ left: strip.scrollWidth, behavior: 'smooth' });

        // Async: persist + evict if over soft cap
        if (!opts.skipPersist) {
          (async () => {
            await idbPut(item);
            if (IMAGE_CACHE.size > MAX_GALLERY) {
              const all = Array.from(IMAGE_CACHE.values()).sort((a, b) => a.createdAt - b.createdAt);
              const drop = all.slice(0, all.length - MAX_GALLERY);
              for (const d of drop) {
                IMAGE_CACHE.delete(d.id);
                await idbDelete(d.id);
                const tile = strip.querySelector(`.gallery-tile[data-id="${d.id}"]`);
                if (tile) tile.remove();
              }
            }
          })();
        }
      }

      async function restoreGallery() {
        await migrateLegacyGallery();
        const items = await idbGetAll();
        if (!items.length) return;
        IMAGE_CACHE.clear();
        for (const it of items) IMAGE_CACHE.set(it.id, it);
        // Re-attach to in-memory agent session so chat markdown can resolve @img:<id>
        if (agentSession) {
          if (!agentSession.images) agentSession.images = {};
          for (const it of items) agentSession.images[it.id] = it.dataUrl;
        }
        const strip = document.getElementById('gallery-strip');
        if (!strip) return;
        for (const it of items) {
          strip.appendChild(buildGalleryTile(it.id, it.dataUrl, it.prompt));
        }
        strip.hidden = false;
      }

      function clearGallery() {
        const strip = document.getElementById('gallery-strip');
        IMAGE_CACHE.clear();
        if (strip) {
          strip.querySelectorAll('.gallery-tile').forEach(t => t.remove());
          strip.hidden = true;
        }
        // Async wipe — fire-and-forget
        idbClear();
        try { localStorage.removeItem(LEGACY_LS_KEY); } catch {}
      }

      // Synchronous accessor so resetAgentSession can stitch images back to session
      function getCachedImages() {
        return Array.from(IMAGE_CACHE.values());
      }

      // ============================================================
      // Conversation persistence (localStorage). Survives F5; cleared
      // explicitly via the reset button. System prompt is NOT saved
      // — we always boot the user into the latest version of it.
      // ============================================================
      const CONVO_KEY = 'axon.convo.v1';
      const MAX_PERSISTED_MESSAGES = 100;
      let _saveConvoTimer = null;

      function saveConversation() {
        if (!agentSession || !Array.isArray(agentSession.messages)) return;
        // Drop the leading system message + any empty assistant placeholder
        const persistable = agentSession.messages
          .slice(1)
          .filter((m) => {
            if (m.role === 'assistant' && !m.content && !(m.tool_calls && m.tool_calls.length)) return false;
            return true;
          })
          .slice(-MAX_PERSISTED_MESSAGES);

        const payload = JSON.stringify({
          messages: persistable,
          spend: agentSession.spend || 0,
          cacheSaved: agentSession.cacheSaved || 0,
          updatedAt: Date.now(),
        });

        try {
          localStorage.setItem(CONVO_KEY, payload);
        } catch {
          // Quota exceeded — keep only the second half and retry
          try {
            const half = persistable.slice(Math.floor(persistable.length / 2));
            localStorage.setItem(CONVO_KEY, JSON.stringify({
              messages: half, spend: agentSession.spend || 0, cacheSaved: agentSession.cacheSaved || 0, updatedAt: Date.now(),
            }));
          } catch {
            try { localStorage.removeItem(CONVO_KEY); } catch {}
          }
        }
      }

      // Debounce: every push schedules at most one save per 500ms
      function scheduleSaveConversation() {
        if (_saveConvoTimer) clearTimeout(_saveConvoTimer);
        _saveConvoTimer = setTimeout(() => { _saveConvoTimer = null; saveConversation(); }, 500);
      }

      function loadConversation() {
        try {
          const raw = localStorage.getItem(CONVO_KEY);
          if (!raw) return null;
          const j = JSON.parse(raw);
          if (!j || !Array.isArray(j.messages)) return null;
          return j;
        } catch { return null; }
      }

      function clearConversation() {
        try { localStorage.removeItem(CONVO_KEY); } catch {}
      }

      // Toggle expand/collapse on a transaction row, fills detail panel on first open
      function toggleTxDetail(idx) {
        const row = document.getElementById('tx-row-' + idx);
        const detail = document.getElementById('tx-detail-' + idx);
        if (!row || !detail) return;
        const open = detail.style.display !== 'none';
        detail.style.display = open ? 'none' : 'table-row';
        row.classList.toggle('is-open', !open);
      }

      // Build the detail panel for one transaction — surfaces every field we have
      function renderTxDetail(t) {
        const rows = [];
        const created = new Date(t.created_at);
        const amount = Number(t.amount_usdc || 0);
        const sign = amount >= 0 ? '+' : '';
        rows.push(['Type', t.type || '—']);
        rows.push(['Amount', `${sign}${formatUsdc(t.amount_usdc)} USDC`]);
        rows.push(['When', `${created.toLocaleString()} (${relativeTime(t.created_at)})`]);
        rows.push(['Timestamp (UTC)', created.toISOString()]);

        if (t.api_slug) rows.push(['API', t.api_slug]);
        const endpoint = t.meta && t.meta.endpoint;
        if (endpoint) rows.push(['Endpoint', endpoint]);
        if (t.meta && typeof t.meta.cached === 'boolean') {
          rows.push(['Cache hit', t.meta.cached ? 'yes — 50% discount applied' : 'no — live upstream']);
        }
        if (t.meta && t.meta.upstream_status) rows.push(['Upstream HTTP status', String(t.meta.upstream_status)]);
        if (t.meta && t.meta.latency_ms !== undefined) rows.push(['Latency', `${t.meta.latency_ms} ms`]);
        if (t.meta && t.meta.markup_micro !== undefined) {
          rows.push(['Operator markup', `${formatUsdc(String(t.meta.markup_micro))} USDC`]);
        }
        if (t.meta && t.meta.upstream_micro !== undefined) {
          rows.push(['Upstream cost', `${formatUsdc(String(t.meta.upstream_micro))} USDC`]);
        }
        if (t.meta && t.meta.reason) rows.push(['Reason', String(t.meta.reason).replace(/_/g, ' ')]);
        if (t.meta && t.meta.event) rows.push(['Event', String(t.meta.event).replace(/_/g, ' ')]);
        if (t.meta && t.meta.error) rows.push(['Error', String(t.meta.error)]);
        if (t.meta && t.meta.fallback_used) rows.push(['Fallback used', String(t.meta.fallback_used)]);
        if (t.request_id) rows.push(['Request ID', t.request_id]);
        if (t.id) rows.push(['Transaction ID', t.id]);
        if (t.onchain_tx) rows.push(['On-chain tx', t.onchain_tx]);

        // Surface anything else in meta we didn't explicitly map
        if (t.meta && typeof t.meta === 'object') {
          const known = new Set(['endpoint','cached','upstream_status','latency_ms','markup_micro','upstream_micro','reason','event','error','fallback_used']);
          for (const [k, v] of Object.entries(t.meta)) {
            if (known.has(k) || v === null || v === undefined || v === '') continue;
            const display = (typeof v === 'object') ? JSON.stringify(v) : String(v);
            rows.push([k.replace(/_/g, ' '), display]);
          }
        }

        return `
          <div class="tx-detail-grid">
            ${rows.map(([k, v]) => `
              <div class="k">${escapeHtml(k)}</div>
              <div class="v mono">${escapeHtml(v)}</div>
            `).join('')}
          </div>
        `;
      }

      function resetAgentSession() {
        agentSession = {
          messages: [{ role: 'system', content: AGENT_SYSTEM_PROMPT }],
          events: [],
          images: {},
          spend: 0,
          cacheSaved: 0,
          running: false,
          abortController: null,
        };
        // Re-attach persisted images to the in-memory map so chat history
        // markdown that references @img:<id> can still resolve to data URLs
        for (const it of getCachedImages()) {
          agentSession.images[it.id] = it.dataUrl;
        }
        renderAgentChat();
        renderAgentBrain();
        renderAgentFooter();
      }

      function renderMarkdown(text) {
        // Resolve @img:<id> placeholders to actual data URLs stored in session
        let t = String(text);
        if (agentSession && agentSession.images) {
          t = t.replace(/@img:([a-zA-Z0-9]+)/g, (m, id) => agentSession.images[id] || m);
        }
        if (typeof window.marked === 'undefined') return escapeHtml(t);
        try {
          return window.marked.parse(t, { breaks: true, gfm: true });
        } catch (_) {
          return escapeHtml(t);
        }
      }

      function renderAgentChat() {
        const el = document.getElementById('agent-messages');
        if (!el) return;
        const visible = agentSession.messages.filter((m) =>
          (m.role === 'user' && m.content) ||
          (m.role === 'assistant' && m.content && typeof m.content === 'string')
        );
        const typingHtml = agentSession.running
          ? '<div class="msg msg-assistant typing-msg"><div class="msg-role" translate="no">agent</div><div class="msg-content"><div class="typing-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div></div>'
          : '';
        if (visible.length === 0 && !agentSession.running) {
          el.innerHTML = '<div class="empty" style="font-size:13px;padding:32px 8px;color:var(--text-muted);">Start a conversation — pick a template below or type freely.</div>';
          return;
        }
        el.innerHTML = visible.map((m) => {
          if (m.role === 'user') {
            return `
              <div class="msg msg-user">
                <div class="msg-role" translate="no">you</div>
                <div class="msg-content">${escapeHtml(m.content)}</div>
              </div>
            `;
          }
          // assistant — render markdown
          return `
            <div class="msg msg-assistant">
              <div class="msg-role" translate="no">agent</div>
              <div class="msg-content md">${renderMarkdown(m.content)}</div>
            </div>
          `;
        }).join('') + typingHtml;
        attachCodeCopyButtons(el);
        el.scrollTop = el.scrollHeight;

        // Sync run-button visual state with session.running
        const runBtn = document.getElementById('agent-run');
        if (runBtn) runBtn.classList.toggle('is-running', !!agentSession.running);
      }

      function renderAgentBrain() {
        const el = document.getElementById('brain-events');
        if (!el) return;
        if (agentSession.events.length === 0) {
          el.innerHTML = '<div class="empty" style="font-size:12px;padding:24px 8px;color:var(--text-muted);">Tool calls will stream here.</div>';
          return;
        }
        el.innerHTML = agentSession.events.map((e) => {
          const cls = e.status === 'pending' ? 'pending' : e.status === 'error' ? 'error' : 'done';
          const argsStr = JSON.stringify(e.args);
          const argsDisplay = argsStr.length > 100 ? argsStr.slice(0, 100) + '…' : argsStr;
          let stats = '';
          if (e.status === 'pending') {
            stats = '<span class="stat pending">running…</span>';
          } else if (e.status === 'error') {
            stats = `<span class="stat err">${escapeHtml((e.error || 'failed').slice(0, 60))}</span>`;
          } else {
            const costStr = (e.cost || 0).toFixed(6);
            let cacheCls = 'cache-miss';
            if (e.cache === 'hit') cacheCls = 'cache-hit';
            else if (e.cache === 'local') cacheCls = 'cache-local';
            const costOrLocal = e.cache === 'local' ? '<span class="stat cost">local</span>' : `<span class="stat cost">$${costStr}</span>`;
            stats = costOrLocal +
              `<span class="stat ${cacheCls}">${e.cache || 'miss'}</span>` +
              `<span class="stat latency">${e.latency || 0}ms</span>`;
          }
          const thumb = e.imageUrl
            ? `<img src="${e.imageUrl}" alt="generated" style="display:block;max-width:100%;margin-top:8px;border-radius:4px;" loading="lazy" />`
            : '';
          return `
            <div class="brain-event ${cls}">
              <div class="tool-name">${escapeHtml(e.tool)}</div>
              <div class="tool-args">${escapeHtml(argsDisplay)}</div>
              <div class="tool-stats">${stats}</div>
              ${thumb}
            </div>
          `;
        }).join('');
        el.scrollTop = el.scrollHeight;
      }

      function renderAgentFooter() {
        const el = document.getElementById('agent-footer');
        if (!el) return;
        const calls = agentSession.events.length;
        el.innerHTML = `
          <div translate="no">Calls <strong>${calls}</strong></div>
          <span class="divider">·</span>
          <div translate="no">Spent <strong>$${agentSession.spend.toFixed(4)}</strong></div>
          <span class="divider">·</span>
          <div translate="no">Cache saved <strong>$${agentSession.cacheSaved.toFixed(4)}</strong></div>
          <span class="divider">·</span>
          <div translate="no">Limit <strong>$${SOFT_CAP.toFixed(2)}</strong> / <strong>$${HARD_CAP.toFixed(2)}</strong></div>
        `;
      }

      function showFirstRunModal() {
        if (document.getElementById('agent-first-run')) return;
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'agent-first-run';
        modal.innerHTML = `
          <div class="modal-card">
            <h3>Chat with an agent</h3>
            <p>This chat runs on your Axon wallet. Each message costs about <strong>$0.001-$0.01</strong> depending on which tools the agent decides to call.</p>
            <p><strong>Safety caps:</strong></p>
            <ul>
              <li><strong>$${SOFT_CAP.toFixed(2)}</strong> soft cap per session — you confirm to continue past it</li>
              <li><strong>$${HARD_CAP.toFixed(2)}</strong> hard cap per session — stops automatically</li>
              <li>Max <strong>${MAX_TOOL_CALLS_PER_TURN} tool calls</strong> per message</li>
              <li>Page refresh resets the session</li>
            </ul>
            <p>Tools available: CNPJ lookup, CEP lookup, weather, web search, IP info, embeddings.</p>
            <div class="modal-actions">
              <button class="btn-m secondary" id="agent-first-run-cancel">Not now</button>
              <button class="btn-m primary" id="agent-first-run-ok">Got it</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('agent-first-run-ok').onclick = () => {
          localStorage.setItem(AGENT_CAP_ACK_KEY, '1');
          modal.remove();
          const ti = document.getElementById('agent-input');
          if (ti) ti.focus();
        };
        document.getElementById('agent-first-run-cancel').onclick = () => modal.remove();
      }

      // Sliding context window — keeps system prompt + most recent budget of
      // tokens, dropping older user/assistant/tool turns. Approx by chars/4
      // since we don't have a tokenizer in the browser. Tool/assistant pairs
      // are kept together so we don't orphan a tool result without its call.
      // Llama 3.3 70B context is 32K tokens; we cap at ~22K (~88K chars) of
      // history to leave headroom for tool definitions + completion.
      const CTX_CHAR_BUDGET = 88000;

      function trimContextWindow(messages) {
        if (!messages || messages.length <= 2) return messages;
        const sys = messages[0] && messages[0].role === 'system' ? messages[0] : null;
        const rest = sys ? messages.slice(1) : messages;
        const sysChars = sys ? (typeof sys.content === 'string' ? sys.content.length : 0) : 0;

        // Walk from the END backwards, including messages until budget exhausted.
        // If a tool message is included, its preceding assistant (with the
        // matching tool_call) must also be included — otherwise the API rejects.
        let charBudget = CTX_CHAR_BUDGET - sysChars;
        const keep = [];
        for (let i = rest.length - 1; i >= 0; i--) {
          const m = rest[i];
          const len = (typeof m.content === 'string' ? m.content.length : 0) +
            (m.tool_calls ? JSON.stringify(m.tool_calls).length : 0);
          if (len > charBudget && keep.length > 0) break;
          keep.push(m);
          charBudget -= len;
        }
        keep.reverse();

        // Sanity: drop any leading tool message whose tool_call isn't in keep
        const callIdsInKeep = new Set();
        for (const m of keep) {
          if (m.role === 'assistant' && Array.isArray(m.tool_calls)) {
            for (const tc of m.tool_calls) callIdsInKeep.add(tc.id);
          }
        }
        const cleaned = keep.filter((m) => {
          if (m.role !== 'tool') return true;
          return callIdsInKeep.has(m.tool_call_id);
        });

        return sys ? [sys, ...cleaned] : cleaned;
      }

      // Streaming chat completion against Groq via Axon. Calls onPartial each time
      // the accumulated message changes so the UI can render text + tool calls
      // as they arrive. Returns the same shape as the old non-streaming version
      // so the rest of the agent loop is unchanged.
      async function callGroq(messages, tools, signal, onPartial) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const res = await fetch(b + '/v1/call/groq/chat', {
          method: 'POST',
          signal,
          headers: {
            'Authorization': 'Bearer ' + k,
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            model: AGENT_MODEL,
            messages,
            tools,
            tool_choice: 'auto',
            max_tokens: 4096,
            temperature: 0.3,
            stream: true,
          }),
        });
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          // On error the body is JSON, not SSE
          const text = await res.text().catch(() => '');
          let parsed = null; try { parsed = JSON.parse(text); } catch {}
          // Groq nests messages under .error.{message,code,type}; gateway sometimes uses .message
          let msg = '';
          if (parsed) {
            if (typeof parsed.message === 'string') msg = parsed.message;
            else if (parsed.error && typeof parsed.error.message === 'string') msg = parsed.error.message;
            else if (typeof parsed.error === 'string') msg = parsed.error;
            else if (parsed.error && typeof parsed.error === 'object') {
              try { msg = JSON.stringify(parsed.error); } catch { msg = ''; }
            }
          }
          if (!msg) msg = text.slice(0, 300) || `groq/chat ${res.status}`;
          const err = new Error(msg);
          err.status = res.status; err.cost = cost; err.cache = cache; err.latency = latency;
          err.code = parsed && (parsed.code || (parsed.error && parsed.error.code)) || null;
          // surface failed_generation if present (helps debug Llama tool_use_failed)
          if (parsed && parsed.failed_generation) err.failedGeneration = parsed.failed_generation;
          throw err;
        }

        const message = { role: 'assistant', content: '' };
        const tcsByIdx = {};
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        const emitPartial = () => {
          if (!onPartial) return;
          const indices = Object.keys(tcsByIdx).map(Number).sort((a, b) => a - b);
          const tcs = indices.map(i => tcsByIdx[i]);
          // Provide a snapshot — caller may render synchronously
          onPartial({
            content: message.content,
            tool_calls: tcs.length ? tcs : undefined,
          });
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nlIdx;
          while ((nlIdx = buf.indexOf('\n\n')) !== -1) {
            const event = buf.slice(0, nlIdx);
            buf = buf.slice(nlIdx + 2);
            if (!event.trim()) continue;
            for (const line of event.split('\n')) {
              if (!line.startsWith('data:')) continue;
              const data = line.slice(5).trim();
              if (!data || data === '[DONE]') continue;
              let j;
              try { j = JSON.parse(data); } catch { continue; }
              const choice = j.choices && j.choices[0];
              if (!choice) continue;
              const delta = choice.delta || {};
              if (typeof delta.content === 'string' && delta.content) {
                message.content += delta.content;
              }
              if (Array.isArray(delta.tool_calls)) {
                for (const dtc of delta.tool_calls) {
                  const idx = dtc.index;
                  if (idx == null) continue;
                  if (!tcsByIdx[idx]) {
                    tcsByIdx[idx] = { id: dtc.id || '', type: 'function', function: { name: '', arguments: '' } };
                  }
                  const acc = tcsByIdx[idx];
                  if (dtc.id) acc.id = dtc.id;
                  if (dtc.function) {
                    if (dtc.function.name) acc.function.name = dtc.function.name;
                    if (typeof dtc.function.arguments === 'string') acc.function.arguments += dtc.function.arguments;
                  }
                }
              }
            }
            emitPartial();
          }
        }

        // Finalize tool_calls in index order
        const indices = Object.keys(tcsByIdx).map(Number).sort((a, b) => a - b);
        const finalTcs = indices.map(i => tcsByIdx[i]);
        if (finalTcs.length) message.tool_calls = finalTcs;
        if (!message.content) delete message.content;

        return { body: { choices: [{ message }] }, cost, cache, latency };
      }

      async function executeTool(name, args) {
        const tool = AGENT_TOOLS.find((t) => t.function.name === name);
        if (!tool) throw new Error('Unknown tool: ' + name);

        // Local tools run in the browser — no Axon cost, no network
        if (tool._local) {
          const t0 = Date.now();
          try {
            const body = await Promise.resolve(tool._local(args));
            return { body, cost: 0, cache: 'local', latency: Date.now() - t0 };
          } catch (err) {
            err.cost = 0;
            err.cache = 'local';
            err.latency = Date.now() - t0;
            err.status = 'local-error';
            throw err;
          }
        }

        // Custom tools handle their own dispatch (possibly multi-step).
        // They must return { body, cost, cache, latency, [_imageUrl] }.
        if (tool._custom) {
          return await tool._custom(args);
        }

        const { api, endpoint, method, paramStyle, paramMap } = tool._axon;
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const params = paramMap(args);
        let url = `${b}/v1/call/${api}/${endpoint}`;
        const init = { method, headers: { 'Authorization': 'Bearer ' + k } };
        if (paramStyle === 'query') {
          const qs = new URLSearchParams();
          for (const [kk, vv] of Object.entries(params)) {
            if (vv !== undefined && vv !== null) qs.set(kk, String(vv));
          }
          url += '?' + qs.toString();
        } else {
          init.headers['content-type'] = 'application/json';
          init.body = JSON.stringify(params);
        }
        const controller = new AbortController();
        init.signal = controller.signal;
        const timer = setTimeout(() => controller.abort(), TOOL_TIMEOUT_MS);
        let res;
        try {
          res = await fetch(url, init);
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const err = new Error(errBody.message || `${api}/${endpoint} ${res.status}`);
          err.status = res.status; err.cost = cost; err.cache = cache; err.latency = latency;
          throw err;
        }
        const body = await res.json();
        return { body, cost, cache, latency };
      }

      async function runAgentTurn(userText) {
        if (agentSession.running) return;

        if (agentSession.spend >= HARD_CAP) {
          alert('Session hard cap of $' + HARD_CAP.toFixed(2) + ' reached. Click Reset session to start over.');
          return;
        }
        if (agentSession.spend >= SOFT_CAP) {
          const ok = confirm(`This session has already spent $${agentSession.spend.toFixed(4)}. Continue? (Hard cap $${HARD_CAP.toFixed(2)})`);
          if (!ok) return;
        }

        agentSession.running = true;
        agentSession.abortController = new AbortController();
        const runBtn = document.getElementById('agent-run');
        const stopBtn = document.getElementById('agent-stop');
        if (runBtn) { runBtn.disabled = true; runBtn.textContent = 'Running…'; }
        if (stopBtn) stopBtn.hidden = false;

        agentSession.messages.push({ role: 'user', content: userText });
        scheduleSaveConversation();
        renderAgentChat();

        try {
          for (let iter = 0; iter < MAX_TOOL_CALLS_PER_TURN; iter++) {
            // Live placeholder — updated character-by-character as the stream arrives.
            // Sits in the messages array so renderAgentChat naturally picks it up.
            const streamingMsg = { role: 'assistant', content: '' };
            agentSession.messages.push(streamingMsg);

            // rAF coalescing — re-render on next animation frame instead of every chunk
            let scheduled = false;
            const scheduleRender = () => {
              if (scheduled) return;
              scheduled = true;
              requestAnimationFrame(() => { scheduled = false; renderAgentChat(); });
            };

            // Sliding context window — keep system prompt + last MAX_CTX msgs.
            // Llama 3.3 70B has 32K context; with persisted convos + tool results
            // it's easy to overflow. Drop oldest non-system messages when too long.
            const trimmed = trimContextWindow(agentSession.messages.slice(0, -1));

            const { body, cost } = await callGroq(
              trimmed,
              AGENT_TOOLS,
              agentSession.abortController.signal,
              (partial) => {
                if (typeof partial.content === 'string') streamingMsg.content = partial.content;
                if (partial.tool_calls) streamingMsg.tool_calls = partial.tool_calls;
                else delete streamingMsg.tool_calls;
                scheduleRender();
              },
            );
            agentSession.spend += cost;
            renderAgentFooter();

            const choice = body.choices && body.choices[0];
            if (!choice) throw new Error('No response from model');
            const msg = choice.message || {};
            // Replace placeholder with the canonical message
            agentSession.messages[agentSession.messages.length - 1] = msg;

            const toolCalls = msg.tool_calls || [];
            if (toolCalls.length === 0) {
              renderAgentChat();
              break;
            }

            for (const tc of toolCalls) {
              let argsObj;
              try { argsObj = JSON.parse(tc.function.arguments || '{}'); }
              catch (_) { argsObj = {}; }
              const ev = { id: tc.id, tool: tc.function.name, args: argsObj, status: 'pending' };
              agentSession.events.push(ev);
              renderAgentBrain();

              try {
                const out = await executeTool(tc.function.name, argsObj);
                ev.status = 'done';
                ev.cost = out.cost; ev.cache = out.cache; ev.latency = out.latency;
                ev.result = out.body;
                if (out._imageUrl) ev.imageUrl = out._imageUrl;
                agentSession.spend += out.cost;
                if (out.cache === 'hit') {
                  // User paid 50% of live price; savings ≈ cost (they'd have paid ~2x without cache)
                  agentSession.cacheSaved += out.cost;
                }
                agentSession.messages.push({
                  role: 'tool',
                  tool_call_id: tc.id,
                  content: JSON.stringify(out.body).slice(0, 8000),
                });
              } catch (err) {
                ev.status = 'error';
                ev.error = err.message;
                ev.cost = err.cost || 0; ev.latency = err.latency || 0;
                agentSession.spend += (err.cost || 0);
                agentSession.messages.push({
                  role: 'tool',
                  tool_call_id: tc.id,
                  content: JSON.stringify({ error: err.message, status: err.status }),
                });
              }
              renderAgentBrain();
              renderAgentFooter();

              if (agentSession.spend >= HARD_CAP) {
                agentSession.messages.push({ role: 'assistant', content: '(hard cap reached mid-turn — stopping)' });
                renderAgentChat();
                return;
              }
            }
          }
        } catch (err) {
          if (err.name === 'AbortError') {
            agentSession.messages.push({ role: 'assistant', content: '(interrupted)' });
          } else {
            // Friendlier message for the most common cases
            let display = err.message || String(err);
            if (err.code === 'context_length_exceeded' || /context.*length|too\s*large|tokens/i.test(display)) {
              display = 'Context window exceeded. Click reset to start a fresh conversation.';
            }
            agentSession.messages.push({ role: 'assistant', content: '(error: ' + display + ')' });
            showToast(display, 'error');
          }
          // Drop the placeholder message that never got filled
          const last = agentSession.messages[agentSession.messages.length - 2];
          if (last && last.role === 'assistant' && !last.content && !last.tool_calls) {
            agentSession.messages.splice(agentSession.messages.length - 2, 1);
          }
        } finally {
          agentSession.running = false;
          agentSession.abortController = null;
          if (runBtn) { runBtn.disabled = false; runBtn.textContent = 'Run'; }
          if (stopBtn) stopBtn.hidden = true;
          // Re-render AFTER running=false so the typing indicator goes away
          renderAgentChat();
          // Persist final state of the turn (debounced will fire ~500ms later)
          scheduleSaveConversation();
          // Also flush immediately so a fast page-close still keeps the turn
          if (_saveConvoTimer) { clearTimeout(_saveConvoTimer); _saveConvoTimer = null; saveConversation(); }
        }
      }

      async function initAgentChat() {
        if (localStorage.getItem(AGENT_CAP_ACK_KEY) !== '1') {
          showFirstRunModal();
        }
        resetAgentSession();
        // Wait for image cache to populate so persisted @img:<id> refs in chat
        // history resolve to data URLs on first render
        await restoreGallery();
        // Re-attach images to current session in case they came in after reset
        for (const it of getCachedImages()) {
          agentSession.images[it.id] = it.dataUrl;
        }
        // Restore prior conversation if any
        const saved = loadConversation();
        if (saved && saved.messages && saved.messages.length) {
          agentSession.messages = [agentSession.messages[0], ...saved.messages];
          agentSession.spend = Number(saved.spend) || 0;
          agentSession.cacheSaved = Number(saved.cacheSaved) || 0;
          renderAgentChat();
          renderAgentFooter();
          showToast(`${saved.messages.filter(m => m.role !== 'tool').length} messages restored`, 'info');
        }

        document.getElementById('agent-run').onclick = () => {
          const input = document.getElementById('agent-input');
          const text = input.value.trim();
          if (!text) return;
          input.value = '';
          runAgentTurn(text);
        };
        document.getElementById('agent-stop').onclick = () => {
          if (agentSession.abortController) agentSession.abortController.abort();
        };
        document.getElementById('agent-reset').onclick = () => {
          if (agentSession.running && agentSession.abortController) {
            agentSession.abortController.abort();
          }
          clearGallery();
          clearConversation();
          resetAgentSession();
          showToast('Session reset', 'info');
        };
        const input = document.getElementById('agent-input');
        if (input) {
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
              e.preventDefault();
              document.getElementById('agent-run').click();
            }
          });
        }
        // Quick-start chips: pre-fill textarea with template and focus
        document.querySelectorAll('#quick-chips .chip').forEach((chip) => {
          chip.addEventListener('click', () => {
            if (!input) return;
            const tpl = chip.getAttribute('data-tpl') || '';
            input.value = tpl;
            input.focus();
            // Move cursor to end
            input.setSelectionRange(input.value.length, input.value.length);
          });
        });
      }

      // ==========================================================
      // Lightbox + toast bootstrap (idempotent)
      // ==========================================================
      function ensureLightbox() {
        if (document.getElementById('lightbox')) return;
        const lb = document.createElement('div');
        lb.id = 'lightbox';
        lb.className = 'lightbox';
        lb.innerHTML = `
          <button class="lightbox-close" aria-label="Close">×</button>
          <img alt="" />
          <div class="lightbox-meta">
            <span class="lb-prompt"></span>
            <button class="lb-action" data-act="download">Download</button>
            <button class="lb-action" data-act="copy">Copy URL</button>
          </div>
        `;
        document.body.appendChild(lb);

        const close = () => { lb.dataset.open = '0'; lb.removeAttribute('data-current-id'); };
        lb.addEventListener('click', (e) => {
          if (e.target === lb || e.target.classList.contains('lightbox-close')) close();
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && lb.dataset.open === '1') close();
        });
        lb.querySelector('[data-act="download"]').addEventListener('click', (e) => {
          e.stopPropagation();
          const id = lb.dataset.currentId;
          const item = id && IMAGE_CACHE.get(id);
          if (!item) return;
          const a = document.createElement('a');
          a.href = item.dataUrl; a.download = `axon-${id}.png`;
          document.body.appendChild(a); a.click(); a.remove();
          showToast('Image downloaded', 'success');
        });
        lb.querySelector('[data-act="copy"]').addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = lb.dataset.currentId;
          const item = id && IMAGE_CACHE.get(id);
          if (!item) return;
          try {
            const blob = await fetch(item.dataUrl).then(r => r.blob());
            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
            showToast('Image copied to clipboard', 'success');
          } catch {
            showToast('Could not copy — your browser may block this', 'error');
          }
        });
      }

      function openLightbox(id) {
        ensureLightbox();
        const lb = document.getElementById('lightbox');
        const item = IMAGE_CACHE.get(id);
        if (!item) return;
        lb.querySelector('img').src = item.dataUrl;
        lb.querySelector('img').alt = item.prompt || '';
        lb.querySelector('.lb-prompt').textContent = item.prompt || '(no prompt recorded)';
        lb.dataset.currentId = id;
        lb.dataset.open = '1';
      }

      function ensureToastContainer() {
        let c = document.getElementById('toast-container');
        if (!c) {
          c = document.createElement('div');
          c.id = 'toast-container';
          c.className = 'toast-container';
          document.body.appendChild(c);
        }
        return c;
      }

      function showToast(message, kind) {
        const c = ensureToastContainer();
        const t = document.createElement('div');
        t.className = 'toast ' + (kind || 'info');
        t.textContent = message;
        c.appendChild(t);
        setTimeout(() => {
          t.classList.add('leaving');
          t.addEventListener('animationend', () => t.remove(), { once: true });
        }, 2400);
      }

      // Wire copy buttons onto every <pre><code> rendered by markdown.
      // Idempotent — skips blocks that already have a button.
      function attachCodeCopyButtons(root) {
        root = root || document;
        root.querySelectorAll('.md pre').forEach((pre) => {
          if (pre.querySelector('.code-copy')) return;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'code-copy';
          btn.textContent = 'copy';
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const text = pre.querySelector('code') ? pre.querySelector('code').innerText : pre.innerText;
            try {
              await navigator.clipboard.writeText(text);
              btn.textContent = 'copied';
              btn.classList.add('ok');
              setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('ok'); }, 1200);
            } catch {
              showToast('Copy failed', 'error');
            }
          });
          pre.appendChild(btn);
        });
      }

        pixState = { step: 'form', pixId: null, pollTimer: null };
        const overlay = document.createElement('div');
        overlay.id = 'pix-modal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = '<div id="pix-modal-body" style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:520px;width:100%;max-height:92vh;overflow-y:auto;"></div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closePixModal(); });
        renderPixStep();
      };

      function closePixModal() {
        if (pixState.pollTimer) clearInterval(pixState.pollTimer);
        pixState = { step: 'form', pixId: null, pollTimer: null };
        const m = document.getElementById('pix-modal');
        if (m) m.remove();
      }

        `;

          body.innerHTML = `

              </label>

                ${[20, 50, 100, 200, 500, 1000].map(v => `<button type="button" onclick="document.getElementById('pix-amount').value=${v};updatePixEquiv()" style="background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:6px 8px;border-radius:5px;font-size:12px;cursor:pointer;">R$${v}</button>`).join('')}
              </div>
              <div id="pix-error" style="display:none;background:rgba(255,95,87,0.1);border:1px solid rgba(255,95,87,0.3);color:#ff5f57;padding:10px;border-radius:6px;font-size:12px;"></div>

                <button type="submit" style="background:var(--accent);color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">Gerar Pix →</button>
              </div>
            </form>
          `;
          document.getElementById('pix-form').addEventListener('submit', handlePixSubmit);
          document.getElementById('pix-amount').addEventListener('input', updatePixEquiv);
          updatePixEquiv();
        }

        if (pixState.step === 'generating') {
          body.innerHTML = `
            ${header('Gerando Pix…', 'Conectando ao MercadoPago.')}
            <div style="display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:16px;">
              <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
              <div style="color:var(--text-muted);font-size:13px;">Geralmente 3-5 segundos…</div>
            </div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          `;
        }

        if (pixState.step === 'qr') {
          const { qrBase64, qrCode, amountBrl, estUsdc, expiresAt } = pixState.pixData || {};
          const expIso = expiresAt ? new Date(expiresAt) : null;
          const expStr = expIso ? expIso.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '—';
          body.innerHTML = `
            ${header('Pague R$' + Number(amountBrl).toFixed(2) + ' por Pix', `Expira às ${expStr} · Você receberá ≈ $${Number(estUsdc).toFixed(2)} USDC ao confirmar`)}
            ${qrBase64 ? `<img alt="QR Code Pix" src="data:image/png;base64,${qrBase64}" style="width:240px;height:240px;background:white;border-radius:8px;padding:8px;display:block;margin:0 auto;">` : ''}
            <div style="margin-top:18px;">
              <div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Ou cole no banco:</div>
              <div style="display:flex;gap:6px;">
                <input id="pix-copy" readonly value="${escapeAttr(qrCode || '')}" style="background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:8px 10px;border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;flex:1;">
                <button onclick="(function(b){navigator.clipboard.writeText(document.getElementById('pix-copy').value);b.textContent='✓ copiado';setTimeout(()=>b.textContent='Copiar',1500);})(this)" style="background:var(--accent);color:white;border:none;padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;">Copiar</button>
              </div>
            </div>
            <div id="pix-poll-status" style="margin-top:18px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-muted);font-size:12px;">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--warn);box-shadow:0 0 6px var(--warn);"></div>
              <span>Aguardando confirmação… <span id="pix-poll-counter">0s</span></span>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:14px;">
              <button onclick="closePixModal()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;">Fechar</button>
            </div>
          `;
          startPixPolling();
        }

        if (pixState.step === 'success') {
          const { amountBrl, amountUsdc } = pixState.pixData || {};
          body.innerHTML = `
            ${header('✅ Pagamento confirmado!', `R$${Number(amountBrl).toFixed(2)} convertidos em ${Number(amountUsdc).toFixed(6)} USDC.`)}
            <div style="display:flex;flex-direction:column;align-items:center;padding:32px 0;gap:14px;">
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(74,222,128,0.15);display:flex;align-items:center;justify-content:center;font-size:32px;">✓</div>
              <div style="color:var(--text);font-size:14px;text-align:center;line-height:1.5;">
                Saldo já creditado.<br/>Atualize o painel pra ver o novo total.
              </div>
            </div>
            <div style="display:flex;justify-content:center;margin-top:8px;">
              <button onclick="closePixModal(); renderApp();" style="background:var(--accent);color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">Atualizar painel →</button>
            </div>
          `;
        }
      }

      function updatePixEquiv() {
        const v = parseFloat(document.getElementById('pix-amount')?.value || '0');
        const fx = 5.4;  // mirrors backend default; webhook computes authoritative value
        const usd = v / fx;
        const el = document.getElementById('pix-equiv');
        if (el) el.innerHTML = `≈ <strong style="color:var(--text-dim);">$${usd.toFixed(2)} USDC</strong> (cotação ao confirmar)`;
      }

      async function handlePixSubmit(e) {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('pix-amount').value);
        if (!Number.isFinite(amount) || amount < 5 || amount > 5000) {
          showPixError('Valor entre R$5 e R$5000.');
          return;
        }
        pixState.step = 'generating';
        renderPixStep();
        try {
          const r = await api('/v1/checkout/pix', {
            method: 'POST',
            body: JSON.stringify({ amount_brl: amount }),
          });
          pixState.pixId = r.id;
          pixState.pixData = {
            qrBase64: r.qr_code_base64,
            qrCode: r.qr_code,
            amountBrl: r.amount_brl,
            estUsdc: r.estimated_credit_usdc,
            expiresAt: r.expires_at,
          };
          pixState.step = 'qr';
          renderPixStep();
        } catch (err) {
          pixState.step = 'form';
          renderPixStep();
          setTimeout(() => showPixError('Falhou: ' + (err.message || err)), 30);
        }
      }

      function showPixError(msg) {
        const box = document.getElementById('pix-error');
        if (!box) return;
        box.textContent = msg;
        box.style.display = 'block';
      }

      function startPixPolling() {
        if (pixState.pollTimer) clearInterval(pixState.pollTimer);
        let elapsed = 0;
        const intervalMs = 3000;
        const maxElapsed = 30 * 60; // 30 min — matches Pix expiration
        pixState.pollTimer = setInterval(async () => {
          elapsed += intervalMs / 1000;
          const counter = document.getElementById('pix-poll-counter');
          if (counter) counter.textContent = `${Math.floor(elapsed)}s`;
          if (elapsed >= maxElapsed) {
            clearInterval(pixState.pollTimer);
            pixState.pollTimer = null;
            const status = document.getElementById('pix-poll-status');
            if (status) status.innerHTML = '<span style="color:var(--warn);">⏱ Pix expirou. Gere um novo.</span>';
            return;
          }
          try {
            const r = await api(`/v1/checkout/pix/${pixState.pixId}`);
            if (r.status === 'approved') {
              clearInterval(pixState.pollTimer);
              pixState.pollTimer = null;
              pixState.pixData = { ...pixState.pixData, amountUsdc: r.amount_usdc };
              pixState.step = 'success';
              renderPixStep();
            } else if (['rejected', 'cancelled', 'expired'].includes(r.status)) {
              clearInterval(pixState.pollTimer);
              pixState.pollTimer = null;
              const s = document.getElementById('pix-poll-status');
              if (s) s.innerHTML = `<span style="color:#ff5f57;">⚠ Pagamento ${r.status}. Feche e tente novamente.</span>`;
            }
          } catch (_) { /* network blip */ }
        }, intervalMs);
      }

      // ==========================================================

      const key = localStorage.getItem(STORAGE_KEY);
      if (key) renderApp();
      else renderLogin();

      // Re-translate the dashboard's heavy dynamic content (next-action
      // hero, agent cards, transactions table) when language flips.
      // The render functions don't need to know about i18n — they just
      // emit data-pt/data-en attributes, and apply() walks them.
      document.addEventListener('axon:langchanged', function () {
        if (window.AxonI18n) window.AxonI18n.apply();
      });
    </script>

    <link rel="stylesheet" href="/_i18n.css" />
    <script src="/_i18n.js" defer></script>
  </body>
</html>
