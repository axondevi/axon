<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axon · Painel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/_ui-kit.css" />
    <script src="/_ui-kit.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
    <style>
      :root {
        --bg: #0a0a0b;
        --bg-elev: #111114;
        --bg-card: #16161a;
        --border: #25252b;
        --text: #eeeef0;
        --text-dim: #9a9aa4;
        --text-muted: #6a6a76;
        --accent: #7c5cff;
        --accent-2: #19d5c6;
        --danger: #ff5f57;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .container { max-width: 1120px; margin: 0 auto; padding: 32px 24px; }
      header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,11,0.8);
        backdrop-filter: blur(10px);
        position: sticky; top: 0; z-index: 10;
      }
      .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
      .logo-dot { width: 12px; height: 12px; border-radius: 50%;
        background: linear-gradient(135deg, #7c5cff, #19d5c6);
      }
      .key-chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--bg-card);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }
      .key-chip button {
        background: none; border: none; color: var(--text-dim);
        cursor: pointer; padding: 0 0 0 10px; font-size: 12px;
      }
      h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 24px; }
      h2 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
      }
      .metric-label {
        font-size: 13px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.05em;
        margin-bottom: 8px;
      }
      .metric-value {
        font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
        font-family: 'JetBrains Mono', monospace;
      }
      .metric-value .unit { font-size: 15px; color: var(--text-muted); margin-left: 8px; font-family: 'Inter', sans-serif; }
      .metric-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
      .section { margin-bottom: 32px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        text-align: left; font-weight: 500;
        color: var(--text-muted); padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
      }
      td { padding: 12px; border-bottom: 1px solid var(--border); }
      tr:last-child td { border-bottom: none; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .positive { color: #4ade80; }
      .negative { color: var(--danger); }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        color: var(--text-dim);
      }
      .pill.hit { background: rgba(25, 213, 198, 0.1); color: var(--accent-2); border-color: rgba(25,213,198,0.3); }
      .pill.miss { background: rgba(124, 92, 255, 0.1); color: var(--accent); border-color: rgba(124,92,255,0.3); }
      .bar-row {
        display: grid; grid-template-columns: 140px 1fr 110px;
        gap: 12px; align-items: center; padding: 10px 0;
        font-size: 14px;
      }
      .bar {
        background: var(--bg-elev); height: 8px; border-radius: 4px; overflow: hidden;
        position: relative;
      }
      .bar-fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        background: linear-gradient(90deg, #7c5cff, #19d5c6);
        border-radius: 4px;
      }
      .login-wrap {
        max-width: 440px; margin: 120px auto;
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 14px; padding: 40px 32px;
      }
      .login-wrap h1 { margin-bottom: 8px; }
      .login-wrap p { color: var(--text-dim); margin-bottom: 24px; font-size: 15px; }
      input[type="text"], input[type="password"] {
        width: 100%; padding: 12px 16px;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        font-family: 'JetBrains Mono', monospace; font-size: 14px;
        margin-bottom: 12px;
      }
      input:focus { outline: none; border-color: var(--accent); }
      button.primary {
        width: 100%; padding: 12px 18px;
        background: linear-gradient(135deg, #7c5cff, #19d5c6);
        color: #0a0a0b; border: none; border-radius: 8px;
        font-weight: 700; cursor: pointer; font-size: 14px;
      }
      .error {
        color: var(--danger); font-size: 13px; margin-bottom: 12px;
        padding: 10px 12px; background: rgba(255, 95, 87, 0.08);
        border: 1px solid rgba(255, 95, 87, 0.2); border-radius: 6px;
      }
      .empty { color: var(--text-muted); text-align: center; padding: 40px; font-size: 14px; }

      /* Next-action hero — surfaces the single most relevant CTA based
         on the user's current state (no agent → create; agent w/o WA →
         connect; connected w/o msgs → share; with msgs → see chat). */
      .next-action {
        background: linear-gradient(135deg, rgba(124, 92, 255, 0.14), rgba(25, 213, 198, 0.06));
        border: 1px solid rgba(124, 92, 255, 0.32);
        border-radius: 14px;
        padding: 22px 24px;
        margin-bottom: 24px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .next-action::before {
        content: "";
        position: absolute;
        top: 0; right: 0;
        width: 240px; height: 240px;
        background: radial-gradient(circle, rgba(124, 92, 255, 0.18), transparent 70%);
        pointer-events: none;
      }
      @media (max-width: 640px) {
        .next-action { grid-template-columns: 1fr; }
      }
      .next-action .ttl {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1.3;
        position: relative;
      }
      .next-action .sub {
        font-size: 14px;
        color: var(--text-dim);
        margin-top: 6px;
        line-height: 1.5;
        position: relative;
      }
      .next-action .cta {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #0a0a0b;
        padding: 13px 22px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s, box-shadow 0.15s;
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .next-action .cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(124, 92, 255, 0.3);
      }
      .next-action .link-row {
        display: flex; gap: 8px; margin-top: 12px;
        position: relative;
      }
      .next-action .link-row input {
        flex: 1;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--text);
        font-size: 13px;
        font-family: 'JetBrains Mono', monospace;
        min-width: 0;
      }
      .next-action .link-row button {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }

      /* Deposit hero */
      .deposit-hero {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 24px;
        align-items: center;
        background: linear-gradient(135deg, rgba(124,92,255,0.06), rgba(25,213,198,0.04));
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px 28px;
        margin-bottom: 24px;
      }
      .deposit-hero .qr-img {
        display: block;
        width: 150px; height: 150px;
        background: #fff; border-radius: 8px;
        padding: 8px; box-sizing: content-box;
      }
      .deposit-info { min-width: 0; }
      .deposit-info .label {
        font-size: 12px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
      }
      .deposit-info .network-pill {
        display: inline-block;
        background: rgba(25,213,198,0.1); color: var(--accent-2);
        border: 1px solid rgba(25,213,198,0.3);
        padding: 2px 8px; border-radius: 4px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.04em; text-transform: uppercase;
        margin-bottom: 12px;
        white-space: nowrap;
      }
      .deposit-info .addr {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px; color: var(--text);
        background: var(--bg-elev);
        border: 1px solid var(--border);
        padding: 10px 14px; border-radius: 6px;
        margin-bottom: 10px;
        display: flex; align-items: center; gap: 10px;
        min-width: 0;
      }
      .deposit-info .addr code {
        flex: 1; min-width: 0;
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
        /* subtle scroll hint: show via faded edges */
        mask-image: linear-gradient(90deg, #000 calc(100% - 16px), transparent);
        -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 16px), transparent);
      }
      .deposit-info .copy-btn { flex-shrink: 0; }

      /* ─── Agent rows (rich management cards) ──────────────── */
      .agent-row {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 10px; padding: 16px;
        display: grid; gap: 12px;
        grid-template-columns: 1fr;
      }
      .agent-row-head { display: flex; gap: 12px; align-items: flex-start; }
      .agent-dot {
        width: 12px; height: 12px; border-radius: 50%;
        flex: 0 0 auto; margin-top: 5px;
      }
      .agent-row-title { flex: 1; min-width: 0; }
      .agent-row-name { font-weight: 600; font-size: 15px; margin: 0 0 4px; }
      .agent-row-meta {
        font-size: 11px; color: var(--text-muted);
        font-family: 'JetBrains Mono', monospace;
        display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      }
      .agent-row-meta .mono { color: var(--text-dim); }

      .agent-channels {
        display: flex; gap: 6px; flex-wrap: wrap;
        padding: 8px 0; border-top: 1px solid var(--border);
      }
      .ch-pill {
        font-size: 11px; padding: 3px 8px; border-radius: 4px;
        background: var(--bg); border: 1px solid var(--border);
        color: var(--text-dim); font-weight: 500;
      }
      .ch-pill.ch-web { background: rgba(154,154,164,0.08); }
      .ch-pill.ch-embed { background: rgba(124,92,255,0.1); border-color: rgba(124,92,255,0.3); color: var(--accent); }
      .ch-pill.ch-api { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: #4ade80; }
      .ch-pill.ch-wa-on { background: rgba(37,211,102,0.12); border-color: rgba(37,211,102,0.35); color: #25d366; font-weight: 600; }
      .ch-pill.ch-wa-off { background: rgba(154,154,164,0.05); border-color: var(--border); color: var(--text-muted); }
      .ch-pill.ch-wa-warn { background: rgba(255,214,10,0.1); border-color: rgba(255,214,10,0.3); color: #ffd60a; }
      a.ch-pill.ch-nft { background: linear-gradient(90deg, rgba(255,184,0,0.12), rgba(124,92,255,0.12)); border-color: rgba(255,184,0,0.35); color: #ffb800; text-decoration: none; transition: filter 0.15s; }
      a.ch-pill.ch-nft:hover { filter: brightness(1.3); }
      .ch-pill.ch-loading { color: var(--text-muted); font-style: italic; }

      .agent-stats {
        font-size: 12px; color: var(--text-dim);
        padding: 4px 0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      }
      .agent-stats strong { color: var(--text); font-weight: 600; }
      .agent-stats .stat-sep { color: var(--text-muted); }
      .agent-stats .stat-loading { color: var(--text-muted); font-style: italic; }

      .agent-actions {
        display: flex; gap: 6px; flex-wrap: wrap;
        padding-top: 8px; border-top: 1px solid var(--border);
      }
      .agent-btn {
        background: transparent; border: 1px solid var(--border);
        color: var(--text-dim); padding: 7px 12px;
        border-radius: 5px; font-size: 12px; font-weight: 500;
        text-decoration: none; cursor: pointer; font-family: inherit;
        transition: all 0.1s; display: inline-flex; align-items: center; gap: 4px;
        white-space: nowrap;
      }
      .agent-btn:hover { background: var(--bg-card); color: var(--text); border-color: var(--text-muted); }
      .agent-btn.agent-btn-danger:hover { background: rgba(255,95,87,0.1); color: var(--danger); border-color: var(--danger); }

      @media (max-width: 500px) {
        .agent-row { padding: 12px; gap: 10px; }
        .agent-row-name { font-size: 14px; }
        .agent-row-meta { font-size: 10px; }
        .agent-actions { gap: 4px; }
        .agent-btn { padding: 8px 10px; font-size: 11px; min-height: 36px; }
        .ch-pill { font-size: 10px; padding: 3px 6px; }
        .agent-stats { font-size: 11px; }
      }
      @media (max-width: 640px) {
        .deposit-hero {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 20px;
          text-align: center;
        }
        .deposit-hero > div:first-child { display: flex; justify-content: center; }
        .deposit-info { text-align: left; }
      }
      @media (max-width: 500px) {
        .container { padding: 20px 14px; }
        .deposit-hero { padding: 16px; }
        .deposit-hero .qr-img { width: 120px !important; height: 120px !important; }
        h1 { font-size: 22px; }
        h2 { font-size: 16px; }
        .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { padding: 16px; }
        .metric-value { font-size: 24px; }
        .metric-label { font-size: 11px; }
        .metric-sub { font-size: 11px; }
        header { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
        header nav { width: 100%; overflow-x: auto; flex-wrap: nowrap !important; padding-bottom: 4px; }
        header nav a { white-space: nowrap; padding: 8px 10px !important; min-height: 36px; display: inline-flex; align-items: center; }
        header > div:last-child { width: 100%; justify-content: space-between; }
        .key-chip { font-size: 11px; padding: 6px 9px; }
        .deposit-info .addr { flex-wrap: wrap; }
        .deposit-info code { font-size: 11px; word-break: break-all; }
        .copy-btn { padding: 8px 14px; min-height: 36px; }
        table { font-size: 12px; }
        th, td { padding: 8px 6px !important; }
        .tx-row .mono { font-size: 11px; }
      }
      @media (max-width: 380px) {
        .grid { grid-template-columns: 1fr; }
      }
      .deposit-info .warning {
        font-size: 12px; color: #ff7a6f;
        display: flex; align-items: center; gap: 6px;
      }
      .copy-btn {
        background: transparent; border: 1px solid var(--border);
        color: var(--text-dim); font-size: 11px; font-weight: 600;
        padding: 5px 10px; border-radius: 5px;
        cursor: pointer; font-family: 'Inter', sans-serif;
        letter-spacing: 0.04em; text-transform: uppercase;
        transition: all 0.15s;
      }
      .copy-btn:hover { color: var(--text); border-color: var(--accent); }
      .copy-btn.copied { background: rgba(25,213,198,0.15); color: var(--accent-2); border-color: var(--accent-2); }

      /* Try a call */
      .try-call-code {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 18px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; line-height: 1.6;
        color: var(--text-dim);
        position: relative;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: pre;
      }
      .try-call-code .tok { color: var(--text); }
      .try-call-code .str { color: var(--accent-2); }
      .try-call-code .flag { color: #fbbf24; }
      .try-call-code .copy-btn {
        position: sticky;
        float: right;
        top: 0;
      }
      @media (max-width: 640px) {
        .try-call-code { font-size: 11px; padding: 12px 14px; }
      }

      /* Responsive table wrap */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Transaction type styling */
      .tx-type {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 12px; font-weight: 600;
        padding: 3px 10px; border-radius: 4px;
        letter-spacing: 0.02em;
      }
      .tx-type.debit   { background: rgba(154,154,164,0.1);  color: var(--text-dim); }
      .tx-type.credit  { background: rgba(74,222,128,0.12);  color: #4ade80; }
      .tx-type.refund  { background: rgba(56,189,248,0.12);  color: #38bdf8; }
      .tx-type.bonus   { background: rgba(251,191,36,0.12);  color: #fbbf24; }
      .tx-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

      /* Clickable transaction rows + expand panel */
      tr.tx-row { cursor: pointer; transition: background 120ms ease; }
      tr.tx-row:hover { background: rgba(255,255,255,0.025); }
      tr.tx-row.is-open { background: rgba(124,92,255,0.06); }
      tr.tx-row .tx-chevron {
        display: inline-block; width: 10px; color: var(--text-muted);
        font-size: 10px; transition: transform 120ms ease; margin-right: 4px;
      }
      tr.tx-row.is-open .tx-chevron { transform: rotate(90deg); color: var(--accent); }
      tr.tx-detail-row > td {
        background: rgba(255,255,255,0.02);
        padding: 14px 18px 18px;
        border-top: 1px dashed rgba(255,255,255,0.06);
      }
      .tx-detail-grid {
        display: grid; grid-template-columns: 150px minmax(0, 1fr);
        gap: 6px 18px; font-size: 12px;
      }
      .tx-detail-grid .k { color: var(--text-muted); }
      .tx-detail-grid .v { word-break: break-all; }
      @media (max-width: 640px) {
        .tx-detail-grid { grid-template-columns: 1fr; gap: 2px 0; }
        .tx-detail-grid .k { margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      }

      /* Generated-images strip (lives between agent header and messages) */
      .gallery-strip {
        display: flex; gap: 8px; padding: 10px 12px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        background: rgba(255,255,255,0.015);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .gallery-strip[hidden] { display: none; }
      .gallery-strip .gs-label {
        flex: 0 0 auto;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--text-muted); align-self: center; padding-right: 4px;
        white-space: nowrap;
      }
      .gallery-tile {
        position: relative; flex: 0 0 auto;
        width: 64px; height: 64px; border-radius: 6px; overflow: hidden;
        cursor: zoom-in; background: #000;
        border: 1px solid rgba(255,255,255,0.08);
        transition: transform 100ms ease, border-color 100ms ease;
      }
      .gallery-tile:hover { transform: scale(1.04); border-color: var(--accent); }
      .gallery-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .gallery-tile .dl-btn {
        position: absolute; right: 2px; bottom: 2px;
        background: rgba(0,0,0,0.7); color: #fff;
        border: 0; border-radius: 3px; padding: 2px 5px;
        font-size: 10px; cursor: pointer; line-height: 1;
        opacity: 0; transition: opacity 120ms ease;
      }
      .gallery-tile:hover .dl-btn { opacity: 1; }
      .gallery-tile .dl-btn:hover { background: var(--accent); }

      /* Tier badge in header */
      .tier-badge {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 4px 10px; border-radius: 4px;
        cursor: pointer; transition: transform 100ms ease, opacity 100ms ease;
        white-space: nowrap;
      }
      .tier-badge:hover { transform: translateY(-1px); }
      .tier-badge.tier-free { background: rgba(154,154,164,0.15); color: var(--text-dim); }
      .tier-badge.tier-pro  { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a0a0b; }
      .tier-badge.tier-team { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #0a0a0b; }
      .tier-badge.tier-enterprise { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff; }
      .tier-badge.expired { opacity: 0.5; text-decoration: line-through; }

      /* Tile fade-in when generated or restored */
      @keyframes tile-pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      .gallery-tile { animation: tile-pop 180ms ease-out; }

      /* ===== Lightbox modal for full-size images ===== */
      .lightbox {
        position: fixed; inset: 0; z-index: 2000;
        background: rgba(8, 8, 12, 0.88);
        display: none; align-items: center; justify-content: center;
        padding: 24px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .lightbox[data-open="1"] { display: flex; animation: fade-in 160ms ease-out; }
      .lightbox img {
        max-width: 100%; max-height: calc(100vh - 96px);
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        animation: tile-pop 200ms ease-out;
      }
      .lightbox-meta {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        background: rgba(20,20,28,0.9); border: 1px solid var(--border);
        padding: 8px 14px; border-radius: 8px;
        font-size: 12px; color: var(--text-dim);
        max-width: calc(100% - 48px); display: flex; gap: 12px; align-items: center;
      }
      .lightbox-meta .lb-prompt {
        max-width: 60vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        font-style: italic;
      }
      .lightbox-meta .lb-action {
        background: transparent; border: 1px solid var(--border); color: var(--text);
        padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
      }
      .lightbox-meta .lb-action:hover { background: var(--accent); border-color: var(--accent); }
      .lightbox-close {
        position: absolute; top: 16px; right: 18px;
        background: transparent; border: 0; color: var(--text-muted);
        font-size: 28px; line-height: 1; cursor: pointer; padding: 4px 10px;
      }
      .lightbox-close:hover { color: var(--text); }
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

      /* ===== Toasts (bottom-right ephemeral feedback) ===== */
      .toast-container {
        position: fixed; bottom: 16px; right: 16px; z-index: 2500;
        display: flex; flex-direction: column-reverse; gap: 8px;
        pointer-events: none;
      }
      .toast {
        background: rgba(20,20,28,0.96); border: 1px solid var(--border);
        color: var(--text); padding: 10px 14px; border-radius: 6px;
        font-size: 13px; max-width: 320px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        animation: toast-in 200ms ease-out;
        pointer-events: auto;
      }
      .toast.success { border-left: 3px solid #4ade80; }
      .toast.error   { border-left: 3px solid #f87171; }
      .toast.info    { border-left: 3px solid var(--accent); }
      .toast.leaving { animation: toast-out 200ms ease-in forwards; }
      @keyframes toast-in  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes toast-out { to { opacity: 0; transform: translateY(8px); } }

      /* ===== Code-block copy button (revealed on hover) ===== */
      .md pre { position: relative; }
      .md pre .code-copy {
        position: absolute; top: 6px; right: 6px;
        background: rgba(20,20,28,0.85); color: var(--text-muted);
        border: 1px solid var(--border); border-radius: 4px;
        padding: 3px 8px; font-size: 10px; cursor: pointer;
        opacity: 0; transition: opacity 120ms ease, color 120ms ease;
        text-transform: uppercase; letter-spacing: 0.06em;
      }
      .md pre:hover .code-copy { opacity: 1; }
      .md pre .code-copy:hover { color: var(--text); border-color: var(--accent); }
      .md pre .code-copy.ok { color: #4ade80; border-color: #4ade80; }

      /* ===== Typing indicator (animated dots while agent thinks) ===== */
      .typing-indicator {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 6px 0; font-size: 13px; color: var(--text-muted);
      }
      .typing-indicator .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--text-muted); animation: typing 1.2s infinite ease-in-out;
      }
      .typing-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
      .typing-indicator .dot:nth-child(3) { animation-delay: 0.30s; }
      @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }

      /* ===== Message fade-in ===== */
      @keyframes msg-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      .agent-messages .msg { animation: msg-in 180ms ease-out; }

      /* ===== Run button: subtle pulse while running ===== */
      .agent-btn.run.is-running {
        background: rgba(124,92,255,0.18) !important;
        color: var(--text-muted) !important;
        cursor: not-allowed;
      }

      /* --- Agent chat --- */
      .agent-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
      }
      @media (max-width: 900px) {
        .agent-wrap { grid-template-columns: minmax(0, 1fr); }
      }
      .agent-chat, .agent-brain {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 18px;
        display: flex; flex-direction: column;
        min-height: 480px;
        /* Prevent grid/flex children from blowing out on narrow screens */
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }
      .agent-header {
        font-size: 12px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.08em;
        margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
      }
      .agent-header .reset-btn {
        background: none; border: none;
        color: var(--text-muted); font-size: 11px;
        padding: 2px 4px; border-radius: 3px;
        cursor: pointer; letter-spacing: 0.06em;
        text-transform: lowercase;
      }
      .agent-header .reset-btn:hover { color: var(--text-dim); }
      .agent-messages {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 50vh;
        padding-right: 4px;
        margin-bottom: 12px;
        min-width: 0; max-width: 100%;
      }
      .msg { margin-bottom: 14px; }
      .msg-role {
        font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.08em; margin-bottom: 4px;
        color: var(--text-muted);
      }
      .msg-user .msg-role { color: var(--accent-2); }
      .msg-assistant .msg-role { color: var(--accent); }
      .msg-content {
        font-size: 14px; line-height: 1.6; color: var(--text-dim);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        min-width: 0; max-width: 100%;
      }
      .msg-assistant .msg-content { color: var(--text); }
      .agent-input-bar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .agent-input-bar textarea {
        width: 100%;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 11px 14px; font-family: 'Inter', sans-serif;
        font-size: 14px; resize: vertical;
        min-height: 88px; max-height: 280px; line-height: 1.5;
      }
      .agent-input-bar textarea:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.12);
      }
      .agent-input-bar textarea::placeholder { color: var(--text-muted); }
      .agent-action-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .agent-action-row .hint {
        font-size: 11px; color: var(--text-muted);
        letter-spacing: 0.04em;
      }
      .agent-action-row .kbd {
        font-family: 'JetBrains Mono', monospace;
        background: var(--bg-elev); border: 1px solid var(--border);
        padding: 1px 5px; border-radius: 3px; font-size: 10.5px;
        color: var(--text-dim);
      }
      .agent-btn {
        padding: 9px 20px; border-radius: 7px; border: 1px solid transparent;
        font-weight: 600; cursor: pointer; font-size: 13px;
        font-family: 'Inter', sans-serif; letter-spacing: 0.01em;
        white-space: nowrap;
      }
      .agent-btn.run {
        background: var(--accent); color: #fff;
        border-color: var(--accent);
      }
      .agent-btn.run:hover:not(:disabled) { background: #6b4ff0; border-color: #6b4ff0; }
      .agent-btn.run:disabled { opacity: 0.55; cursor: not-allowed; }
      .agent-btn.stop {
        background: transparent; color: var(--danger);
        border-color: rgba(255,95,87,0.4);
      }
      .agent-btn.stop:hover { background: rgba(255,95,87,0.08); }
      .agent-brain .brain-events {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 50vh;
        display: flex; flex-direction: column; gap: 8px;
        min-width: 0; max-width: 100%;
      }
      .brain-event { min-width: 0; max-width: 100%; overflow: hidden; }
      .brain-event {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px; padding: 10px 12px; font-size: 12px;
      }
      .brain-event.pending { border-color: rgba(124,92,255,0.5); }
      .brain-event.error   { border-color: rgba(255,95,87,0.5); }
      .brain-event .tool-name {
        font-family: 'JetBrains Mono', monospace; font-weight: 600;
        color: var(--text); font-size: 12px; margin-bottom: 4px;
      }
      .brain-event .tool-args {
        font-family: 'JetBrains Mono', monospace; font-size: 11px;
        color: var(--text-dim); word-break: break-all; margin-bottom: 6px;
        max-height: 60px; overflow: hidden;
      }
      .brain-event .tool-stats { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
      .stat {
        padding: 2px 6px; border-radius: 3px;
        font-family: 'JetBrains Mono', monospace; font-size: 11px;
      }
      .stat.cost      { background: rgba(124,92,255,0.12); color: #b59aff; }
      .stat.cache-hit { background: rgba(25,213,198,0.12); color: var(--accent-2); }
      .stat.cache-miss{ background: rgba(154,154,164,0.1); color: var(--text-dim); }
      .stat.cache-local{ background: rgba(251,191,36,0.12); color: #fbbf24; }
      .stat.latency   { background: rgba(154,154,164,0.1); color: var(--text-dim); }
      .stat.err       { background: rgba(255,95,87,0.15); color: var(--danger); }
      .stat.pending {
        background: rgba(124,92,255,0.12); color: #b59aff;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
      .session-footer {
        margin-top: 12px; padding: 10px 14px;
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px;
        display: flex; gap: 10px; flex-wrap: wrap;
        font-size: 12px; color: var(--text-muted);
      }
      .session-footer strong { color: var(--text); font-family: 'JetBrains Mono', monospace; }
      .session-footer .divider { color: var(--border); }

      /* Modal */
      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 1000; padding: 20px;
      }
      .modal-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 12px; padding: 28px 32px;
        max-width: 480px; width: 100%;
      }
      .modal-card h3 { margin: 0 0 12px; font-size: 20px; }
      .modal-card p { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin: 0 0 10px; }
      .modal-card ul { color: var(--text-dim); font-size: 14px; line-height: 1.7; margin: 0 0 12px; padding-left: 20px; }
      .modal-card .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
      .modal-card .btn-m { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
      .modal-card .btn-m.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a0a0b; }
      .modal-card .btn-m.secondary { background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border); }

      /* Quick-start suggestions — inline, understated */
      .quick-chips {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
        margin: 6px 2px 10px;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.9;
      }
      .quick-chips .qc-label {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--text-muted);
        margin-right: 10px;
        font-size: 11px;
      }
      .chip {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 12.5px;
        padding: 0;
        margin: 0;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: color 0.12s;
      }
      .chip:hover { color: var(--accent-2); }
      .chip:focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; border-radius: 2px; }
      .chip + .chip::before {
        content: '·';
        margin: 0 8px;
        color: var(--border);
        pointer-events: none;
      }

      /* Markdown render inside assistant message */
      .msg-content.md { white-space: normal; }
      .msg-content.md p { margin: 0 0 10px 0; }
      .msg-content.md p:last-child { margin-bottom: 0; }
      .msg-content.md h1, .msg-content.md h2, .msg-content.md h3, .msg-content.md h4 {
        margin: 14px 0 6px 0; color: var(--text); font-weight: 700;
        letter-spacing: -0.01em; line-height: 1.3;
      }
      .msg-content.md h1 { font-size: 18px; }
      .msg-content.md h2 { font-size: 16px; }
      .msg-content.md h3 { font-size: 15px; }
      .msg-content.md h4 { font-size: 14px; color: var(--accent-2); }
      .msg-content.md strong { color: var(--text); font-weight: 600; }
      .msg-content.md em { color: var(--text); font-style: italic; }
      .msg-content.md ul, .msg-content.md ol { padding-left: 22px; margin: 0 0 10px 0; }
      .msg-content.md li { margin: 3px 0; }
      .msg-content.md code {
        font-family: 'JetBrains Mono', monospace;
        background: var(--bg-elev); color: #e4e4ff;
        padding: 1px 5px; border-radius: 3px;
        border: 1px solid var(--border);
        font-size: 12.5px;
        word-break: break-all;
      }
      .msg-content.md pre {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 12px 14px;
        margin: 10px 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12.5px; line-height: 1.55;
        max-width: 100%;
      }
      .msg-content.md pre code {
        background: transparent; border: none; padding: 0;
        color: var(--text); font-size: 12.5px;
        word-break: normal; white-space: pre;
      }
      .msg-content.md a {
        color: var(--accent-2); text-decoration: underline; text-underline-offset: 2px;
        overflow-wrap: anywhere; word-break: break-all;
      }
      .msg-content.md a:hover { color: var(--text); }
      .msg-content.md blockquote {
        border-left: 3px solid var(--border);
        padding-left: 12px; margin: 10px 0;
        color: var(--text-dim); font-style: italic;
      }
      .msg-content.md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
      /* Tables: wrap so they horizontally scroll on narrow screens instead of
         pushing the page wider than viewport */
      .msg-content.md table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 13px;
        white-space: nowrap;
      }
      .msg-content.md th, .msg-content.md td { border: 1px solid var(--border); padding: 6px 10px; }
      .msg-content.md th { background: var(--bg-elev); color: var(--text); font-weight: 600; }
      .msg-content.md img { max-width: 100%; height: auto; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const STORAGE_KEY = 'axon.apiKey';
      const BASE_KEY = 'axon.baseUrl';

      function html(parts, ...args) {
        return parts.reduce((a, p, i) => a + p + (args[i] ?? ''), '');
      }

      function $(root, sel) { return root.querySelector(sel); }

      async function api(path, opts = {}) {
        const key = localStorage.getItem(STORAGE_KEY);
        const base = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const res = await fetch(base + path, {
          ...opts,
          headers: { 'x-api-key': key, 'content-type': 'application/json', ...(opts.headers || {}) },
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).message || res.statusText);
        return res.json();
      }

      function formatUsdc(s) { return Number(s).toFixed(4); }

      /**
       * Surfaces a single action-oriented hero at the top of the panel
       * based on the user's current state. The goal: a freshly-logged-in
       * customer should know in one glance what to do next, without
       * scanning a wall of metrics.
       *
       * Decision tree (short-circuit at the first match):
       *   1. No agents          → "Create your first agent"
       *   2. Agent without WA   → "Connect to WhatsApp"
       *   3. Agent w/ WA, 0 msg → "Share the public link"
       *   4. Agent with traffic → "Already attending — keep tuning"
       *
       * The first agent in the list drives steps 2-4. Multi-agent
       * accounts can still see all agents in the regular list below.
       */
      async function renderNextAction(agents) {
        const wrap = document.getElementById('next-action-hero');
        if (!wrap) return;

        // 1 — No agents yet
        if (!agents || agents.length === 0) {
          wrap.innerHTML = `
            <div class="next-action">
              <div>
                <div class="ttl">🚀 Crie seu primeiro agente</div>
                <div class="sub">Pega um template (clínica, restaurante, loja, pet shop...), ajusta nome e prompt. Sai funcionando em ~60 segundos.</div>
              </div>
              <a class="cta" href="/build">Forjar agente →</a>
            </div>`;
          return;
        }

        // From here, all branches reference the first agent.
        const a = agents[0];

        // 2 — Has agent but no WhatsApp connection
        const conn = await api(`/v1/agents/${a.id}/whatsapp`).catch(() => ({ connected: false }));
        if (!conn || !conn.connected) {
          wrap.innerHTML = `
            <div class="next-action">
              <div>
                <div class="ttl">📱 Conecte ${escapeHtml(a.name)} ao WhatsApp</div>
                <div class="sub">Seu agente está pronto. Conecta o número e ele atende automaticamente cada mensagem que chega.</div>
              </div>
              <a class="cta" href="/build?edit=${encodeURIComponent(a.id)}">Conectar agora →</a>
            </div>`;
          return;
        }

        // 3 — Connected, but no contacts yet → push for sharing
        const contactsRes = await api(`/v1/agents/${a.id}/contacts?limit=10`).catch(() => ({ contacts: [] }));
        const contacts = contactsRes.contacts || [];
        if (contacts.length === 0) {
          const publicUrl = `${location.origin}/agent/${a.slug}`;
          wrap.innerHTML = `
            <div class="next-action">
              <div>
                <div class="ttl">🎉 ${escapeHtml(a.name)} está no ar — agora compartilhe</div>
                <div class="sub">Cole o link no Instagram, no rodapé do site, no cartão de visita. Quem clicar começa a conversar.</div>
                <div class="link-row">
                  <input id="na-link" readonly value="${escapeHtml(publicUrl)}" />
                  <button onclick="navigator.clipboard.writeText('${publicUrl.replace(/'/g, "\\'")}'); this.textContent='✓ Copiado'; setTimeout(()=>this.textContent='📋 Copiar', 1500);">📋 Copiar</button>
                </div>
              </div>
              <a class="cta" href="/agent-preview/${encodeURIComponent(a.slug)}">Pré-visualizar →</a>
            </div>`;
          return;
        }

        // 4 — Has traffic → celebrate + push to manage
        wrap.innerHTML = `
          <div class="next-action">
            <div>
              <div class="ttl">✨ ${escapeHtml(a.name)} está atendendo (${contacts.length} contato${contacts.length > 1 ? 's' : ''})</div>
              <div class="sub">Continue ajustando o prompt conforme percebe o que clientes mais perguntam, ou crie um segundo agente pra outra vertical.</div>
            </div>
            <a class="cta" href="/whatsapp">Ver conversas →</a>
          </div>`;
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }

      // Render the user's owned agents card — rich per-agent management UI.
      // For each agent, also fetches WhatsApp connection status + contact count
      // in parallel so the card shows real-time channel state.
      async function renderMyAgents(agents) {
        const el = document.getElementById('my-agents-card');
        if (!el) return;
        if (!agents || agents.length === 0) {
          el.innerHTML = `
            <div style="text-align:center;padding:32px 16px;">
              <div style="font-size:14px;color:var(--text-dim);margin-bottom:6px;">Você ainda não tem agentes.</div>
              <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Pegue um template pronto e tenha um chatbot rodando em 5 minutos.</div>
              <a href="/build" style="display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0a0b;padding:10px 22px;border-radius:6px;text-decoration:none;font-weight:700;font-size:13px;">Criar agente →</a>
              <div style="font-size:11px;color:var(--text-muted);margin-top:14px;">Ou veja agentes prontos em <a href="/explore" style="color:var(--accent-2);">/explore</a></div>
            </div>
          `;
          return;
        }

        // Initial render with skeletons; we hydrate per-agent stats below
        el.innerHTML = `<div id="agent-list" style="display:flex;flex-direction:column;gap:12px;">${
          agents.map(a => agentCardSkeleton(a)).join('')
        }</div>`;

        // Hydrate each card in parallel with WhatsApp + contacts data
        agents.forEach(a => hydrateAgentCard(a));
      }

      function agentCardSkeleton(a) {
        return `
          <div class="agent-row" id="agent-row-${escapeAttr(a.id)}" data-slug="${escapeAttr(a.slug)}">
            <div class="agent-row-head">
              <span class="agent-dot" style="background:${escapeAttr(a.primary_color)};"></span>
              <div class="agent-row-title">
                <div class="agent-row-name">${escapeHtml(a.name)}</div>
                <div class="agent-row-meta">
                  <span class="mono">/agent/${escapeHtml(a.slug)}</span>
                  <span>·</span>
                  <span>${a.tool_count} ferramenta${a.tool_count === 1 ? '' : 's'}</span>
                  <span>·</span>
                  <span>${a.pay_mode === 'owner' ? 'você paga' : 'visitante paga'}</span>
                  ${a.public ? '' : '<span>·</span><span style="color:var(--warn,#ffd60a);">privado</span>'}
                </div>
              </div>
            </div>
            <div class="agent-channels" id="channels-${escapeAttr(a.id)}">
              <span class="ch-pill ch-web">🌐 Web</span>
              <span class="ch-pill ch-loading">💬 carregando WhatsApp…</span>
              ${a.pay_mode === 'owner' ? '<span class="ch-pill ch-embed">🔌 Embed</span><span class="ch-pill ch-api">⚙ API</span>' : ''}
              ${a.nft_url ? `<a class="ch-pill ch-nft" href="${escapeAttr(a.nft_url)}" target="_blank" rel="noopener" title="Cada agente é um NFT na blockchain Base — clique para verificar.">🪙 NFT verificado</a>` : ''}
            </div>
            <div class="agent-stats" id="stats-${escapeAttr(a.id)}">
              <span class="stat-loading">carregando estatísticas…</span>
            </div>
            <div class="agent-actions">
              <a class="agent-btn" href="/agent-preview/${escapeAttr(a.slug)}" target="_blank" title="Pré-visualizar e testar agente antes de conectar WhatsApp" style="border-color:rgba(124,92,255,0.4);color:var(--accent);">🧪 Testar</a>
              <a class="agent-btn" href="/whatsapp" title="Ver memória, contatos e conversas">🧠 Cérebro</a>
              <button class="agent-btn" onclick="openWhatsappModal('${escapeAttr(a.id)}', '${escapeAttr(a.name)}')">💬 WhatsApp</button>
              <a class="agent-btn" href="/build?edit=${escapeAttr(a.id)}" title="Editar prompt, ferramentas, cor">⚙ Editar</a>
              <a class="agent-btn" href="/agent/${escapeAttr(a.slug)}" target="_blank" title="Abrir chat público">🔗 Abrir</a>
              <button class="agent-btn agent-btn-danger" onclick="deleteAgent('${escapeAttr(a.id)}', '${escapeAttr(a.name)}')" title="Excluir agente permanentemente">×</button>
            </div>
          </div>
        `;
      }

      async function hydrateAgentCard(a) {
        // Load whatsapp connection + contacts count in parallel
        const [conn, contacts] = await Promise.all([
          api(`/v1/agents/${a.id}/whatsapp`).catch(() => ({ connected: false })),
          api(`/v1/agents/${a.id}/contacts?limit=200`).catch(() => ({ contacts: [] })),
        ]);

        // Update channels pill — WhatsApp status visible immediately
        const channelsEl = document.getElementById(`channels-${a.id}`);
        if (channelsEl) {
          const waStatus = !conn.connected
            ? '<span class="ch-pill ch-wa-off" title="WhatsApp não conectado — clique 💬 WhatsApp pra configurar">💬 WhatsApp ✗</span>'
            : conn.status === 'open' || conn.status === 'connected'
              ? `<span class="ch-pill ch-wa-on" title="WhatsApp ativo — última atividade ${conn.last_event_at ? relativeTime(conn.last_event_at) : 'desconhecida'}">💬 WhatsApp ✓</span>`
              : `<span class="ch-pill ch-wa-warn" title="WhatsApp em estado: ${conn.status}">💬 WhatsApp ⚠</span>`;
          // Replace the loading WhatsApp pill while keeping siblings
          const html = channelsEl.innerHTML.replace(
            /<span class="ch-pill ch-loading">[^<]*<\/span>/,
            waStatus
          );
          channelsEl.innerHTML = html;
        }

        // Calculate today's messages
        const ctx = (contacts.contacts || []);
        const today = new Date().toISOString().slice(0, 10);
        const todayMsgs = ctx
          .filter(c => c.last_contact_at && c.last_contact_at.startsWith(today))
          .reduce((sum, c) => sum + (c.message_count || 0), 0);
        const totalContacts = ctx.length;

        const statsEl = document.getElementById(`stats-${a.id}`);
        if (statsEl) {
          statsEl.innerHTML = `
            <span class="stat-item"><strong>${totalContacts}</strong> contato${totalContacts === 1 ? '' : 's'}</span>
            <span class="stat-sep">·</span>
            <span class="stat-item"><strong>${todayMsgs}</strong> msg${todayMsgs === 1 ? '' : 's'} hoje</span>
            <span class="stat-sep">·</span>
            <span class="stat-item">orçamento <strong>$${a.daily_budget_usdc}</strong>/dia</span>
          `;
        }
      }

      // ─── WhatsApp connect/disconnect modal ────────────────────────────────
      // State holder: pollHandle is the setInterval id used to detect when
      // the customer finishes scanning the QR — needs to be cleared on close.
      window.__waModalState = window.__waModalState || { pollHandle: null };

      window.openWhatsappModal = async function(agentId, agentName) {
        // Show loading immediately
        const overlay = document.createElement('div');
        overlay.id = 'wa-modal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
        overlay.innerHTML = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:540px;width:100%;text-align:center;color:var(--text-dim);">Carregando…</div>`;
        const closeOverlay = () => {
          if (window.__waModalState.pollHandle) {
            clearInterval(window.__waModalState.pollHandle);
            window.__waModalState.pollHandle = null;
          }
          overlay.remove();
        };
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });
        document.body.appendChild(overlay);

        const conn = await api(`/v1/agents/${agentId}/whatsapp`).catch(() => ({ connected: false }));

        const card = document.createElement('div');
        card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;';
        overlay.innerHTML = '';
        overlay.appendChild(card);

        if (conn.connected) {
          // Already connected → show status + disconnect button
          card.innerHTML = renderWaConnectedView(agentId, agentName, conn);
          card.querySelector('[data-act="close"]').onclick = closeOverlay;
          const disconnectBtn = card.querySelector('[data-act="disconnect"]');
          if (disconnectBtn) disconnectBtn.onclick = async () => {
            if (!confirm(`Desconectar WhatsApp do agente "${agentName}"?\n\nAs mensagens param de chegar e o número fica livre pra reusar em outro agente.`)) return;
            disconnectBtn.disabled = true;
            disconnectBtn.textContent = 'Desconectando…';
            try {
              await api(`/v1/agents/${agentId}/whatsapp`, { method: 'DELETE' });
              window.AxonUI && AxonUI.toast('WhatsApp desconectado', { type: 'success' });
              closeOverlay();
              location.reload();
            } catch (e) {
              window.AxonUI && AxonUI.toast('Falha ao desconectar: ' + e.message, { type: 'error' });
              disconnectBtn.disabled = false;
              disconnectBtn.textContent = 'Desconectar';
            }
          };
          return;
        }

        // Not connected → show the simple QR Code flow
        await launchQrFlow(card, agentId, agentName, closeOverlay);
      };

      /**
       * QR Code flow — the simple path most customers see.
       *
       * 1. Calls POST /v1/agents/:id/whatsapp/auto → server provisions a fresh
       *    Evolution instance and returns a QR PNG (base64).
       * 2. Renders the QR with step-by-step instructions in plain Portuguese.
       * 3. Polls GET /v1/agents/:id/whatsapp every 3s — when status === "open",
       *    swaps the UI to "Conectado!" and reloads the dashboard.
       * 4. If the server replies 503 (auto-provision off), falls back to the
       *    advanced manual form.
       */
      async function launchQrFlow(card, agentId, agentName, closeOverlay) {
        card.innerHTML = renderWaQrLoading(agentName);

        let resp;
        try {
          resp = await api(`/v1/agents/${agentId}/whatsapp/auto`, {
            method: 'POST',
            body: JSON.stringify({}),
          });
        } catch (e) {
          // Backend returns 503 with message "Axon Evolution server not
          // configured..." when AXON_EVOLUTION_URL/KEY env vars are unset.
          // In that case the customer must use BYO Evolution → show the
          // advanced form. Any other error = real problem; show retry.
          const msg = String(e.message || '');
          if (/evolution server not configured|auto_provision_unavailable/i.test(msg)) {
            renderAdvancedForm(card, agentId, agentName, closeOverlay);
            return;
          }
          card.innerHTML = renderWaError(agentName, msg);
          card.querySelector('[data-act="close"]').onclick = closeOverlay;
          card.querySelector('[data-act="retry"]').onclick = () => launchQrFlow(card, agentId, agentName, closeOverlay);
          card.querySelector('[data-act="advanced"]').onclick = () => renderAdvancedForm(card, agentId, agentName, closeOverlay);
          return;
        }

        const qr = resp?.connection?.qr_base64 || '';
        const pairing = resp?.connection?.pairing_code || '';
        if (!qr && !pairing) {
          card.innerHTML = renderWaError(agentName, 'O servidor não retornou um QR Code. Tente de novo.');
          card.querySelector('[data-act="close"]').onclick = closeOverlay;
          card.querySelector('[data-act="retry"]').onclick = () => launchQrFlow(card, agentId, agentName, closeOverlay);
          card.querySelector('[data-act="advanced"]').onclick = () => renderAdvancedForm(card, agentId, agentName, closeOverlay);
          return;
        }

        card.innerHTML = renderWaQrView(agentName, qr, pairing);
        card.querySelector('[data-act="close"]').onclick = closeOverlay;
        const advBtn = card.querySelector('[data-act="show-advanced"]');
        if (advBtn) advBtn.onclick = () => {
          if (window.__waModalState.pollHandle) {
            clearInterval(window.__waModalState.pollHandle);
            window.__waModalState.pollHandle = null;
          }
          renderAdvancedForm(card, agentId, agentName, closeOverlay);
        };
        const refreshBtn = card.querySelector('[data-act="refresh-qr"]');
        if (refreshBtn) refreshBtn.onclick = async () => {
          refreshBtn.disabled = true;
          refreshBtn.textContent = 'Atualizando…';
          try {
            const r = await api(`/v1/agents/${agentId}/whatsapp/qr`);
            if (r.paired) {
              onWaConnected(card, closeOverlay);
              return;
            }
            const newQr = r.qr_base64;
            const newPairing = r.pairing_code;
            const img = card.querySelector('#wa-qr-img');
            if (img && newQr) img.src = `data:image/png;base64,${newQr}`;
            const code = card.querySelector('#wa-pairing-code');
            if (code && newPairing) code.textContent = newPairing;
          } catch (e) {
            window.AxonUI && AxonUI.toast('Falha ao atualizar QR: ' + e.message, { type: 'error' });
          } finally {
            refreshBtn.disabled = false;
            refreshBtn.textContent = '🔄 Atualizar QR';
          }
        };

        // Begin polling for connection. status === "open" means the customer
        // scanned the QR with their phone and WhatsApp finished pairing.
        startConnectionPolling(agentId, () => onWaConnected(card, closeOverlay));
      }

      function startConnectionPolling(agentId, onConnected) {
        if (window.__waModalState.pollHandle) clearInterval(window.__waModalState.pollHandle);
        let attempts = 0;
        const maxAttempts = 100; // ~5 min at 3s — QR codes expire around there anyway
        window.__waModalState.pollHandle = setInterval(async () => {
          attempts++;
          if (attempts > maxAttempts) {
            clearInterval(window.__waModalState.pollHandle);
            window.__waModalState.pollHandle = null;
            return;
          }
          try {
            const r = await api(`/v1/agents/${agentId}/whatsapp`);
            const status = (r.status || '').toLowerCase();
            if (r.connected && (status === 'open' || status === 'connected')) {
              clearInterval(window.__waModalState.pollHandle);
              window.__waModalState.pollHandle = null;
              onConnected();
            }
          } catch { /* keep polling on transient errors */ }
        }, 3000);
      }

      function onWaConnected(card, closeOverlay) {
        card.innerHTML = `
          <div style="text-align:center;padding:24px 8px;">
            <div style="font-size:48px;margin-bottom:12px;">✅</div>
            <h2 style="margin:0 0 8px;font-size:20px;color:#22c55e;">WhatsApp conectado!</h2>
            <p style="font-size:13px;color:var(--text-dim);margin:0 0 20px;">Seu agente já está atendendo. Pode fechar essa janela.</p>
            <button data-act="close" style="background:var(--accent);color:white;border:none;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">Fechar</button>
          </div>`;
        card.querySelector('[data-act="close"]').onclick = () => {
          closeOverlay();
          location.reload();
        };
        window.AxonUI && AxonUI.toast('WhatsApp conectado!', { type: 'success' });
      }

      function renderAdvancedForm(card, agentId, agentName, closeOverlay) {
        card.innerHTML = renderWaConnectForm(agentId, agentName);
        card.querySelector('[data-act="close"]').onclick = closeOverlay;
        const backBtn = card.querySelector('[data-act="back-to-qr"]');
        if (backBtn) backBtn.onclick = () => launchQrFlow(card, agentId, agentName, closeOverlay);

        const connectBtn = card.querySelector('[data-act="connect"]');
        if (connectBtn) connectBtn.onclick = async () => {
          const url = card.querySelector('#wa-url').value.trim();
          const name = card.querySelector('#wa-name').value.trim();
          const key = card.querySelector('#wa-key').value.trim();
          if (!url || !name || !key) {
            window.AxonUI && AxonUI.toast('Preencha todos os 3 campos', { type: 'error' });
            return;
          }
          connectBtn.disabled = true;
          connectBtn.textContent = 'Conectando…';
          try {
            const r = await api(`/v1/agents/${agentId}/whatsapp`, {
              method: 'POST',
              body: JSON.stringify({ instance_url: url, instance_name: name, api_key: key }),
            });
            window.AxonUI && AxonUI.toast(`WhatsApp conectado! Status: ${r.connection?.status || 'ok'}`, { type: 'success' });
            closeOverlay();
            location.reload();
          } catch (e) {
            window.AxonUI && AxonUI.toast('Falha: ' + e.message, { type: 'error', durationMs: 8000 });
            connectBtn.disabled = false;
            connectBtn.textContent = 'Conectar';
          }
        };
      }

      function renderWaConnectedView(agentId, agentName, conn) {
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div>
              <h2 style="margin:0;font-size:18px;">💬 WhatsApp conectado</h2>
              <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${escapeHtml(agentName)}</div>
            </div>
            <button data-act="close" style="background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;line-height:1;">×</button>
          </div>

          <div style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:12px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
            <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;"></span>

            <div><strong>Servidor Evolution:</strong></div>
            <div class="mono" style="color:var(--text-dim);font-size:11px;word-break:break-all;margin-bottom:10px;">${escapeHtml(conn.instance_url)}</div>
            <div><strong>Nome da instância:</strong> <span class="mono" style="color:var(--text-dim);">${escapeHtml(conn.instance_name)}</span></div>
            <div><strong>Webhook registrado:</strong></div>
            <div class="mono" style="color:var(--text-muted);font-size:10px;word-break:break-all;margin-bottom:10px;">${escapeHtml(conn.webhook_url || '')}</div>
            ${conn.last_event_at ? `<div><strong>Última atividade:</strong> ${relativeTime(conn.last_event_at)}</div>` : ''}
          </div>

          <div style="margin-top:20px;padding:12px;background:rgba(124,92,255,0.06);border-radius:6px;font-size:12px;color:var(--text-dim);">
            <strong style="color:var(--text);">Próximos passos:</strong><br/>
            • <a href="/whatsapp" style="color:var(--accent-2);">Veja contatos e memória →</a><br/>
            • Reconfigure a instância no painel da Evolution se precisar
          </div>

          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
            <button data-act="close" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;">Fechar</button>
            <button data-act="disconnect" style="background:#ff5f57;color:white;border:none;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">Desconectar</button>
          </div>
        `;
      }

      // ─── QR Code flow templates ─────────────────────────────────
      function renderWaQrLoading(agentName) {
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div>
              <h2 style="margin:0;font-size:18px;">📱 Conectando WhatsApp</h2>
              <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${escapeHtml(agentName)}</div>
            </div>
            <button data-act="close" style="background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;line-height:1;">×</button>
          </div>
          <div style="text-align:center;padding:48px 16px;">
            <div style="display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            <p style="font-size:13px;color:var(--text-dim);margin-top:16px;">Gerando seu QR Code…</p>
          </div>
          <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        `;
      }

      function renderWaQrView(agentName, qrBase64, pairingCode) {
        const pairingBlock = pairingCode ? `

            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Sem câmera? Pareie com código</div>
            <div id="wa-pairing-code" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--accent-2);letter-spacing:2px;">${escapeHtml(pairingCode)}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:6px;">No celular: <em>WhatsApp → Configurações → Aparelhos conectados → Conectar com número</em></div>
          </div>` : '';

        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div>
              <h2 style="margin:0;font-size:18px;">📱 Conectar ao WhatsApp</h2>

          <div style="background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.18);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.7;color:var(--text);">
            <strong style="color:#22c55e;display:block;margin-bottom:8px;">Como conectar (3 passos):</strong>
            <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;"><span style="background:#22c55e;color:#000;font-weight:700;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;">1</span><span>Abra o <strong>WhatsApp</strong> no celular do número que vai atender</span></div>
            <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;"><span style="background:#22c55e;color:#000;font-weight:700;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;">2</span><span>Toque em <strong>Configurações → Aparelhos conectados → Conectar um aparelho</strong></span></div>
            <div style="display:flex;gap:10px;align-items:flex-start;"><span style="background:#22c55e;color:#000;font-weight:700;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;">3</span><span>Aponte a câmera do celular pro QR Code aí em cima</span></div>

            <button data-act="refresh-qr" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:9px 14px;border-radius:6px;font-size:12px;cursor:pointer;">🔄 Atualizar QR</button>

            </div>

      }

      function renderWaError(agentName, errorMessage) {
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div>
              <h2 style="margin:0;font-size:18px;">⚠️ Não consegui gerar o QR</h2>
              <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${escapeHtml(agentName)}</div>
            </div>
            <button data-act="close" style="background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;line-height:1;">×</button>
          </div>
          <div style="background:rgba(255,95,87,0.06);border:1px solid rgba(255,95,87,0.2);border-radius:8px;padding:14px;font-size:12px;color:var(--text-dim);margin-bottom:16px;word-break:break-word;">
            ${escapeHtml(errorMessage || 'Erro desconhecido')}
          </div>

        return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
        });
      }

      function relativeTime(iso) {
        const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
        if (s < 60) return s + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
      }

      function computeBurnRate(txs, days = 7) {
        const cutoff = Date.now() - days * 86400_000;
        const windowSpend = txs
          .filter((t) => t.type === 'debit' && new Date(t.created_at).getTime() >= cutoff)
          .reduce((sum, t) => sum + Math.abs(Number(t.amount_usdc)), 0);
        return windowSpend / days;
      }
