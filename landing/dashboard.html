<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axon · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
    <style>
      :root {
        --bg: #0a0a0b;
        --bg-elev: #111114;
        --bg-card: #16161a;
        --border: #25252b;
        --text: #eeeef0;
        --text-dim: #9a9aa4;
        --text-muted: #6a6a76;
        --accent: #7c5cff;
        --accent-2: #19d5c6;
        --danger: #ff5f57;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .container { max-width: 1120px; margin: 0 auto; padding: 32px 24px; }
      header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,11,0.8);
        backdrop-filter: blur(10px);
        position: sticky; top: 0; z-index: 10;
      }
      .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
      .logo-dot { width: 12px; height: 12px; border-radius: 50%;
        background: linear-gradient(135deg, #7c5cff, #19d5c6);
      }
      .key-chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--bg-card);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }
      .key-chip button {
        background: none; border: none; color: var(--text-dim);
        cursor: pointer; padding: 0 0 0 10px; font-size: 12px;
      }
      h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 24px; }
      h2 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
      }
      .metric-label {
        font-size: 13px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.05em;
        margin-bottom: 8px;
      }
      .metric-value {
        font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
        font-family: 'JetBrains Mono', monospace;
      }
      .metric-value .unit { font-size: 15px; color: var(--text-muted); margin-left: 8px; font-family: 'Inter', sans-serif; }
      .metric-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
      .section { margin-bottom: 32px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        text-align: left; font-weight: 500;
        color: var(--text-muted); padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
      }
      td { padding: 12px; border-bottom: 1px solid var(--border); }
      tr:last-child td { border-bottom: none; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .positive { color: #4ade80; }
      .negative { color: var(--danger); }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        color: var(--text-dim);
      }
      .pill.hit { background: rgba(25, 213, 198, 0.1); color: var(--accent-2); border-color: rgba(25,213,198,0.3); }
      .pill.miss { background: rgba(124, 92, 255, 0.1); color: var(--accent); border-color: rgba(124,92,255,0.3); }
      .bar-row {
        display: grid; grid-template-columns: 140px 1fr 110px;
        gap: 12px; align-items: center; padding: 10px 0;
        font-size: 14px;
      }
      .bar {
        background: var(--bg-elev); height: 8px; border-radius: 4px; overflow: hidden;
        position: relative;
      }
      .bar-fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        background: linear-gradient(90deg, #7c5cff, #19d5c6);
        border-radius: 4px;
      }
      .login-wrap {
        max-width: 440px; margin: 120px auto;
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 14px; padding: 40px 32px;
      }
      .login-wrap h1 { margin-bottom: 8px; }
      .login-wrap p { color: var(--text-dim); margin-bottom: 24px; font-size: 15px; }
      input[type="text"], input[type="password"] {
        width: 100%; padding: 12px 16px;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        font-family: 'JetBrains Mono', monospace; font-size: 14px;
        margin-bottom: 12px;
      }
      input:focus { outline: none; border-color: var(--accent); }
      button.primary {
        width: 100%; padding: 12px 18px;
        background: linear-gradient(135deg, #7c5cff, #19d5c6);
        color: #0a0a0b; border: none; border-radius: 8px;
        font-weight: 700; cursor: pointer; font-size: 14px;
      }
      .error {
        color: var(--danger); font-size: 13px; margin-bottom: 12px;
        padding: 10px 12px; background: rgba(255, 95, 87, 0.08);
        border: 1px solid rgba(255, 95, 87, 0.2); border-radius: 6px;
      }
      .empty { color: var(--text-muted); text-align: center; padding: 40px; font-size: 14px; }

      /* Deposit hero */
      .deposit-hero {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 24px;
        align-items: center;
        background: linear-gradient(135deg, rgba(124,92,255,0.06), rgba(25,213,198,0.04));
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px 28px;
        margin-bottom: 24px;
      }
      .deposit-hero .qr-img {
        display: block;
        width: 150px; height: 150px;
        background: #fff; border-radius: 8px;
        padding: 8px; box-sizing: content-box;
      }
      .deposit-info { min-width: 0; }
      .deposit-info .label {
        font-size: 12px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
      }
      .deposit-info .network-pill {
        display: inline-block;
        background: rgba(25,213,198,0.1); color: var(--accent-2);
        border: 1px solid rgba(25,213,198,0.3);
        padding: 2px 8px; border-radius: 4px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.04em; text-transform: uppercase;
        margin-bottom: 12px;
        white-space: nowrap;
      }
      .deposit-info .addr {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px; color: var(--text);
        background: var(--bg-elev);
        border: 1px solid var(--border);
        padding: 10px 14px; border-radius: 6px;
        margin-bottom: 10px;
        display: flex; align-items: center; gap: 10px;
        min-width: 0;
      }
      .deposit-info .addr code {
        flex: 1; min-width: 0;
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
        /* subtle scroll hint: show via faded edges */
        mask-image: linear-gradient(90deg, #000 calc(100% - 16px), transparent);
        -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 16px), transparent);
      }
      .deposit-info .copy-btn { flex-shrink: 0; }
      @media (max-width: 640px) {
        .deposit-hero {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 20px;
          text-align: center;
        }
        .deposit-hero > div:first-child { display: flex; justify-content: center; }
        .deposit-info { text-align: left; }
      }
      .deposit-info .warning {
        font-size: 12px; color: #ff7a6f;
        display: flex; align-items: center; gap: 6px;
      }
      .copy-btn {
        background: transparent; border: 1px solid var(--border);
        color: var(--text-dim); font-size: 11px; font-weight: 600;
        padding: 5px 10px; border-radius: 5px;
        cursor: pointer; font-family: 'Inter', sans-serif;
        letter-spacing: 0.04em; text-transform: uppercase;
        transition: all 0.15s;
      }
      .copy-btn:hover { color: var(--text); border-color: var(--accent); }
      .copy-btn.copied { background: rgba(25,213,198,0.15); color: var(--accent-2); border-color: var(--accent-2); }

      /* Try a call */
      .try-call-code {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 18px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; line-height: 1.6;
        color: var(--text-dim);
        position: relative;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: pre;
      }
      .try-call-code .tok { color: var(--text); }
      .try-call-code .str { color: var(--accent-2); }
      .try-call-code .flag { color: #fbbf24; }
      .try-call-code .copy-btn {
        position: sticky;
        float: right;
        top: 0;
      }
      @media (max-width: 640px) {
        .try-call-code { font-size: 11px; padding: 12px 14px; }
      }

      /* Responsive table wrap */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Transaction type styling */
      .tx-type {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 12px; font-weight: 600;
        padding: 3px 10px; border-radius: 4px;
        letter-spacing: 0.02em;
      }
      .tx-type.debit   { background: rgba(154,154,164,0.1);  color: var(--text-dim); }
      .tx-type.credit  { background: rgba(74,222,128,0.12);  color: #4ade80; }
      .tx-type.refund  { background: rgba(56,189,248,0.12);  color: #38bdf8; }
      .tx-type.bonus   { background: rgba(251,191,36,0.12);  color: #fbbf24; }
      .tx-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

      /* Clickable transaction rows + expand panel */
      tr.tx-row { cursor: pointer; transition: background 120ms ease; }
      tr.tx-row:hover { background: rgba(255,255,255,0.025); }
      tr.tx-row.is-open { background: rgba(124,92,255,0.06); }
      tr.tx-row .tx-chevron {
        display: inline-block; width: 10px; color: var(--text-muted);
        font-size: 10px; transition: transform 120ms ease; margin-right: 4px;
      }
      tr.tx-row.is-open .tx-chevron { transform: rotate(90deg); color: var(--accent); }
      tr.tx-detail-row > td {
        background: rgba(255,255,255,0.02);
        padding: 14px 18px 18px;
        border-top: 1px dashed rgba(255,255,255,0.06);
      }
      .tx-detail-grid {
        display: grid; grid-template-columns: 150px minmax(0, 1fr);
        gap: 6px 18px; font-size: 12px;
      }
      .tx-detail-grid .k { color: var(--text-muted); }
      .tx-detail-grid .v { word-break: break-all; }
      @media (max-width: 640px) {
        .tx-detail-grid { grid-template-columns: 1fr; gap: 2px 0; }
        .tx-detail-grid .k { margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      }

      /* Generated-images strip (lives between agent header and messages) */
      .gallery-strip {
        display: flex; gap: 8px; padding: 10px 12px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        background: rgba(255,255,255,0.015);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .gallery-strip[hidden] { display: none; }
      .gallery-strip .gs-label {
        flex: 0 0 auto;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--text-muted); align-self: center; padding-right: 4px;
        white-space: nowrap;
      }
      .gallery-tile {
        position: relative; flex: 0 0 auto;
        width: 64px; height: 64px; border-radius: 6px; overflow: hidden;
        cursor: zoom-in; background: #000;
        border: 1px solid rgba(255,255,255,0.08);
        transition: transform 100ms ease, border-color 100ms ease;
      }
      .gallery-tile:hover { transform: scale(1.04); border-color: var(--accent); }
      .gallery-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .gallery-tile .dl-btn {
        position: absolute; right: 2px; bottom: 2px;
        background: rgba(0,0,0,0.7); color: #fff;
        border: 0; border-radius: 3px; padding: 2px 5px;
        font-size: 10px; cursor: pointer; line-height: 1;
        opacity: 0; transition: opacity 120ms ease;
      }
      .gallery-tile:hover .dl-btn { opacity: 1; }
      .gallery-tile .dl-btn:hover { background: var(--accent); }

      /* Tier badge in header */
      .tier-badge {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 4px 10px; border-radius: 4px;
        cursor: pointer; transition: transform 100ms ease, opacity 100ms ease;
        white-space: nowrap;
      }
      .tier-badge:hover { transform: translateY(-1px); }
      .tier-badge.tier-free { background: rgba(154,154,164,0.15); color: var(--text-dim); }
      .tier-badge.tier-pro  { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a0a0b; }
      .tier-badge.tier-team { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #0a0a0b; }
      .tier-badge.tier-enterprise { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff; }
      .tier-badge.expired { opacity: 0.5; text-decoration: line-through; }

      /* Tile fade-in when generated or restored */
      @keyframes tile-pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      .gallery-tile { animation: tile-pop 180ms ease-out; }

      /* ===== Lightbox modal for full-size images ===== */
      .lightbox {
        position: fixed; inset: 0; z-index: 2000;
        background: rgba(8, 8, 12, 0.88);
        display: none; align-items: center; justify-content: center;
        padding: 24px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .lightbox[data-open="1"] { display: flex; animation: fade-in 160ms ease-out; }
      .lightbox img {
        max-width: 100%; max-height: calc(100vh - 96px);
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        animation: tile-pop 200ms ease-out;
      }
      .lightbox-meta {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        background: rgba(20,20,28,0.9); border: 1px solid var(--border);
        padding: 8px 14px; border-radius: 8px;
        font-size: 12px; color: var(--text-dim);
        max-width: calc(100% - 48px); display: flex; gap: 12px; align-items: center;
      }
      .lightbox-meta .lb-prompt {
        max-width: 60vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        font-style: italic;
      }
      .lightbox-meta .lb-action {
        background: transparent; border: 1px solid var(--border); color: var(--text);
        padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
      }
      .lightbox-meta .lb-action:hover { background: var(--accent); border-color: var(--accent); }
      .lightbox-close {
        position: absolute; top: 16px; right: 18px;
        background: transparent; border: 0; color: var(--text-muted);
        font-size: 28px; line-height: 1; cursor: pointer; padding: 4px 10px;
      }
      .lightbox-close:hover { color: var(--text); }
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

      /* ===== Toasts (bottom-right ephemeral feedback) ===== */
      .toast-container {
        position: fixed; bottom: 16px; right: 16px; z-index: 2500;
        display: flex; flex-direction: column-reverse; gap: 8px;
        pointer-events: none;
      }
      .toast {
        background: rgba(20,20,28,0.96); border: 1px solid var(--border);
        color: var(--text); padding: 10px 14px; border-radius: 6px;
        font-size: 13px; max-width: 320px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        animation: toast-in 200ms ease-out;
        pointer-events: auto;
      }
      .toast.success { border-left: 3px solid #4ade80; }
      .toast.error   { border-left: 3px solid #f87171; }
      .toast.info    { border-left: 3px solid var(--accent); }
      .toast.leaving { animation: toast-out 200ms ease-in forwards; }
      @keyframes toast-in  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes toast-out { to { opacity: 0; transform: translateY(8px); } }

      /* ===== Code-block copy button (revealed on hover) ===== */
      .md pre { position: relative; }
      .md pre .code-copy {
        position: absolute; top: 6px; right: 6px;
        background: rgba(20,20,28,0.85); color: var(--text-muted);
        border: 1px solid var(--border); border-radius: 4px;
        padding: 3px 8px; font-size: 10px; cursor: pointer;
        opacity: 0; transition: opacity 120ms ease, color 120ms ease;
        text-transform: uppercase; letter-spacing: 0.06em;
      }
      .md pre:hover .code-copy { opacity: 1; }
      .md pre .code-copy:hover { color: var(--text); border-color: var(--accent); }
      .md pre .code-copy.ok { color: #4ade80; border-color: #4ade80; }

      /* ===== Typing indicator (animated dots while agent thinks) ===== */
      .typing-indicator {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 6px 0; font-size: 13px; color: var(--text-muted);
      }
      .typing-indicator .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--text-muted); animation: typing 1.2s infinite ease-in-out;
      }
      .typing-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
      .typing-indicator .dot:nth-child(3) { animation-delay: 0.30s; }
      @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }

      /* ===== Message fade-in ===== */
      @keyframes msg-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      .agent-messages .msg { animation: msg-in 180ms ease-out; }

      /* ===== Run button: subtle pulse while running ===== */
      .agent-btn.run.is-running {
        background: rgba(124,92,255,0.18) !important;
        color: var(--text-muted) !important;
        cursor: not-allowed;
      }

      /* --- Agent chat --- */
      .agent-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
      }
      @media (max-width: 900px) {
        .agent-wrap { grid-template-columns: minmax(0, 1fr); }
      }
      .agent-chat, .agent-brain {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 18px;
        display: flex; flex-direction: column;
        min-height: 480px;
        /* Prevent grid/flex children from blowing out on narrow screens */
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }
      .agent-header {
        font-size: 12px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.08em;
        margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
      }
      .agent-header .reset-btn {
        background: none; border: none;
        color: var(--text-muted); font-size: 11px;
        padding: 2px 4px; border-radius: 3px;
        cursor: pointer; letter-spacing: 0.06em;
        text-transform: lowercase;
      }
      .agent-header .reset-btn:hover { color: var(--text-dim); }
      .agent-messages {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 50vh;
        padding-right: 4px;
        margin-bottom: 12px;
        min-width: 0; max-width: 100%;
      }
      .msg { margin-bottom: 14px; }
      .msg-role {
        font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.08em; margin-bottom: 4px;
        color: var(--text-muted);
      }
      .msg-user .msg-role { color: var(--accent-2); }
      .msg-assistant .msg-role { color: var(--accent); }
      .msg-content {
        font-size: 14px; line-height: 1.6; color: var(--text-dim);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        min-width: 0; max-width: 100%;
      }
      .msg-assistant .msg-content { color: var(--text); }
      .agent-input-bar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .agent-input-bar textarea {
        width: 100%;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 11px 14px; font-family: 'Inter', sans-serif;
        font-size: 14px; resize: vertical;
        min-height: 88px; max-height: 280px; line-height: 1.5;
      }
      .agent-input-bar textarea:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.12);
      }
      .agent-input-bar textarea::placeholder { color: var(--text-muted); }
      .agent-action-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .agent-action-row .hint {
        font-size: 11px; color: var(--text-muted);
        letter-spacing: 0.04em;
      }
      .agent-action-row .kbd {
        font-family: 'JetBrains Mono', monospace;
        background: var(--bg-elev); border: 1px solid var(--border);
        padding: 1px 5px; border-radius: 3px; font-size: 10.5px;
        color: var(--text-dim);
      }
      .agent-btn {
        padding: 9px 20px; border-radius: 7px; border: 1px solid transparent;
        font-weight: 600; cursor: pointer; font-size: 13px;
        font-family: 'Inter', sans-serif; letter-spacing: 0.01em;
        white-space: nowrap;
      }
      .agent-btn.run {
        background: var(--accent); color: #fff;
        border-color: var(--accent);
      }
      .agent-btn.run:hover:not(:disabled) { background: #6b4ff0; border-color: #6b4ff0; }
      .agent-btn.run:disabled { opacity: 0.55; cursor: not-allowed; }
      .agent-btn.stop {
        background: transparent; color: var(--danger);
        border-color: rgba(255,95,87,0.4);
      }
      .agent-btn.stop:hover { background: rgba(255,95,87,0.08); }
      .agent-brain .brain-events {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 50vh;
        display: flex; flex-direction: column; gap: 8px;
        min-width: 0; max-width: 100%;
      }
      .brain-event { min-width: 0; max-width: 100%; overflow: hidden; }
      .brain-event {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px; padding: 10px 12px; font-size: 12px;
      }
      .brain-event.pending { border-color: rgba(124,92,255,0.5); }
      .brain-event.error   { border-color: rgba(255,95,87,0.5); }
      .brain-event .tool-name {
        font-family: 'JetBrains Mono', monospace; font-weight: 600;
        color: var(--text); font-size: 12px; margin-bottom: 4px;
      }
      .brain-event .tool-args {
        font-family: 'JetBrains Mono', monospace; font-size: 11px;
        color: var(--text-dim); word-break: break-all; margin-bottom: 6px;
        max-height: 60px; overflow: hidden;
      }
      .brain-event .tool-stats { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
      .stat {
        padding: 2px 6px; border-radius: 3px;
        font-family: 'JetBrains Mono', monospace; font-size: 11px;
      }
      .stat.cost      { background: rgba(124,92,255,0.12); color: #b59aff; }
      .stat.cache-hit { background: rgba(25,213,198,0.12); color: var(--accent-2); }
      .stat.cache-miss{ background: rgba(154,154,164,0.1); color: var(--text-dim); }
      .stat.cache-local{ background: rgba(251,191,36,0.12); color: #fbbf24; }
      .stat.latency   { background: rgba(154,154,164,0.1); color: var(--text-dim); }
      .stat.err       { background: rgba(255,95,87,0.15); color: var(--danger); }
      .stat.pending {
        background: rgba(124,92,255,0.12); color: #b59aff;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
      .session-footer {
        margin-top: 12px; padding: 10px 14px;
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px;
        display: flex; gap: 10px; flex-wrap: wrap;
        font-size: 12px; color: var(--text-muted);
      }
      .session-footer strong { color: var(--text); font-family: 'JetBrains Mono', monospace; }
      .session-footer .divider { color: var(--border); }

      /* Modal */
      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 1000; padding: 20px;
      }
      .modal-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 12px; padding: 28px 32px;
        max-width: 480px; width: 100%;
      }
      .modal-card h3 { margin: 0 0 12px; font-size: 20px; }
      .modal-card p { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin: 0 0 10px; }
      .modal-card ul { color: var(--text-dim); font-size: 14px; line-height: 1.7; margin: 0 0 12px; padding-left: 20px; }
      .modal-card .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
      .modal-card .btn-m { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
      .modal-card .btn-m.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a0a0b; }
      .modal-card .btn-m.secondary { background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border); }

      /* Quick-start suggestions — inline, understated */
      .quick-chips {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
        margin: 6px 2px 10px;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.9;
      }
      .quick-chips .qc-label {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--text-muted);
        margin-right: 10px;
        font-size: 11px;
      }
      .chip {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 12.5px;
        padding: 0;
        margin: 0;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: color 0.12s;
      }
      .chip:hover { color: var(--accent-2); }
      .chip:focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; border-radius: 2px; }
      .chip + .chip::before {
        content: '·';
        margin: 0 8px;
        color: var(--border);
        pointer-events: none;
      }

      /* Markdown render inside assistant message */
      .msg-content.md { white-space: normal; }
      .msg-content.md p { margin: 0 0 10px 0; }
      .msg-content.md p:last-child { margin-bottom: 0; }
      .msg-content.md h1, .msg-content.md h2, .msg-content.md h3, .msg-content.md h4 {
        margin: 14px 0 6px 0; color: var(--text); font-weight: 700;
        letter-spacing: -0.01em; line-height: 1.3;
      }
      .msg-content.md h1 { font-size: 18px; }
      .msg-content.md h2 { font-size: 16px; }
      .msg-content.md h3 { font-size: 15px; }
      .msg-content.md h4 { font-size: 14px; color: var(--accent-2); }
      .msg-content.md strong { color: var(--text); font-weight: 600; }
      .msg-content.md em { color: var(--text); font-style: italic; }
      .msg-content.md ul, .msg-content.md ol { padding-left: 22px; margin: 0 0 10px 0; }
      .msg-content.md li { margin: 3px 0; }
      .msg-content.md code {
        font-family: 'JetBrains Mono', monospace;
        background: var(--bg-elev); color: #e4e4ff;
        padding: 1px 5px; border-radius: 3px;
        border: 1px solid var(--border);
        font-size: 12.5px;
        word-break: break-all;
      }
      .msg-content.md pre {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 12px 14px;
        margin: 10px 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12.5px; line-height: 1.55;
        max-width: 100%;
      }
      .msg-content.md pre code {
        background: transparent; border: none; padding: 0;
        color: var(--text); font-size: 12.5px;
        word-break: normal; white-space: pre;
      }
      .msg-content.md a {
        color: var(--accent-2); text-decoration: underline; text-underline-offset: 2px;
        overflow-wrap: anywhere; word-break: break-all;
      }
      .msg-content.md a:hover { color: var(--text); }
      .msg-content.md blockquote {
        border-left: 3px solid var(--border);
        padding-left: 12px; margin: 10px 0;
        color: var(--text-dim); font-style: italic;
      }
      .msg-content.md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
      /* Tables: wrap so they horizontally scroll on narrow screens instead of
         pushing the page wider than viewport */
      .msg-content.md table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 13px;
        white-space: nowrap;
      }
      .msg-content.md th, .msg-content.md td { border: 1px solid var(--border); padding: 6px 10px; }
      .msg-content.md th { background: var(--bg-elev); color: var(--text); font-weight: 600; }
      .msg-content.md img { max-width: 100%; height: auto; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const STORAGE_KEY = 'axon.apiKey';
      const BASE_KEY = 'axon.baseUrl';

      function html(parts, ...args) {
        return parts.reduce((a, p, i) => a + p + (args[i] ?? ''), '');
      }

      function $(root, sel) { return root.querySelector(sel); }

      async function api(path, opts = {}) {
        const key = localStorage.getItem(STORAGE_KEY);
        const base = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const res = await fetch(base + path, {
          ...opts,
          headers: { 'x-api-key': key, 'content-type': 'application/json', ...(opts.headers || {}) },
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).message || res.statusText);
        return res.json();
      }

      function formatUsdc(s) { return Number(s).toFixed(4); }

      // Render the user's owned agents card on dashboard
      function renderMyAgents(agents) {
        const el = document.getElementById('my-agents-card');
        if (!el) return;
        if (!agents || agents.length === 0) {
          el.innerHTML = `
            <div style="text-align:center;padding:32px 16px;">
              <div style="font-size:14px;color:var(--text-dim);margin-bottom:6px;">Você ainda não tem agentes.</div>
              <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Pegue um template pronto e tenha um chatbot rodando em 5 minutos.</div>
              <a href="/build" style="display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0a0a0b;padding:10px 22px;border-radius:6px;text-decoration:none;font-weight:700;font-size:13px;">Criar agente →</a>
              <div style="font-size:11px;color:var(--text-muted);margin-top:14px;">Ou veja agentes prontos em <a href="/explore" style="color:var(--accent-2);">/explore</a></div>
            </div>
          `;
          return;
        }
        const formatChannels = (a) => {
          const ch = [];
          ch.push('<a href="/agent/' + escapeAttr(a.slug) + '" target="_blank" title="Abrir no navegador" style="color:var(--text-dim);text-decoration:none;font-size:11px;padding:2px 6px;border-radius:3px;background:var(--bg);border:1px solid var(--border);">Web</a>');
          if (a.pay_mode === 'owner') {
            ch.push('<span title="HTTP API ativa" style="color:#4ade80;font-size:11px;padding:2px 6px;border-radius:3px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);">API</span>');
            ch.push('<span title="Embed ready" style="color:var(--accent);font-size:11px;padding:2px 6px;border-radius:3px;background:rgba(124,92,255,0.1);border:1px solid rgba(124,92,255,0.3);">Embed</span>');
          }
          return ch.join(' ');
        };
        el.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${agents.map(a => `
              <div style="display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:12px 14px;background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;">
                <span style="width:10px;height:10px;border-radius:50%;background:${escapeAttr(a.primary_color)};flex:0 0 auto;"></span>
                <div style="min-width:0;">
                  <div style="font-weight:600;font-size:14px;margin:0 0 3px;">${escapeHtml(a.name)}</div>
                  <div style="font-size:11px;color:var(--text-muted);font-family:JetBrains Mono,monospace;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">/agent/${escapeHtml(a.slug)} · ${a.tool_count} tools · ${a.pay_mode === 'owner' ? 'owner-paid' : 'visitor-paid'}</div>
                  <div style="display:flex;gap:5px;">${formatChannels(a)}</div>
                </div>
                <a href="/build" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:5px;font-size:12px;text-decoration:none;white-space:nowrap;">Manage →</a>
              </div>
            `).join('')}
          </div>
        `;
      }

      function escapeAttr(s) {
        return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      }

      function renderLogin(err) {
        document.getElementById('app').innerHTML = `
          <div class="login-wrap">
            <h1>Axon Dashboard</h1>
            <p>Paste your API key to get started.</p>
            ${err ? `<div class="error">${err}</div>` : ''}
            <input type="text" id="base" placeholder="https://axon-kedb.onrender.com" />
            <input type="password" id="key" placeholder="ax_live_..." />
            <button class="primary" id="go">Open dashboard</button>
          </div>
        `;
        document.getElementById('base').value = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        document.getElementById('go').onclick = async () => {
          const base = document.getElementById('base').value.trim();
          const key = document.getElementById('key').value.trim();
          if (!key) return renderLogin('API key is required');
          localStorage.setItem(BASE_KEY, base);
          localStorage.setItem(STORAGE_KEY, key);
          try { await api('/v1/wallet/balance'); renderApp(); }
          catch (e) { localStorage.removeItem(STORAGE_KEY); renderLogin(e.message); }
        };
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
        });
      }

      function relativeTime(iso) {
        const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
        if (s < 60) return s + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
      }

      function computeBurnRate(txs, days = 7) {
        const cutoff = Date.now() - days * 86400_000;
        const windowSpend = txs
          .filter((t) => t.type === 'debit' && new Date(t.created_at).getTime() >= cutoff)
          .reduce((sum, t) => sum + Math.abs(Number(t.amount_usdc)), 0);
        return windowSpend / days;
      }

      async function renderApp() {
        const root = document.getElementById('app');
        root.innerHTML = `
          <header>
            <div class="brand"><span class="logo-dot"></span> axon</div>
            <nav style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
              <a href="/build" style="color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:5px;background:rgba(124,92,255,0.1);border:1px solid rgba(124,92,255,0.3);">+ Build agent</a>
              <a href="/explore" style="color:var(--text-dim);text-decoration:none;font-size:13px;padding:6px 10px;">Explore</a>
              <a href="/upgrade" style="color:var(--text-dim);text-decoration:none;font-size:13px;padding:6px 10px;">Plans</a>
            </nav>
            <div style="display:flex; gap:8px; align-items:center;">
              <span class="tier-badge" id="tier-badge" title="Click to manage subscription" style="display:none">free</span>
              <span class="key-chip" id="keyview">ax_live_…</span>
              <button class="key-chip" id="logout">sign out</button>
            </div>
          </header>
          <div class="container">
            <h1>Dashboard</h1>
            <div id="deposit-hero-wrap"></div>
            <div class="grid" id="metrics">Loading…</div>
            <div class="section">
              <h2 style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                <span>Your agents</span>
                <a href="/build" style="font-size:13px;font-weight:600;color:#0a0a0b;background:linear-gradient(135deg,var(--accent),var(--accent-2));padding:8px 16px;border-radius:6px;text-decoration:none;">+ New agent</a>
              </h2>
              <div id="my-agents-card" class="card">Loading…</div>
            </div>
            <div class="section">
              <h2>Try a call</h2>
              <div class="card" id="trycall">Loading…</div>
            </div>
            <div class="section">
              <h2>Spend by API (last 30 days)</h2>
              <div class="card" id="byapi">Loading…</div>
            </div>
            <div class="section">
              <h2 translate="no">Agent</h2>
              <div class="agent-wrap">
                <div class="agent-chat">
                  <div class="agent-header">
                    <span translate="no">Agent</span>
                    <button class="reset-btn" id="agent-reset" translate="no">reset</button>
                  </div>
                  <div class="gallery-strip" id="gallery-strip" hidden>
                    <span class="gs-label" translate="no">Images</span>
                  </div>
                  <div class="agent-messages" id="agent-messages"></div>
                  <div class="quick-chips" id="quick-chips" translate="no">
                    <span class="qc-label">Try</span>
                    <button class="chip" data-tpl="Research and summarize in markdown: ">Research</button>
                    <button class="chip" data-tpl="Write a short 3-paragraph article in markdown about: ">Write</button>
                    <button class="chip" data-tpl="Compare side-by-side in a markdown table: ">Compare</button>
                    <button class="chip" data-tpl="Write complete JavaScript code, with comments, that: ">Code</button>
                    <button class="chip" data-tpl="Extract the main content from this URL and summarize in bullets: ">Extract URL</button>
                    <button class="chip" data-tpl="Use Wikipedia + arXiv to give me a researched answer about: ">Wiki+arXiv</button>
                    <button class="chip" data-tpl="What does Hacker News think about: ">HN take</button>
                    <button class="chip" data-tpl="Get the weather forecast for the next 3 days in: ">Weather</button>
                    <button class="chip" data-tpl="Convert these amounts and show as a markdown table: ">FX</button>
                    <button class="chip" data-tpl="Generate an image of: ">Image</button>
                  </div>
                  <div class="agent-input-bar">
                    <textarea id="agent-input" placeholder="What do you want the agent to build?" rows="3"></textarea>
                    <div class="agent-action-row">
                      <span class="hint"><span class="kbd">Ctrl</span>+<span class="kbd">Enter</span> to run</span>
                      <div>
                        <button class="agent-btn stop" id="agent-stop" hidden translate="no">Stop</button>
                        <button class="agent-btn run" id="agent-run" translate="no">Run</button>
                      </div>
                    </div>
                  </div>
                  <div class="session-footer" id="agent-footer"></div>
                </div>
                <div class="agent-brain">
                  <div class="agent-header"><span translate="no">Brain</span></div>
                  <div class="brain-events" id="brain-events"></div>
                </div>
              </div>
            </div>
            <div class="section">
              <h2>Recent transactions</h2>
              <div class="card" id="tx">Loading…</div>
            </div>
          </div>
        `;

        const key = localStorage.getItem(STORAGE_KEY);
        const base = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const keyShort = key.slice(0, 16) + '…';
        document.getElementById('keyview').textContent = keyShort;
        document.getElementById('logout').onclick = () => {
          localStorage.removeItem(STORAGE_KEY);
          renderLogin();
        };

        try {
          const [bal, usage, byApi, txs, sub, myAgents] = await Promise.all([
            api('/v1/wallet/balance'),
            api('/v1/usage'),
            api('/v1/usage/by-api'),
            api('/v1/wallet/transactions?limit=100'),
            api('/v1/subscription').catch(() => null),
            api('/v1/agents').catch(() => ({ data: [] })),
          ]);

          // ---- Your agents ----
          renderMyAgents(myAgents.data || []);

          // ---- Tier badge ----
          if (sub) {
            const tb = document.getElementById('tier-badge');
            if (tb) {
              const tier = sub.tier_effective || 'free';
              tb.textContent = tier;
              tb.className = 'tier-badge tier-' + tier;
              if (sub.tier_active !== 'free' && sub.tier_effective === 'free') {
                tb.classList.add('expired');
                tb.title = 'Subscription expired — click to renew';
              } else if (sub.expires_at) {
                tb.title = `${tier.toUpperCase()} · ${sub.days_remaining}d left · click to manage`;
              } else {
                tb.title = 'Click to upgrade';
              }
              tb.style.display = '';
              tb.onclick = () => { window.location.href = '/upgrade'; };
            }
          }

          // ---- Deposit hero ----
          const depositAddr = bal.address;
          const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=0&data=' + encodeURIComponent(depositAddr);
          document.getElementById('deposit-hero-wrap').innerHTML = `
            <div class="deposit-hero">
              <div>
                <img class="qr-img" src="${qrUrl}" width="150" height="150" alt="QR code for ${depositAddr}" loading="lazy" />
              </div>
              <div class="deposit-info">
                <div class="label">Your deposit address</div>
                <span class="network-pill">USDC · Base L2</span>
                <div class="addr">
                  <code>${depositAddr}</code>
                  <button class="copy-btn" id="copy-addr">Copy</button>
                </div>
                <div class="warning">⚠ Only send USDC on Base network. Other tokens or networks = permanent loss.</div>
              </div>
            </div>
          `;
          document.getElementById('copy-addr').onclick = (e) => copyToClipboard(depositAddr, e.target);

          // ---- Metrics ----
          const hitRatePct = (usage.cache_hit_rate * 100).toFixed(1);
          const burn = computeBurnRate(txs.data, 7);
          const runway = burn > 0 ? Number(bal.available_usdc) / burn : null;
          const runwayDisplay = runway === null ? '—' : runway > 999 ? '999+' : runway.toFixed(0);
          const burnDisplay = burn > 0 ? '$' + burn.toFixed(4) + '/day (7d avg)' : 'No recent spend';

          document.getElementById('metrics').innerHTML = `
            <div class="card">
              <div class="metric-label">Available balance</div>
              <div class="metric-value">${formatUsdc(bal.available_usdc)}<span class="unit">USDC</span></div>
              <div class="metric-sub">
                ${bal.reserved_usdc === '0.000000' ? 'No funds reserved.' : bal.reserved_usdc + ' reserved'}
                · <a href="/buy-usdc" style="color: var(--accent-2); text-decoration: none;">Top up →</a>
              </div>
            </div>
            <div class="card">
              <div class="metric-label">Burn rate</div>
              <div class="metric-value">${runwayDisplay}<span class="unit">days runway</span></div>
              <div class="metric-sub">${burnDisplay}</div>
            </div>
            <div class="card">
              <div class="metric-label">Requests</div>
              <div class="metric-value">${usage.total_requests}</div>
              <div class="metric-sub">${usage.cache_hits} cache hits · ${formatUsdc(usage.total_spent_usdc)} spent</div>
            </div>
            <div class="card">
              <div class="metric-label">Cache hit rate</div>
              <div class="metric-value">${hitRatePct}<span class="unit">%</span></div>
              <div class="metric-sub">More is better — you pay 50% less on hits</div>
            </div>
          `;

          // ---- Try a call ----
          const curlSnippet =

        "Current date: " + new Date().toISOString().slice(0,10) + "."
      ].join("\n");

      let agentSession = null;

      // --- Local tool helpers (run in the user's browser, $0 cost) ---
      function calculateExpr(expr) {
        const e = String(expr).trim();
        // Only allow digits, whitespace, basic math ops, parens, dot, comma, %, and 'e'/'E' for scientific notation
        if (!/^[-+*/().,%\d\seE]+$/.test(e)) {
          throw new Error('Expression has disallowed characters. Only numbers and + - * / % ( ) are allowed.');
        }
        try {
          const val = Function('"use strict"; return (' + e.replace(/,/g, '.') + ')')();
          if (typeof val !== 'number' || !isFinite(val)) throw new Error('Not a finite number');
          return { expression: expr, value: val };
        } catch (err) {
          throw new Error('Invalid math: ' + err.message);
        }
      }

      function getDatetimeInfo(timezone) {
        const now = new Date();
        const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        try {
          const fmt = new Intl.DateTimeFormat('en-US', {
            timeZone: tz,
            dateStyle: 'full',
            timeStyle: 'long',
            hour12: false,
          });
          return {
            iso_utc: now.toISOString(),
            local: fmt.format(now),
            timezone: tz,
            timestamp_ms: now.getTime(),
            day_of_week: now.toLocaleDateString('en-US', { weekday: 'long', timeZone: tz }),
          };
        } catch (e) {
          throw new Error('Invalid timezone: "' + tz + '". Use IANA format like "America/Sao_Paulo".');
        }
      }

      // --- search_arxiv: arXiv returns Atom XML, so we parse client-side ---
      async function searchArxivTool(args) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const t0 = Date.now();
        const params = new URLSearchParams({
          search_query: args.query,
          max_results: String(args.max_results || 5),
          sortBy: 'relevance',
          sortOrder: 'descending',
        });
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), TOOL_TIMEOUT_MS);
        let res;
        try {
          res = await fetch(`${b}/v1/call/arxiv/search?${params.toString()}`, {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + k },
            signal: controller.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          const err = new Error('arxiv ' + res.status + ' ' + text.slice(0, 200));
          err.cost = cost; err.cache = cache; err.latency = latency; err.status = res.status;
          throw err;
        }
        const xml = await res.text();
        let entries = [];
        try {
          const doc = new DOMParser().parseFromString(xml, 'application/xml');
          if (doc.querySelector('parsererror')) throw new Error('xml parse error');
          entries = Array.from(doc.getElementsByTagName('entry')).map((e) => {
            const get = (sel) => {
              const node = e.getElementsByTagName(sel)[0];
              return node ? node.textContent.trim().replace(/\s+/g, ' ') : '';
            };
            const authors = Array.from(e.getElementsByTagName('author')).map((a) => {
              const n = a.getElementsByTagName('name')[0];
              return n ? n.textContent.trim() : '';
            }).filter(Boolean);
            let pdfUrl = '';
            for (const link of Array.from(e.getElementsByTagName('link'))) {
              if (link.getAttribute('type') === 'application/pdf') {
                pdfUrl = link.getAttribute('href') || '';
                break;
              }
            }
            return {
              title: get('title'),
              authors,
              published: get('published'),
              updated: get('updated'),
              summary: get('summary').slice(0, 800),
              arxiv_url: get('id'),
              pdf_url: pdfUrl,
            };
          });
        } catch (parseErr) {
          // Fall back: include raw XML head for the agent to interpret
          return {
            body: { error: 'xml-parse-failed', raw: xml.slice(0, 2000) },
            cost, cache, latency,
          };
        }
        return {
          body: { query: args.query, count: entries.length, entries },
          cost, cache, latency,
        };
      }

      // --- generate_image: Stability SDXL with placeholder system ---
      // Base64 images are huge (~2MB), so we never put the data URL in
      // the LLM message history. We store it under a short id and let
      // the agent reference it as @img:<id> which we expand at render.
      async function generateImageTool(args) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const t0 = Date.now();
        const textPrompts = [{ text: args.prompt, weight: 1 }];
        if (args.negative_prompt) {
          textPrompts.push({ text: args.negative_prompt, weight: -1 });
        }
        const body = {
          text_prompts: textPrompts,
          cfg_scale: 7,
          width: 1024,
          height: 1024,
          samples: 1,
          steps: 30,
        };
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 45000);
        let res;
        try {
          res = await fetch(b + '/v1/call/stability/generate-xl', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + k,
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify(body),
            signal: controller.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const err = new Error(errBody.message || errBody.detail || ('stability ' + res.status));
          err.cost = cost; err.cache = cache; err.latency = latency; err.status = res.status;
          throw err;
        }
        const data = await res.json();
        const artifact = (data.artifacts && data.artifacts[0]) || {};
        if (!artifact.base64) throw new Error('no image returned');
        const shortId = 'img' + Math.random().toString(36).slice(2, 10);
        const dataUrl = 'data:image/png;base64,' + artifact.base64;
        if (!agentSession.images) agentSession.images = {};
        agentSession.images[shortId] = dataUrl;
        addToGallery(shortId, dataUrl, args.prompt);
        return {
          body: {
            status: 'generated',
            ref: '@img:' + shortId,
            seed: artifact.seed,
            size: '1024x1024',
            note: 'Image shown to user. Reference it in your reply as ![short description](@img:' + shortId + ').'
          },
          cost,
          cache,
          latency: Date.now() - t0,
          _imageUrl: dataUrl,
        };
      }

      async function runJsSandbox(code) {
        const workerCode = [
          'self.fetch = undefined;',
          'self.XMLHttpRequest = undefined;',
          'self.importScripts = undefined;',
          'self.onmessage = async (e) => {',
          '  try {',
          '    const fn = new Function("return (async () => { " + e.data + "\\n })()");',
          '    const result = await fn();',
          '    let serialized;',
          '    try { serialized = JSON.stringify(result, null, 2); if (serialized === undefined) serialized = String(result); }',
          '    catch (_) { serialized = String(result); }',
          '    self.postMessage({ ok: true, result: serialized });',
          '  } catch (err) {',
          '    self.postMessage({ ok: false, error: err && err.message ? err.message : String(err) });',
          '  }',
          '};',
        ].join('\n');
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const worker = new Worker(url);
        return new Promise((resolve, reject) => {
          const timer = setTimeout(() => {
            worker.terminate(); URL.revokeObjectURL(url);
            reject(new Error('JS execution timeout (5s)'));
          }, 5000);
          worker.onmessage = (ev) => {
            clearTimeout(timer); URL.revokeObjectURL(url); worker.terminate();
            if (ev.data.ok) resolve({ code: code, result: ev.data.result });
            else reject(new Error(ev.data.error));
          };
          worker.onerror = (ev) => {
            clearTimeout(timer); URL.revokeObjectURL(url); worker.terminate();
            reject(new Error(ev.message || 'worker error'));
          };
          worker.postMessage(code);
        });
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      }

      // ============================================================
      // Persisted gallery — IndexedDB-backed, holds hundreds of images.
      // ============================================================
      // IDB lets us blow past the ~5-10MB localStorage cap (each image is
      // ~2MB base64, so localStorage capped us at 3-5 images). With IDB
      // we comfortably keep 50+ recent images and only evict for UI hygiene.
      const IDB_NAME = 'axon-gallery';
      const IDB_STORE = 'images';
      const IDB_VERSION = 1;
      const MAX_GALLERY = 50;          // soft cap, eviction kicks in past this
      const LEGACY_LS_KEY = 'axon.gallery.v1';

      // In-memory mirror so synchronous code paths (resetAgentSession) keep working
      const IMAGE_CACHE = new Map();   // id -> { id, dataUrl, prompt, createdAt }
      let _idbReady = null;            // Promise<IDBDatabase | null>

      function openImageDB() {
        if (_idbReady) return _idbReady;
        _idbReady = new Promise((resolve) => {
          if (typeof indexedDB === 'undefined') { resolve(null); return; }
          let req;
          try { req = indexedDB.open(IDB_NAME, IDB_VERSION); }
          catch { resolve(null); return; }
          req.onerror = () => resolve(null);
          req.onblocked = () => resolve(null);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(IDB_STORE)) {
              const s = db.createObjectStore(IDB_STORE, { keyPath: 'id' });
              s.createIndex('createdAt', 'createdAt');
            }
          };
          req.onsuccess = () => resolve(req.result);
        });
        return _idbReady;
      }

      async function idbPut(item) {
        const db = await openImageDB();
        if (!db) return false;
        return new Promise((resolve) => {
          try {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            tx.objectStore(IDB_STORE).put(item);
            tx.oncomplete = () => resolve(true);
            tx.onerror = () => resolve(false);
            tx.onabort = () => resolve(false);
          } catch { resolve(false); }
        });
      }

      async function idbGetAll() {
        const db = await openImageDB();
        if (!db) return [];
        return new Promise((resolve) => {
          try {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).getAll();
            req.onsuccess = () => {
              const items = (req.result || []).slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
              resolve(items);
            };
            req.onerror = () => resolve([]);
          } catch { resolve([]); }
        });
      }

      async function idbDelete(id) {
        const db = await openImageDB();
        if (!db) return;
        try {
          const tx = db.transaction(IDB_STORE, 'readwrite');
          tx.objectStore(IDB_STORE).delete(id);
        } catch {}
      }

      async function idbClear() {
        const db = await openImageDB();
        if (!db) return;
        try {
          const tx = db.transaction(IDB_STORE, 'readwrite');
          tx.objectStore(IDB_STORE).clear();
        } catch {}
      }

      // One-shot migration: copy any legacy localStorage items into IDB, then drop the key.
      async function migrateLegacyGallery() {
        let legacy;
        try {
          const raw = localStorage.getItem(LEGACY_LS_KEY);
          if (!raw) return;
          legacy = JSON.parse(raw);
        } catch { legacy = null; }
        if (!legacy || !Array.isArray(legacy.items)) {
          try { localStorage.removeItem(LEGACY_LS_KEY); } catch {}
          return;
        }
        for (const it of legacy.items) {
          if (it && it.id && it.dataUrl) await idbPut(it);
        }
        try { localStorage.removeItem(LEGACY_LS_KEY); } catch {}
      }

      // Build a tile element for an image and wire up its handlers
      function buildGalleryTile(id, dataUrl, prompt) {
        const tile = document.createElement('div');
        tile.className = 'gallery-tile';
        tile.dataset.id = id;
        tile.title = prompt || id;
        tile.innerHTML = `
          <img src="${dataUrl}" alt="${escapeHtml(prompt || '')}" />
          <button class="dl-btn" type="button" data-dl="${id}" title="Download">↓</button>
        `;
        tile.addEventListener('click', (e) => {
          if (e.target.closest('.dl-btn')) return;
          openLightbox(id);
        });
        tile.querySelector('.dl-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = `axon-${id}.png`;
          document.body.appendChild(a); a.click(); a.remove();
          showToast('Image downloaded', 'success');
        });
        return tile;
      }

      // Append a generated image to the strip and persist it. Persistence is async
      // (fire-and-forget) so callers stay synchronous; cache + DOM update immediately.
      function addToGallery(id, dataUrl, prompt, opts) {
        opts = opts || {};
        const strip = document.getElementById('gallery-strip');
        if (!strip) return;

        // Sync: cache + DOM
        const item = { id, dataUrl, prompt: prompt || '', createdAt: Date.now() };
        IMAGE_CACHE.set(id, item);
        if (!opts.skipPersist) {
          if (!agentSession) agentSession = { images: {} };
          if (!agentSession.images) agentSession.images = {};
          agentSession.images[id] = dataUrl;
        }
        strip.appendChild(buildGalleryTile(id, dataUrl, prompt));
        strip.hidden = false;
        strip.scrollTo({ left: strip.scrollWidth, behavior: 'smooth' });

        // Async: persist + evict if over soft cap
        if (!opts.skipPersist) {
          (async () => {
            await idbPut(item);
            if (IMAGE_CACHE.size > MAX_GALLERY) {
              const all = Array.from(IMAGE_CACHE.values()).sort((a, b) => a.createdAt - b.createdAt);
              const drop = all.slice(0, all.length - MAX_GALLERY);
              for (const d of drop) {
                IMAGE_CACHE.delete(d.id);
                await idbDelete(d.id);
                const tile = strip.querySelector(`.gallery-tile[data-id="${d.id}"]`);
                if (tile) tile.remove();
              }
            }
          })();
        }
      }

      async function restoreGallery() {
        await migrateLegacyGallery();
        const items = await idbGetAll();
        if (!items.length) return;
        IMAGE_CACHE.clear();
        for (const it of items) IMAGE_CACHE.set(it.id, it);
        // Re-attach to in-memory agent session so chat markdown can resolve @img:<id>
        if (agentSession) {
          if (!agentSession.images) agentSession.images = {};
          for (const it of items) agentSession.images[it.id] = it.dataUrl;
        }
        const strip = document.getElementById('gallery-strip');
        if (!strip) return;
        for (const it of items) {
          strip.appendChild(buildGalleryTile(it.id, it.dataUrl, it.prompt));
        }
        strip.hidden = false;
      }

      function clearGallery() {
        const strip = document.getElementById('gallery-strip');
        IMAGE_CACHE.clear();
        if (strip) {
          strip.querySelectorAll('.gallery-tile').forEach(t => t.remove());
          strip.hidden = true;
        }
        // Async wipe — fire-and-forget
        idbClear();
        try { localStorage.removeItem(LEGACY_LS_KEY); } catch {}
      }

      // Synchronous accessor so resetAgentSession can stitch images back to session
      function getCachedImages() {
        return Array.from(IMAGE_CACHE.values());
      }

      // ============================================================
      // Conversation persistence (localStorage). Survives F5; cleared
      // explicitly via the reset button. System prompt is NOT saved
      // — we always boot the user into the latest version of it.
      // ============================================================
      const CONVO_KEY = 'axon.convo.v1';
      const MAX_PERSISTED_MESSAGES = 100;
      let _saveConvoTimer = null;

      function saveConversation() {
        if (!agentSession || !Array.isArray(agentSession.messages)) return;
        // Drop the leading system message + any empty assistant placeholder
        const persistable = agentSession.messages
          .slice(1)
          .filter((m) => {
            if (m.role === 'assistant' && !m.content && !(m.tool_calls && m.tool_calls.length)) return false;
            return true;
          })
          .slice(-MAX_PERSISTED_MESSAGES);

        const payload = JSON.stringify({
          messages: persistable,
          spend: agentSession.spend || 0,
          cacheSaved: agentSession.cacheSaved || 0,
          updatedAt: Date.now(),
        });

        try {
          localStorage.setItem(CONVO_KEY, payload);
        } catch {
          // Quota exceeded — keep only the second half and retry
          try {
            const half = persistable.slice(Math.floor(persistable.length / 2));
            localStorage.setItem(CONVO_KEY, JSON.stringify({
              messages: half, spend: agentSession.spend || 0, cacheSaved: agentSession.cacheSaved || 0, updatedAt: Date.now(),
            }));
          } catch {
            try { localStorage.removeItem(CONVO_KEY); } catch {}
          }
        }
      }

      // Debounce: every push schedules at most one save per 500ms
      function scheduleSaveConversation() {
        if (_saveConvoTimer) clearTimeout(_saveConvoTimer);
        _saveConvoTimer = setTimeout(() => { _saveConvoTimer = null; saveConversation(); }, 500);
      }

      function loadConversation() {
        try {
          const raw = localStorage.getItem(CONVO_KEY);
          if (!raw) return null;
          const j = JSON.parse(raw);
          if (!j || !Array.isArray(j.messages)) return null;
          return j;
        } catch { return null; }
      }

      function clearConversation() {
        try { localStorage.removeItem(CONVO_KEY); } catch {}
      }

      // Toggle expand/collapse on a transaction row, fills detail panel on first open
      function toggleTxDetail(idx) {
        const row = document.getElementById('tx-row-' + idx);
        const detail = document.getElementById('tx-detail-' + idx);
        if (!row || !detail) return;
        const open = detail.style.display !== 'none';
        detail.style.display = open ? 'none' : 'table-row';
        row.classList.toggle('is-open', !open);
      }

      // Build the detail panel for one transaction — surfaces every field we have
      function renderTxDetail(t) {
        const rows = [];
        const created = new Date(t.created_at);
        const amount = Number(t.amount_usdc || 0);
        const sign = amount >= 0 ? '+' : '';
        rows.push(['Type', t.type || '—']);
        rows.push(['Amount', `${sign}${formatUsdc(t.amount_usdc)} USDC`]);
        rows.push(['When', `${created.toLocaleString()} (${relativeTime(t.created_at)})`]);
        rows.push(['Timestamp (UTC)', created.toISOString()]);

        if (t.api_slug) rows.push(['API', t.api_slug]);
        const endpoint = t.meta && t.meta.endpoint;
        if (endpoint) rows.push(['Endpoint', endpoint]);
        if (t.meta && typeof t.meta.cached === 'boolean') {
          rows.push(['Cache hit', t.meta.cached ? 'yes — 50% discount applied' : 'no — live upstream']);
        }
        if (t.meta && t.meta.upstream_status) rows.push(['Upstream HTTP status', String(t.meta.upstream_status)]);
        if (t.meta && t.meta.latency_ms !== undefined) rows.push(['Latency', `${t.meta.latency_ms} ms`]);
        if (t.meta && t.meta.markup_micro !== undefined) {
          rows.push(['Operator markup', `${formatUsdc(String(t.meta.markup_micro))} USDC`]);
        }
        if (t.meta && t.meta.upstream_micro !== undefined) {
          rows.push(['Upstream cost', `${formatUsdc(String(t.meta.upstream_micro))} USDC`]);
        }
        if (t.meta && t.meta.reason) rows.push(['Reason', String(t.meta.reason).replace(/_/g, ' ')]);
        if (t.meta && t.meta.event) rows.push(['Event', String(t.meta.event).replace(/_/g, ' ')]);
        if (t.meta && t.meta.error) rows.push(['Error', String(t.meta.error)]);
        if (t.meta && t.meta.fallback_used) rows.push(['Fallback used', String(t.meta.fallback_used)]);
        if (t.request_id) rows.push(['Request ID', t.request_id]);
        if (t.id) rows.push(['Transaction ID', t.id]);
        if (t.onchain_tx) rows.push(['On-chain tx', t.onchain_tx]);

        // Surface anything else in meta we didn't explicitly map
        if (t.meta && typeof t.meta === 'object') {
          const known = new Set(['endpoint','cached','upstream_status','latency_ms','markup_micro','upstream_micro','reason','event','error','fallback_used']);
          for (const [k, v] of Object.entries(t.meta)) {
            if (known.has(k) || v === null || v === undefined || v === '') continue;
            const display = (typeof v === 'object') ? JSON.stringify(v) : String(v);
            rows.push([k.replace(/_/g, ' '), display]);
          }
        }

        return `
          <div class="tx-detail-grid">
            ${rows.map(([k, v]) => `
              <div class="k">${escapeHtml(k)}</div>
              <div class="v mono">${escapeHtml(v)}</div>
            `).join('')}
          </div>
        `;
      }

      function resetAgentSession() {
        agentSession = {
          messages: [{ role: 'system', content: AGENT_SYSTEM_PROMPT }],
          events: [],
          images: {},
          spend: 0,
          cacheSaved: 0,
          running: false,
          abortController: null,
        };
        // Re-attach persisted images to the in-memory map so chat history
        // markdown that references @img:<id> can still resolve to data URLs
        for (const it of getCachedImages()) {
          agentSession.images[it.id] = it.dataUrl;
        }
        renderAgentChat();
        renderAgentBrain();
        renderAgentFooter();
      }

      function renderMarkdown(text) {
        // Resolve @img:<id> placeholders to actual data URLs stored in session
        let t = String(text);
        if (agentSession && agentSession.images) {
          t = t.replace(/@img:([a-zA-Z0-9]+)/g, (m, id) => agentSession.images[id] || m);
        }
        if (typeof window.marked === 'undefined') return escapeHtml(t);
        try {
          return window.marked.parse(t, { breaks: true, gfm: true });
        } catch (_) {
          return escapeHtml(t);
        }
      }

      function renderAgentChat() {
        const el = document.getElementById('agent-messages');
        if (!el) return;
        const visible = agentSession.messages.filter((m) =>
          (m.role === 'user' && m.content) ||
          (m.role === 'assistant' && m.content && typeof m.content === 'string')
        );
        const typingHtml = agentSession.running
          ? '<div class="msg msg-assistant typing-msg"><div class="msg-role" translate="no">agent</div><div class="msg-content"><div class="typing-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div></div>'
          : '';
        if (visible.length === 0 && !agentSession.running) {
          el.innerHTML = '<div class="empty" style="font-size:13px;padding:32px 8px;color:var(--text-muted);">Start a conversation — pick a template below or type freely.</div>';
          return;
        }
        el.innerHTML = visible.map((m) => {
          if (m.role === 'user') {
            return `
              <div class="msg msg-user">
                <div class="msg-role" translate="no">you</div>
                <div class="msg-content">${escapeHtml(m.content)}</div>
              </div>
            `;
          }
          // assistant — render markdown
          return `
            <div class="msg msg-assistant">
              <div class="msg-role" translate="no">agent</div>
              <div class="msg-content md">${renderMarkdown(m.content)}</div>
            </div>
          `;
        }).join('') + typingHtml;
        attachCodeCopyButtons(el);
        el.scrollTop = el.scrollHeight;

        // Sync run-button visual state with session.running
        const runBtn = document.getElementById('agent-run');
        if (runBtn) runBtn.classList.toggle('is-running', !!agentSession.running);
      }

      function renderAgentBrain() {
        const el = document.getElementById('brain-events');
        if (!el) return;
        if (agentSession.events.length === 0) {
          el.innerHTML = '<div class="empty" style="font-size:12px;padding:24px 8px;color:var(--text-muted);">Tool calls will stream here.</div>';
          return;
        }
        el.innerHTML = agentSession.events.map((e) => {
          const cls = e.status === 'pending' ? 'pending' : e.status === 'error' ? 'error' : 'done';
          const argsStr = JSON.stringify(e.args);
          const argsDisplay = argsStr.length > 100 ? argsStr.slice(0, 100) + '…' : argsStr;
          let stats = '';
          if (e.status === 'pending') {
            stats = '<span class="stat pending">running…</span>';
          } else if (e.status === 'error') {
            stats = `<span class="stat err">${escapeHtml((e.error || 'failed').slice(0, 60))}</span>`;
          } else {
            const costStr = (e.cost || 0).toFixed(6);
            let cacheCls = 'cache-miss';
            if (e.cache === 'hit') cacheCls = 'cache-hit';
            else if (e.cache === 'local') cacheCls = 'cache-local';
            const costOrLocal = e.cache === 'local' ? '<span class="stat cost">local</span>' : `<span class="stat cost">$${costStr}</span>`;
            stats = costOrLocal +
              `<span class="stat ${cacheCls}">${e.cache || 'miss'}</span>` +
              `<span class="stat latency">${e.latency || 0}ms</span>`;
          }
          const thumb = e.imageUrl
            ? `<img src="${e.imageUrl}" alt="generated" style="display:block;max-width:100%;margin-top:8px;border-radius:4px;" loading="lazy" />`
            : '';
          return `
            <div class="brain-event ${cls}">
              <div class="tool-name">${escapeHtml(e.tool)}</div>
              <div class="tool-args">${escapeHtml(argsDisplay)}</div>
              <div class="tool-stats">${stats}</div>
              ${thumb}
            </div>
          `;
        }).join('');
        el.scrollTop = el.scrollHeight;
      }

      function renderAgentFooter() {
        const el = document.getElementById('agent-footer');
        if (!el) return;
        const calls = agentSession.events.length;
        el.innerHTML = `
          <div translate="no">Calls <strong>${calls}</strong></div>
          <span class="divider">·</span>
          <div translate="no">Spent <strong>$${agentSession.spend.toFixed(4)}</strong></div>
          <span class="divider">·</span>
          <div translate="no">Cache saved <strong>$${agentSession.cacheSaved.toFixed(4)}</strong></div>
          <span class="divider">·</span>
          <div translate="no">Limit <strong>$${SOFT_CAP.toFixed(2)}</strong> / <strong>$${HARD_CAP.toFixed(2)}</strong></div>
        `;
      }

      function showFirstRunModal() {
        if (document.getElementById('agent-first-run')) return;
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'agent-first-run';
        modal.innerHTML = `
          <div class="modal-card">
