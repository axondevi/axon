<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axon · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
    <style>
      :root {
        --bg: #0a0a0b;
        --bg-elev: #111114;
        --bg-card: #16161a;
        --border: #25252b;
        --text: #eeeef0;
        --text-dim: #9a9aa4;
        --text-muted: #6a6a76;
        --accent: #7c5cff;
        --accent-2: #19d5c6;
        --danger: #ff5f57;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .container { max-width: 1120px; margin: 0 auto; padding: 32px 24px; }
      header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,11,0.8);
        backdrop-filter: blur(10px);
        position: sticky; top: 0; z-index: 10;
      }
      .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
      .logo-dot { width: 12px; height: 12px; border-radius: 50%;
        background: linear-gradient(135deg, #7c5cff, #19d5c6);
      }
      .key-chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--bg-card);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }
      .key-chip button {
        background: none; border: none; color: var(--text-dim);
        cursor: pointer; padding: 0 0 0 10px; font-size: 12px;
      }
      h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 24px; }
      h2 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
      }
      .metric-label {
        font-size: 13px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.05em;
        margin-bottom: 8px;
      }
      .metric-value {
        font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
        font-family: 'JetBrains Mono', monospace;
      }
      .metric-value .unit { font-size: 15px; color: var(--text-muted); margin-left: 8px; font-family: 'Inter', sans-serif; }
      .metric-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
      .section { margin-bottom: 32px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th {
        text-align: left; font-weight: 500;
        color: var(--text-muted); padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
      }
      td { padding: 12px; border-bottom: 1px solid var(--border); }
      tr:last-child td { border-bottom: none; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .positive { color: #4ade80; }
      .negative { color: var(--danger); }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        color: var(--text-dim);
      }
      .pill.hit { background: rgba(25, 213, 198, 0.1); color: var(--accent-2); border-color: rgba(25,213,198,0.3); }
      .pill.miss { background: rgba(124, 92, 255, 0.1); color: var(--accent); border-color: rgba(124,92,255,0.3); }
      .bar-row {
        display: grid; grid-template-columns: 140px 1fr 110px;
        gap: 12px; align-items: center; padding: 10px 0;
        font-size: 14px;
      }
      .bar {
        background: var(--bg-elev); height: 8px; border-radius: 4px; overflow: hidden;
        position: relative;
      }
      .bar-fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        background: linear-gradient(90deg, #7c5cff, #19d5c6);
        border-radius: 4px;
      }
      .login-wrap {
        max-width: 440px; margin: 120px auto;
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 14px; padding: 40px 32px;
      }
      .login-wrap h1 { margin-bottom: 8px; }
      .login-wrap p { color: var(--text-dim); margin-bottom: 24px; font-size: 15px; }
      input[type="text"], input[type="password"] {
        width: 100%; padding: 12px 16px;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        font-family: 'JetBrains Mono', monospace; font-size: 14px;
        margin-bottom: 12px;
      }
      input:focus { outline: none; border-color: var(--accent); }
      button.primary {
        width: 100%; padding: 12px 18px;
        background: linear-gradient(135deg, #7c5cff, #19d5c6);
        color: #0a0a0b; border: none; border-radius: 8px;
        font-weight: 700; cursor: pointer; font-size: 14px;
      }
      .error {
        color: var(--danger); font-size: 13px; margin-bottom: 12px;
        padding: 10px 12px; background: rgba(255, 95, 87, 0.08);
        border: 1px solid rgba(255, 95, 87, 0.2); border-radius: 6px;
      }
      .empty { color: var(--text-muted); text-align: center; padding: 40px; font-size: 14px; }

      /* Deposit hero */
      .deposit-hero {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 24px;
        align-items: center;
        background: linear-gradient(135deg, rgba(124,92,255,0.06), rgba(25,213,198,0.04));
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px 28px;
        margin-bottom: 24px;
      }
      .deposit-hero .qr-img {
        display: block;
        width: 150px; height: 150px;
        background: #fff; border-radius: 8px;
        padding: 8px; box-sizing: content-box;
      }
      .deposit-info { min-width: 0; }
      .deposit-info .label {
        font-size: 12px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
      }
      .deposit-info .network-pill {
        display: inline-block;
        background: rgba(25,213,198,0.1); color: var(--accent-2);
        border: 1px solid rgba(25,213,198,0.3);
        padding: 2px 8px; border-radius: 4px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.04em; text-transform: uppercase;
        margin-bottom: 12px;
        white-space: nowrap;
      }
      .deposit-info .addr {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px; color: var(--text);
        background: var(--bg-elev);
        border: 1px solid var(--border);
        padding: 10px 14px; border-radius: 6px;
        margin-bottom: 10px;
        display: flex; align-items: center; gap: 10px;
        min-width: 0;
      }
      .deposit-info .addr code {
        flex: 1; min-width: 0;
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
        /* subtle scroll hint: show via faded edges */
        mask-image: linear-gradient(90deg, #000 calc(100% - 16px), transparent);
        -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 16px), transparent);
      }
      .deposit-info .copy-btn { flex-shrink: 0; }
      @media (max-width: 640px) {
        .deposit-hero {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 20px;
          text-align: center;
        }
        .deposit-hero > div:first-child { display: flex; justify-content: center; }
        .deposit-info { text-align: left; }
      }
      .deposit-info .warning {
        font-size: 12px; color: #ff7a6f;
        display: flex; align-items: center; gap: 6px;
      }
      .copy-btn {
        background: transparent; border: 1px solid var(--border);
        color: var(--text-dim); font-size: 11px; font-weight: 600;
        padding: 5px 10px; border-radius: 5px;
        cursor: pointer; font-family: 'Inter', sans-serif;
        letter-spacing: 0.04em; text-transform: uppercase;
        transition: all 0.15s;
      }
      .copy-btn:hover { color: var(--text); border-color: var(--accent); }
      .copy-btn.copied { background: rgba(25,213,198,0.15); color: var(--accent-2); border-color: var(--accent-2); }

      /* Try a call */
      .try-call-code {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 18px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; line-height: 1.6;
        color: var(--text-dim);
        position: relative;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: pre;
      }
      .try-call-code .tok { color: var(--text); }
      .try-call-code .str { color: var(--accent-2); }
      .try-call-code .flag { color: #fbbf24; }
      .try-call-code .copy-btn {
        position: sticky;
        float: right;
        top: 0;
      }
      @media (max-width: 640px) {
        .try-call-code { font-size: 11px; padding: 12px 14px; }
      }

      /* Responsive table wrap */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Transaction type styling */
      .tx-type {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 12px; font-weight: 600;
        padding: 3px 10px; border-radius: 4px;
        letter-spacing: 0.02em;
      }
      .tx-type.debit   { background: rgba(154,154,164,0.1);  color: var(--text-dim); }
      .tx-type.credit  { background: rgba(74,222,128,0.12);  color: #4ade80; }
      .tx-type.refund  { background: rgba(56,189,248,0.12);  color: #38bdf8; }
      .tx-type.bonus   { background: rgba(251,191,36,0.12);  color: #fbbf24; }
      .tx-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

      /* Clickable transaction rows + expand panel */
      tr.tx-row { cursor: pointer; transition: background 120ms ease; }
      tr.tx-row:hover { background: rgba(255,255,255,0.025); }
      tr.tx-row.is-open { background: rgba(124,92,255,0.06); }
      tr.tx-row .tx-chevron {
        display: inline-block; width: 10px; color: var(--text-muted);
        font-size: 10px; transition: transform 120ms ease; margin-right: 4px;
      }
      tr.tx-row.is-open .tx-chevron { transform: rotate(90deg); color: var(--accent); }
      tr.tx-detail-row > td {
        background: rgba(255,255,255,0.02);
        padding: 14px 18px 18px;
        border-top: 1px dashed rgba(255,255,255,0.06);
      }
      .tx-detail-grid {
        display: grid; grid-template-columns: 150px minmax(0, 1fr);
        gap: 6px 18px; font-size: 12px;
      }
      .tx-detail-grid .k { color: var(--text-muted); }
      .tx-detail-grid .v { word-break: break-all; }
      @media (max-width: 640px) {
        .tx-detail-grid { grid-template-columns: 1fr; gap: 2px 0; }
        .tx-detail-grid .k { margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      }

      /* Generated-images strip (lives between agent header and messages) */
      .gallery-strip {
        display: flex; gap: 8px; padding: 10px 12px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        background: rgba(255,255,255,0.015);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .gallery-strip[hidden] { display: none; }
      .gallery-strip .gs-label {
        flex: 0 0 auto;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--text-muted); align-self: center; padding-right: 4px;
        white-space: nowrap;
      }
      .gallery-tile {
        position: relative; flex: 0 0 auto;
        width: 64px; height: 64px; border-radius: 6px; overflow: hidden;
        cursor: zoom-in; background: #000;
        border: 1px solid rgba(255,255,255,0.08);
        transition: transform 100ms ease, border-color 100ms ease;
      }
      .gallery-tile:hover { transform: scale(1.04); border-color: var(--accent); }
      .gallery-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .gallery-tile .dl-btn {
        position: absolute; right: 2px; bottom: 2px;
        background: rgba(0,0,0,0.7); color: #fff;
        border: 0; border-radius: 3px; padding: 2px 5px;
        font-size: 10px; cursor: pointer; line-height: 1;
        opacity: 0; transition: opacity 120ms ease;
      }
      .gallery-tile:hover .dl-btn { opacity: 1; }
      .gallery-tile .dl-btn:hover { background: var(--accent); }

      /* --- Agent chat --- */
      .agent-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
      }
      @media (max-width: 900px) {
        .agent-wrap { grid-template-columns: minmax(0, 1fr); }
      }
      .agent-chat, .agent-brain {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 18px;
        display: flex; flex-direction: column;
        min-height: 480px;
        /* Prevent grid/flex children from blowing out on narrow screens */
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }
      .agent-header {
        font-size: 12px; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.08em;
        margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
      }
      .agent-header .reset-btn {
        background: none; border: none;
        color: var(--text-muted); font-size: 11px;
        padding: 2px 4px; border-radius: 3px;
        cursor: pointer; letter-spacing: 0.06em;
        text-transform: lowercase;
      }
      .agent-header .reset-btn:hover { color: var(--text-dim); }
      .agent-messages {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 50vh;
        padding-right: 4px;
        margin-bottom: 12px;
        min-width: 0; max-width: 100%;
      }
      .msg { margin-bottom: 14px; }
      .msg-role {
        font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.08em; margin-bottom: 4px;
        color: var(--text-muted);
      }
      .msg-user .msg-role { color: var(--accent-2); }
      .msg-assistant .msg-role { color: var(--accent); }
      .msg-content {
        font-size: 14px; line-height: 1.6; color: var(--text-dim);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        min-width: 0; max-width: 100%;
      }
      .msg-assistant .msg-content { color: var(--text); }
      .agent-input-bar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .agent-input-bar textarea {
        width: 100%;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 11px 14px; font-family: 'Inter', sans-serif;
        font-size: 14px; resize: vertical;
        min-height: 88px; max-height: 280px; line-height: 1.5;
      }
      .agent-input-bar textarea:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.12);
      }
      .agent-input-bar textarea::placeholder { color: var(--text-muted); }
      .agent-action-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .agent-action-row .hint {
        font-size: 11px; color: var(--text-muted);
        letter-spacing: 0.04em;
      }
      .agent-action-row .kbd {
        font-family: 'JetBrains Mono', monospace;
        background: var(--bg-elev); border: 1px solid var(--border);
        padding: 1px 5px; border-radius: 3px; font-size: 10.5px;
        color: var(--text-dim);
      }
      .agent-btn {
        padding: 9px 20px; border-radius: 7px; border: 1px solid transparent;
        font-weight: 600; cursor: pointer; font-size: 13px;
        font-family: 'Inter', sans-serif; letter-spacing: 0.01em;
        white-space: nowrap;
      }
      .agent-btn.run {
        background: var(--accent); color: #fff;
        border-color: var(--accent);
      }
      .agent-btn.run:hover:not(:disabled) { background: #6b4ff0; border-color: #6b4ff0; }
      .agent-btn.run:disabled { opacity: 0.55; cursor: not-allowed; }
      .agent-btn.stop {
        background: transparent; color: var(--danger);
        border-color: rgba(255,95,87,0.4);
      }
      .agent-btn.stop:hover { background: rgba(255,95,87,0.08); }
      .agent-brain .brain-events {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 50vh;
        display: flex; flex-direction: column; gap: 8px;
        min-width: 0; max-width: 100%;
      }
      .brain-event { min-width: 0; max-width: 100%; overflow: hidden; }
      .brain-event {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px; padding: 10px 12px; font-size: 12px;
      }
      .brain-event.pending { border-color: rgba(124,92,255,0.5); }
      .brain-event.error   { border-color: rgba(255,95,87,0.5); }
      .brain-event .tool-name {
        font-family: 'JetBrains Mono', monospace; font-weight: 600;
        color: var(--text); font-size: 12px; margin-bottom: 4px;
      }
      .brain-event .tool-args {
        font-family: 'JetBrains Mono', monospace; font-size: 11px;
        color: var(--text-dim); word-break: break-all; margin-bottom: 6px;
        max-height: 60px; overflow: hidden;
      }
      .brain-event .tool-stats { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
      .stat {
        padding: 2px 6px; border-radius: 3px;
        font-family: 'JetBrains Mono', monospace; font-size: 11px;
      }
      .stat.cost      { background: rgba(124,92,255,0.12); color: #b59aff; }
      .stat.cache-hit { background: rgba(25,213,198,0.12); color: var(--accent-2); }
      .stat.cache-miss{ background: rgba(154,154,164,0.1); color: var(--text-dim); }
      .stat.cache-local{ background: rgba(251,191,36,0.12); color: #fbbf24; }
      .stat.latency   { background: rgba(154,154,164,0.1); color: var(--text-dim); }
      .stat.err       { background: rgba(255,95,87,0.15); color: var(--danger); }
      .stat.pending {
        background: rgba(124,92,255,0.12); color: #b59aff;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
      .session-footer {
        margin-top: 12px; padding: 10px 14px;
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px;
        display: flex; gap: 10px; flex-wrap: wrap;
        font-size: 12px; color: var(--text-muted);
      }
      .session-footer strong { color: var(--text); font-family: 'JetBrains Mono', monospace; }
      .session-footer .divider { color: var(--border); }

      /* Modal */
      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 1000; padding: 20px;
      }
      .modal-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 12px; padding: 28px 32px;
        max-width: 480px; width: 100%;
      }
      .modal-card h3 { margin: 0 0 12px; font-size: 20px; }
      .modal-card p { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin: 0 0 10px; }
      .modal-card ul { color: var(--text-dim); font-size: 14px; line-height: 1.7; margin: 0 0 12px; padding-left: 20px; }
      .modal-card .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
      .modal-card .btn-m { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
      .modal-card .btn-m.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a0a0b; }
      .modal-card .btn-m.secondary { background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border); }

      /* Quick-start suggestions — inline, understated */
      .quick-chips {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
        margin: 6px 2px 10px;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.9;
      }
      .quick-chips .qc-label {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--text-muted);
        margin-right: 10px;
        font-size: 11px;
      }
      .chip {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 12.5px;
        padding: 0;
        margin: 0;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: color 0.12s;
      }
      .chip:hover { color: var(--accent-2); }
      .chip:focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; border-radius: 2px; }
      .chip + .chip::before {
        content: '·';
        margin: 0 8px;
        color: var(--border);
        pointer-events: none;
      }

      /* Markdown render inside assistant message */
      .msg-content.md { white-space: normal; }
      .msg-content.md p { margin: 0 0 10px 0; }
      .msg-content.md p:last-child { margin-bottom: 0; }
      .msg-content.md h1, .msg-content.md h2, .msg-content.md h3, .msg-content.md h4 {
        margin: 14px 0 6px 0; color: var(--text); font-weight: 700;
        letter-spacing: -0.01em; line-height: 1.3;
      }
      .msg-content.md h1 { font-size: 18px; }
      .msg-content.md h2 { font-size: 16px; }
      .msg-content.md h3 { font-size: 15px; }
      .msg-content.md h4 { font-size: 14px; color: var(--accent-2); }
      .msg-content.md strong { color: var(--text); font-weight: 600; }
      .msg-content.md em { color: var(--text); font-style: italic; }
      .msg-content.md ul, .msg-content.md ol { padding-left: 22px; margin: 0 0 10px 0; }
      .msg-content.md li { margin: 3px 0; }
      .msg-content.md code {
        font-family: 'JetBrains Mono', monospace;
        background: var(--bg-elev); color: #e4e4ff;
        padding: 1px 5px; border-radius: 3px;
        border: 1px solid var(--border);
        font-size: 12.5px;
        word-break: break-all;
      }
      .msg-content.md pre {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 12px 14px;
        margin: 10px 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12.5px; line-height: 1.55;
        max-width: 100%;
      }
      .msg-content.md pre code {
        background: transparent; border: none; padding: 0;
        color: var(--text); font-size: 12.5px;
        word-break: normal; white-space: pre;
      }
      .msg-content.md a {
        color: var(--accent-2); text-decoration: underline; text-underline-offset: 2px;
        overflow-wrap: anywhere; word-break: break-all;
      }
      .msg-content.md a:hover { color: var(--text); }
      .msg-content.md blockquote {
        border-left: 3px solid var(--border);
        padding-left: 12px; margin: 10px 0;
        color: var(--text-dim); font-style: italic;
      }
      .msg-content.md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
      /* Tables: wrap so they horizontally scroll on narrow screens instead of
         pushing the page wider than viewport */
      .msg-content.md table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 13px;
        white-space: nowrap;
      }
      .msg-content.md th, .msg-content.md td { border: 1px solid var(--border); padding: 6px 10px; }
      .msg-content.md th { background: var(--bg-elev); color: var(--text); font-weight: 600; }
      .msg-content.md img { max-width: 100%; height: auto; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const STORAGE_KEY = 'axon.apiKey';
      const BASE_KEY = 'axon.baseUrl';

      function html(parts, ...args) {
        return parts.reduce((a, p, i) => a + p + (args[i] ?? ''), '');
      }

      function $(root, sel) { return root.querySelector(sel); }

      async function api(path, opts = {}) {
        const key = localStorage.getItem(STORAGE_KEY);
        const base = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const res = await fetch(base + path, {
          ...opts,
          headers: { 'x-api-key': key, 'content-type': 'application/json', ...(opts.headers || {}) },
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).message || res.statusText);
        return res.json();
      }

      function formatUsdc(s) { return Number(s).toFixed(4); }

      function renderLogin(err) {
        document.getElementById('app').innerHTML = `
          <div class="login-wrap">
            <h1>Axon Dashboard</h1>
            <p>Paste your API key to get started.</p>
            ${err ? `<div class="error">${err}</div>` : ''}
            <input type="text" id="base" placeholder="https://axon-kedb.onrender.com" />
            <input type="password" id="key" placeholder="ax_live_..." />
            <button class="primary" id="go">Open dashboard</button>
          </div>
        `;
        document.getElementById('base').value = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        document.getElementById('go').onclick = async () => {
          const base = document.getElementById('base').value.trim();
          const key = document.getElementById('key').value.trim();
          if (!key) return renderLogin('API key is required');
          localStorage.setItem(BASE_KEY, base);
          localStorage.setItem(STORAGE_KEY, key);
          try { await api('/v1/wallet/balance'); renderApp(); }
          catch (e) { localStorage.removeItem(STORAGE_KEY); renderLogin(e.message); }
        };
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
        });
      }

      function relativeTime(iso) {
        const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
        if (s < 60) return s + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
      }

      function computeBurnRate(txs, days = 7) {
        const cutoff = Date.now() - days * 86400_000;
        const windowSpend = txs
          .filter((t) => t.type === 'debit' && new Date(t.created_at).getTime() >= cutoff)
          .reduce((sum, t) => sum + Math.abs(Number(t.amount_usdc)), 0);
        return windowSpend / days;
      }

      async function renderApp() {
        const root = document.getElementById('app');
        root.innerHTML = `
          <header>
            <div class="brand"><span class="logo-dot"></span> axon</div>
            <div>
              <span class="key-chip" id="keyview">ax_live_…</span>
              <button class="key-chip" id="logout">sign out</button>
            </div>
          </header>
          <div class="container">
            <h1>Dashboard</h1>
            <div id="deposit-hero-wrap"></div>
            <div class="grid" id="metrics">Loading…</div>
            <div class="section">
              <h2>Try a call</h2>
              <div class="card" id="trycall">Loading…</div>
            </div>
            <div class="section">
              <h2>Spend by API (last 30 days)</h2>
              <div class="card" id="byapi">Loading…</div>
            </div>
            <div class="section">
              <h2 translate="no">Agent</h2>
              <div class="agent-wrap">
                <div class="agent-chat">
                  <div class="agent-header">
                    <span translate="no">Agent</span>
                    <button class="reset-btn" id="agent-reset" translate="no">reset</button>
                  </div>
                  <div class="gallery-strip" id="gallery-strip" hidden>
                    <span class="gs-label" translate="no">Images</span>
                  </div>
                  <div class="agent-messages" id="agent-messages"></div>
                  <div class="quick-chips" id="quick-chips" translate="no">
                    <span class="qc-label">Try</span>
                    <button class="chip" data-tpl="Research and summarize in markdown: ">Research</button>
                    <button class="chip" data-tpl="Write a short 3-paragraph article in markdown about: ">Write</button>
                    <button class="chip" data-tpl="Compare side-by-side in a markdown table: ">Compare</button>
                    <button class="chip" data-tpl="Write complete JavaScript code, with comments, that: ">Code</button>
                    <button class="chip" data-tpl="Extract the main content from this URL and summarize in bullets: ">Extract URL</button>
                    <button class="chip" data-tpl="Calculate step by step and show the result: ">Calculate</button>
                    <button class="chip" data-tpl="Write and execute JavaScript that: ">Run JS</button>
                    <button class="chip" data-tpl="Generate an image of: ">Image</button>
                  </div>
                  <div class="agent-input-bar">
                    <textarea id="agent-input" placeholder="What do you want the agent to build?" rows="3"></textarea>
                    <div class="agent-action-row">
                      <span class="hint"><span class="kbd">Ctrl</span>+<span class="kbd">Enter</span> to run</span>
                      <div>
                        <button class="agent-btn stop" id="agent-stop" hidden translate="no">Stop</button>
                        <button class="agent-btn run" id="agent-run" translate="no">Run</button>
                      </div>
                    </div>
                  </div>
                  <div class="session-footer" id="agent-footer"></div>
                </div>
                <div class="agent-brain">
                  <div class="agent-header"><span translate="no">Brain</span></div>
                  <div class="brain-events" id="brain-events"></div>
                </div>
              </div>
            </div>
            <div class="section">
              <h2>Recent transactions</h2>
              <div class="card" id="tx">Loading…</div>
            </div>
          </div>
        `;

        const key = localStorage.getItem(STORAGE_KEY);
        const base = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const keyShort = key.slice(0, 16) + '…';
        document.getElementById('keyview').textContent = keyShort;
        document.getElementById('logout').onclick = () => {
          localStorage.removeItem(STORAGE_KEY);
          renderLogin();
        };

        try {
          const [bal, usage, byApi, txs] = await Promise.all([
            api('/v1/wallet/balance'),
            api('/v1/usage'),
            api('/v1/usage/by-api'),
            api('/v1/wallet/transactions?limit=100'),
          ]);

          // ---- Deposit hero ----
          const depositAddr = bal.address;
          const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=0&data=' + encodeURIComponent(depositAddr);
          document.getElementById('deposit-hero-wrap').innerHTML = `
            <div class="deposit-hero">
              <div>
                <img class="qr-img" src="${qrUrl}" width="150" height="150" alt="QR code for ${depositAddr}" loading="lazy" />
              </div>
              <div class="deposit-info">
                <div class="label">Your deposit address</div>
                <span class="network-pill">USDC · Base L2</span>
                <div class="addr">
                  <code>${depositAddr}</code>
                  <button class="copy-btn" id="copy-addr">Copy</button>
                </div>
                <div class="warning">⚠ Only send USDC on Base network. Other tokens or networks = permanent loss.</div>
              </div>
            </div>
          `;
          document.getElementById('copy-addr').onclick = (e) => copyToClipboard(depositAddr, e.target);

          // ---- Metrics ----
          const hitRatePct = (usage.cache_hit_rate * 100).toFixed(1);
          const burn = computeBurnRate(txs.data, 7);
          const runway = burn > 0 ? Number(bal.available_usdc) / burn : null;
          const runwayDisplay = runway === null ? '—' : runway > 999 ? '999+' : runway.toFixed(0);
          const burnDisplay = burn > 0 ? '$' + burn.toFixed(4) + '/day (7d avg)' : 'No recent spend';

          document.getElementById('metrics').innerHTML = `
            <div class="card">
              <div class="metric-label">Available balance</div>
              <div class="metric-value">${formatUsdc(bal.available_usdc)}<span class="unit">USDC</span></div>
              <div class="metric-sub">
                ${bal.reserved_usdc === '0.000000' ? 'No funds reserved.' : bal.reserved_usdc + ' reserved'}
                · <a href="/buy-usdc" style="color: var(--accent-2); text-decoration: none;">Top up →</a>
              </div>
            </div>
            <div class="card">
              <div class="metric-label">Burn rate</div>
              <div class="metric-value">${runwayDisplay}<span class="unit">days runway</span></div>
              <div class="metric-sub">${burnDisplay}</div>
            </div>
            <div class="card">
              <div class="metric-label">Requests</div>
              <div class="metric-value">${usage.total_requests}</div>
              <div class="metric-sub">${usage.cache_hits} cache hits · ${formatUsdc(usage.total_spent_usdc)} spent</div>
            </div>
            <div class="card">
              <div class="metric-label">Cache hit rate</div>
              <div class="metric-value">${hitRatePct}<span class="unit">%</span></div>
              <div class="metric-sub">More is better — you pay 50% less on hits</div>
            </div>
          `;

          // ---- Try a call ----
          const curlSnippet =
            `curl -H "<span class="tok">Authorization: Bearer</span> <span class="str">${key}</span>" \\\n` +
            `  "<span class="str">${base}/v1/call/brasilapi/cnpj?cnpj=00000000000191</span>"`;
          const curlPlain =
            `curl -H "Authorization: Bearer ${key}" \\\n` +
            `  "${base}/v1/call/brasilapi/cnpj?cnpj=00000000000191"`;
          document.getElementById('trycall').innerHTML = `
            <p style="margin:0 0 12px;color:var(--text-dim);font-size:14px;">
              Copy-paste this into your terminal — costs about <span class="mono">$0.001</span> and returns
              data on Banco do Brasil (CNPJ 00.000.000/0001-91).
            </p>
            <div class="try-call-code">
              <button class="copy-btn" id="copy-curl">Copy</button>
              ${curlSnippet}
            </div>
            <p style="margin:12px 0 0;color:var(--text-muted);font-size:12px;">
              See all 28 APIs in the <a href="/#apis" style="color:var(--accent-2);">catalog</a>
              · Full docs on <a href="https://github.com/axondevi/axon#readme" style="color:var(--accent-2);">GitHub</a>
            </p>
          `;
          document.getElementById('copy-curl').onclick = (e) => copyToClipboard(curlPlain, e.target);

          // ---- By-API bar chart ----
          if (byApi.data.length === 0) {
            document.getElementById('byapi').innerHTML = '<div class="empty">No usage yet — run the curl above and refresh.</div>';
          } else {
            const maxSpent = Math.max(...byApi.data.map((a) => Number(a.total_spent_usdc)));
            document.getElementById('byapi').innerHTML = byApi.data.map((a) => {
              const pct = (Number(a.total_spent_usdc) / maxSpent) * 100;
              const hitRate = a.requests > 0 ? ((a.cache_hits / a.requests) * 100).toFixed(0) : 0;
              return `
                <div class="bar-row">
                  <div>${a.api_slug} <span class="pill">${a.requests}×</span></div>
                  <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
                  <div class="mono" style="text-align: right;">${formatUsdc(a.total_spent_usdc)} · ${hitRate}%</div>
                </div>
              `;
            }).join('');
          }

          // ---- Transactions (only show last 15 in UI) ----
          const recentTxs = txs.data.slice(0, 15);
          if (recentTxs.length === 0) {
            document.getElementById('tx').innerHTML = '<div class="empty">No transactions yet.</div>';
          } else {
            document.getElementById('tx').innerHTML = `
              <div class="table-wrap">
              <table>
                <thead><tr>
                  <th>Type</th><th>Detail</th><th>Amount</th><th>When</th>
                </tr></thead>
                <tbody>
                  ${recentTxs.map((t, idx) => {
                    const amt = Number(t.amount_usdc);
                    const cls = amt >= 0 ? 'positive' : 'negative';
                    let detail = '';
                    if (t.type === 'debit') {
                      const cached = t.meta && t.meta.cached;
                      const endpoint = t.meta && t.meta.endpoint;
                      detail = `<div class="mono">${t.api_slug || '—'}${endpoint ? ' / ' + endpoint : ''}</div>${cached ? '<div class="tx-meta">Cache hit — 50% off</div>' : ''}`;
                    } else if (t.type === 'credit') {
                      detail = `<div class="mono">On-chain deposit</div>${t.onchain_tx ? `<div class="tx-meta">tx ${t.onchain_tx.slice(0,10)}…</div>` : ''}`;
                    } else if (t.type === 'refund') {
                      detail = `<div class="mono">${t.api_slug || '—'}</div><div class="tx-meta">Upstream failure — auto-refunded</div>`;
                    } else if (t.type === 'bonus') {
                      const reason = (t.meta && t.meta.reason) || (t.meta && t.meta.event) || 'promotional';
                      detail = `<div class="mono">Bonus credit</div><div class="tx-meta">${reason.replace(/_/g, ' ')}</div>`;
                    } else {
                      detail = `<div class="mono">${t.api_slug || t.type}</div>`;
                    }
                    return `
                      <tr class="tx-row" id="tx-row-${idx}" onclick="toggleTxDetail(${idx})" title="Click to view details">
                        <td><span class="tx-chevron">▸</span><span class="tx-type ${t.type}">${t.type}</span></td>
                        <td>${detail}</td>
                        <td class="mono ${cls}">${amt >= 0 ? '+' : ''}${formatUsdc(t.amount_usdc)}</td>
                        <td style="color: var(--text-muted)" title="${new Date(t.created_at).toLocaleString()}">${relativeTime(t.created_at)}</td>
                      </tr>
                      <tr class="tx-detail-row" id="tx-detail-${idx}" style="display: none">
                        <td colspan="4">${renderTxDetail(t)}</td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
              </div>
            `;
          }

          // ---- Agent chat ----
          initAgentChat();
        } catch (e) {
          root.innerHTML = `<div class="container"><div class="error">${e.message}</div></div>`;
        }
      }

      // ==========================================================
      // AGENT CHAT — Phase 2, per docs/agent-chat-spec.md
      // ==========================================================
      const AGENT_MODEL = 'llama-3.3-70b-versatile';
      const SOFT_CAP = 0.50;
      const HARD_CAP = 2.00;
      const MAX_TOOL_CALLS_PER_TURN = 15;
      const TOOL_TIMEOUT_MS = 15000;
      const AGENT_CAP_ACK_KEY = 'axon.agentCapAck';

      const AGENT_TOOLS = [
        {
          type: 'function',
          function: {
            name: 'lookup_cnpj',
            description: 'Look up a Brazilian company by CNPJ (corporate tax ID). Returns legal name, address, status, shareholders.',
            parameters: {
              type: 'object',
              properties: { cnpj: { type: 'string', description: '14-digit CNPJ, no punctuation or spaces' } },
              required: ['cnpj']
            }
          },
          _axon: { api: 'brasilapi', endpoint: 'cnpj', method: 'GET', paramStyle: 'query',
            paramMap: (a) => ({ cnpj: String(a.cnpj).replace(/\D/g, '') }) }
        },
        {
          type: 'function',
          function: {
            name: 'lookup_cep',
            description: 'Look up a Brazilian postal code (CEP). Returns street, neighborhood, city, state.',
            parameters: {
              type: 'object',
              properties: { cep: { type: 'string', description: 'CEP, 8 digits, no dash' } },
              required: ['cep']
            }
          },
          _axon: { api: 'brasilapi', endpoint: 'cep', method: 'GET', paramStyle: 'query',
            paramMap: (a) => ({ cep: String(a.cep).replace(/\D/g, '') }) }
        },
        {
          type: 'function',
          function: {
            name: 'current_weather',
            description: 'Get current weather for a city (temperature in Kelvin, conditions, humidity, wind).',
            parameters: {
              type: 'object',
              properties: { q: { type: 'string', description: 'City name, optionally with country code (e.g. "São Paulo, BR")' } },
              required: ['q']
            }
          },
          _axon: { api: 'openweather', endpoint: 'current', method: 'GET', paramStyle: 'query',
            paramMap: (a) => ({ q: a.q }) }
        },
        {
          type: 'function',
          function: {
            name: 'lookup_ip',
            description: 'Look up geolocation and ISP/owner of an IPv4 or IPv6 address.',
            parameters: {
              type: 'object',
              properties: { ip: { type: 'string' } },
              required: ['ip']
            }
          },
          _axon: { api: 'ipinfo', endpoint: 'lookup', method: 'GET', paramStyle: 'query',
            paramMap: (a) => ({ ip: a.ip }) }
        },
        {
          type: 'function',
          function: {
            name: 'search_web',
            description: 'Search the web via Tavily. Returns a list of results with titles, URLs, and snippets.',
            parameters: {
              type: 'object',
              properties: {
                query: { type: 'string' },
                max_results: { type: 'integer', default: 3 }
              },
              required: ['query']
            }
          },
          _axon: { api: 'tavily', endpoint: 'search', method: 'POST', paramStyle: 'body',
            paramMap: (a) => ({ query: a.query, max_results: a.max_results || 3, search_depth: 'basic' }) }
        },
        {
          type: 'function',
          function: {
            name: 'embed_text',
            description: 'Generate a 512-dim embedding vector for a short text (Voyage AI voyage-3-lite). Useful for semantic similarity, RAG setup, or clustering.',
            parameters: {
              type: 'object',
              properties: { input: { type: 'string' } },
              required: ['input']
            }
          },
          _axon: { api: 'voyage', endpoint: 'embeddings', method: 'POST', paramStyle: 'body',
            paramMap: (a) => ({ input: a.input, model: 'voyage-3-lite' }) }
        },
        {
          type: 'function',
          function: {
            name: 'scrape_url',
            description: 'Fetch the main content of any web page as clean markdown (Firecrawl). Use this to read articles, docs, company websites, or any URL the user mentions. Use the returned markdown to write summaries, comparisons, or analyses.',
            parameters: {
              type: 'object',
              properties: {
                url: { type: 'string', description: 'Full URL including https://' }
              },
              required: ['url']
            }
          },
          _axon: { api: 'firecrawl', endpoint: 'scrape', method: 'POST', paramStyle: 'body',
            paramMap: (a) => ({ url: a.url, formats: ['markdown'], onlyMainContent: true }) }
        },
        {
          type: 'function',
          function: {
            name: 'exa_search',
            description: 'Neural/semantic web search via Exa — better than keyword search for finding high-quality, topically relevant pages (esp. technical + recent). Alternative to search_web when Tavily underperforms.',
            parameters: {
              type: 'object',
              properties: {
                query: { type: 'string' },
                num_results: { type: 'integer', default: 5 }
              },
              required: ['query']
            }
          },
          _axon: { api: 'exa', endpoint: 'search', method: 'POST', paramStyle: 'body',
            paramMap: (a) => ({ query: a.query, numResults: a.num_results || 5, type: 'auto' }) }
        },
        {
          type: 'function',
          function: {
            name: 'brasilapi_holidays',
            description: 'List Brazilian national holidays for a given year. Returns [{date, name, type}].',
            parameters: {
              type: 'object',
              properties: { year: { type: 'integer', description: 'Year, e.g. 2026' } },
              required: ['year']
            }
          },
          _axon: { api: 'brasilapi', endpoint: 'holidays', method: 'GET', paramStyle: 'query',
            paramMap: (a) => ({ ano: String(a.year) }) }
        },
        {
          type: 'function',
          function: {
            name: 'brasilapi_rates',
            description: 'Current Brazilian financial indicators: Selic, CDI, IPCA (no params).',
            parameters: { type: 'object', properties: {} }
          },
          _axon: { api: 'brasilapi', endpoint: 'rates', method: 'GET', paramStyle: 'query',
            paramMap: () => ({}) }
        },
        {
          type: 'function',
          function: {
            name: 'brasilapi_ddd',
            description: 'Lookup Brazilian telephone area code (DDD). Returns the state and cities served.',
            parameters: {
              type: 'object',
              properties: { ddd: { type: 'string', description: '2-digit DDD, e.g. "11" for São Paulo' } },
              required: ['ddd']
            }
          },
          _axon: { api: 'brasilapi', endpoint: 'ddd', method: 'GET', paramStyle: 'query',
            paramMap: (a) => ({ ddd: String(a.ddd).replace(/\D/g, '') }) }
        },
        {
          type: 'function',
          function: {
            name: 'run_js',
            description: 'Execute JavaScript in an isolated Web Worker sandbox (5s timeout, no fetch, no DOM). The last expression is returned. Use for math, parsing, data transforms, algorithm validation, quick prototypes. Return values are stringified.',
            parameters: {
              type: 'object',
              properties: {
                code: { type: 'string', description: 'JavaScript code; the last expression is the result. Top-level await is supported.' }
              },
              required: ['code']
            }
          },
          _local: async (a) => await runJsSandbox(a.code)
        },
        {
          type: 'function',
          function: {
            name: 'calculate',
            description: 'Evaluate a math expression exactly. Supports + - * / % ( ) and decimals. For arithmetic you are uncertain about, use this instead of guessing.',
            parameters: {
              type: 'object',
              properties: { expression: { type: 'string', description: 'e.g. "1754 * 0.15" or "(23.7 + 18.4) / 2"' } },

      const AGENT_SYSTEM_PROMPT = [

      let agentSession = null;

      // --- Local tool helpers (run in the user's browser, $0 cost) ---
      function calculateExpr(expr) {
        const e = String(expr).trim();
        // Only allow digits, whitespace, basic math ops, parens, dot, comma, %, and 'e'/'E' for scientific notation
        if (!/^[-+*/().,%\d\seE]+$/.test(e)) {
          throw new Error('Expression has disallowed characters. Only numbers and + - * / % ( ) are allowed.');
        }
        try {
          const val = Function('"use strict"; return (' + e.replace(/,/g, '.') + ')')();
          if (typeof val !== 'number' || !isFinite(val)) throw new Error('Not a finite number');
          return { expression: expr, value: val };
        } catch (err) {
          throw new Error('Invalid math: ' + err.message);
        }
      }

      function getDatetimeInfo(timezone) {
        const now = new Date();
        const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        try {
          const fmt = new Intl.DateTimeFormat('en-US', {
            timeZone: tz,
            dateStyle: 'full',
            timeStyle: 'long',
            hour12: false,
          });
          return {
            iso_utc: now.toISOString(),
            local: fmt.format(now),
            timezone: tz,
            timestamp_ms: now.getTime(),
            day_of_week: now.toLocaleDateString('en-US', { weekday: 'long', timeZone: tz }),
          };
        } catch (e) {
          throw new Error('Invalid timezone: "' + tz + '". Use IANA format like "America/Sao_Paulo".');
        }
      }

      // --- generate_image: Stability SDXL with placeholder system ---
      // Base64 images are huge (~2MB), so we never put the data URL in
      // the LLM message history. We store it under a short id and let
      // the agent reference it as @img:<id> which we expand at render.
      async function generateImageTool(args) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const t0 = Date.now();
        const textPrompts = [{ text: args.prompt, weight: 1 }];
        if (args.negative_prompt) {
          textPrompts.push({ text: args.negative_prompt, weight: -1 });
        }
        const body = {
          text_prompts: textPrompts,
          cfg_scale: 7,
          width: 1024,
          height: 1024,
          samples: 1,
          steps: 30,
        };
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 45000);
        let res;
        try {
          res = await fetch(b + '/v1/call/stability/generate-xl', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + k,
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify(body),
            signal: controller.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const err = new Error(errBody.message || errBody.detail || ('stability ' + res.status));
          err.cost = cost; err.cache = cache; err.latency = latency; err.status = res.status;
          throw err;
        }
        const data = await res.json();
        const artifact = (data.artifacts && data.artifacts[0]) || {};
        if (!artifact.base64) throw new Error('no image returned');
        const shortId = 'img' + Math.random().toString(36).slice(2, 10);
        const dataUrl = 'data:image/png;base64,' + artifact.base64;
        if (!agentSession.images) agentSession.images = {};
        agentSession.images[shortId] = dataUrl;
        addToGallery(shortId, dataUrl, args.prompt);
        return {
          body: {
            status: 'generated',
            ref: '@img:' + shortId,
            seed: artifact.seed,
            size: '1024x1024',
            note: 'Image shown to user. Reference it in your reply as ![short description](@img:' + shortId + ').'
          },
          cost,
          cache,
          latency: Date.now() - t0,
          _imageUrl: dataUrl,
        };
      }

      async function runJsSandbox(code) {
        const workerCode = [
          'self.fetch = undefined;',
          'self.XMLHttpRequest = undefined;',
          'self.importScripts = undefined;',
          'self.onmessage = async (e) => {',
          '  try {',
          '    const fn = new Function("return (async () => { " + e.data + "\\n })()");',
          '    const result = await fn();',
          '    let serialized;',
          '    try { serialized = JSON.stringify(result, null, 2); if (serialized === undefined) serialized = String(result); }',
          '    catch (_) { serialized = String(result); }',
          '    self.postMessage({ ok: true, result: serialized });',
          '  } catch (err) {',
          '    self.postMessage({ ok: false, error: err && err.message ? err.message : String(err) });',
          '  }',
          '};',
        ].join('\n');
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const worker = new Worker(url);
        return new Promise((resolve, reject) => {
          const timer = setTimeout(() => {
            worker.terminate(); URL.revokeObjectURL(url);
            reject(new Error('JS execution timeout (5s)'));
          }, 5000);
          worker.onmessage = (ev) => {
            clearTimeout(timer); URL.revokeObjectURL(url); worker.terminate();
            if (ev.data.ok) resolve({ code: code, result: ev.data.result });
            else reject(new Error(ev.data.error));
          };
          worker.onerror = (ev) => {
            clearTimeout(timer); URL.revokeObjectURL(url); worker.terminate();
            reject(new Error(ev.message || 'worker error'));
          };
          worker.postMessage(code);
        });
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      }

      // Append a generated image to the strip above chat. Survives until session reset.
      function addToGallery(id, dataUrl, prompt) {
        const strip = document.getElementById('gallery-strip');
        if (!strip) return;
        const tile = document.createElement('div');
        tile.className = 'gallery-tile';
        tile.title = prompt || id;
        tile.innerHTML = `
          <img src="${dataUrl}" alt="${escapeHtml(prompt || '')}" />
          <button class="dl-btn" type="button" data-dl="${id}" title="Download">↓</button>
        `;
        tile.addEventListener('click', (e) => {
          if (e.target.closest('.dl-btn')) return;
          // Open full-size in a new tab via blob URL (handles huge data URLs)
          fetch(dataUrl).then(r => r.blob()).then(b => {
            const url = URL.createObjectURL(b);
            window.open(url, '_blank', 'noopener');
            setTimeout(() => URL.revokeObjectURL(url), 60000);
          });
        });
        const dl = tile.querySelector('.dl-btn');
        dl.addEventListener('click', (e) => {
          e.stopPropagation();
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = `axon-${id}.png`;
          document.body.appendChild(a); a.click(); a.remove();
        });
        strip.appendChild(tile);
        strip.hidden = false;
        // Auto-scroll the strip to show the newest tile
        strip.scrollTo({ left: strip.scrollWidth, behavior: 'smooth' });
      }

      function clearGallery() {
        const strip = document.getElementById('gallery-strip');
        if (!strip) return;
        // Keep the label, drop everything else
        strip.querySelectorAll('.gallery-tile').forEach(t => t.remove());
        strip.hidden = true;
      }

      // Toggle expand/collapse on a transaction row, fills detail panel on first open
      function toggleTxDetail(idx) {
        const row = document.getElementById('tx-row-' + idx);
        const detail = document.getElementById('tx-detail-' + idx);
        if (!row || !detail) return;

      // Build the detail panel for one transaction — surfaces every field we have
      function renderTxDetail(t) {
        const rows = [];
        const created = new Date(t.created_at);
        const amount = Number(t.amount_usdc || 0);
        const sign = amount >= 0 ? '+' : '';
        rows.push(['Type', t.type || '—']);
        rows.push(['Amount', `${sign}${formatUsdc(t.amount_usdc)} USDC`]);
        rows.push(['When', `${created.toLocaleString()} (${relativeTime(t.created_at)})`]);
        rows.push(['Timestamp (UTC)', created.toISOString()]);

        if (t.api_slug) rows.push(['API', t.api_slug]);
        const endpoint = t.meta && t.meta.endpoint;
        if (endpoint) rows.push(['Endpoint', endpoint]);
        if (t.meta && typeof t.meta.cached === 'boolean') {
          rows.push(['Cache hit', t.meta.cached ? 'yes — 50% discount applied' : 'no — live upstream']);
        }
        if (t.meta && t.meta.upstream_status) rows.push(['Upstream HTTP status', String(t.meta.upstream_status)]);
        if (t.meta && t.meta.latency_ms !== undefined) rows.push(['Latency', `${t.meta.latency_ms} ms`]);
        if (t.meta && t.meta.markup_micro !== undefined) {
          rows.push(['Operator markup', `${formatUsdc(String(t.meta.markup_micro))} USDC`]);
        }
        if (t.meta && t.meta.upstream_micro !== undefined) {
          rows.push(['Upstream cost', `${formatUsdc(String(t.meta.upstream_micro))} USDC`]);
        }
        if (t.meta && t.meta.reason) rows.push(['Reason', String(t.meta.reason).replace(/_/g, ' ')]);
        if (t.meta && t.meta.event) rows.push(['Event', String(t.meta.event).replace(/_/g, ' ')]);
        if (t.meta && t.meta.error) rows.push(['Error', String(t.meta.error)]);
        if (t.meta && t.meta.fallback_used) rows.push(['Fallback used', String(t.meta.fallback_used)]);
        if (t.request_id) rows.push(['Request ID', t.request_id]);
        if (t.id) rows.push(['Transaction ID', t.id]);
        if (t.onchain_tx) rows.push(['On-chain tx', t.onchain_tx]);

        // Surface anything else in meta we didn't explicitly map
        if (t.meta && typeof t.meta === 'object') {
          const known = new Set(['endpoint','cached','upstream_status','latency_ms','markup_micro','upstream_micro','reason','event','error','fallback_used']);
          for (const [k, v] of Object.entries(t.meta)) {
            if (known.has(k) || v === null || v === undefined || v === '') continue;
            const display = (typeof v === 'object') ? JSON.stringify(v) : String(v);
            rows.push([k.replace(/_/g, ' '), display]);
          }
        }

        return `
          <div class="tx-detail-grid">
            ${rows.map(([k, v]) => `
              <div class="k">${escapeHtml(k)}</div>
              <div class="v mono">${escapeHtml(v)}</div>
            `).join('')}
          </div>
        `;
      }

      function renderMarkdown(text) {
        // Resolve @img:<id> placeholders to actual data URLs stored in session
        let t = String(text);
        if (agentSession && agentSession.images) {
          t = t.replace(/@img:([a-zA-Z0-9]+)/g, (m, id) => agentSession.images[id] || m);
        }
        if (typeof window.marked === 'undefined') return escapeHtml(t);
        try {
          return window.marked.parse(t, { breaks: true, gfm: true });
        } catch (_) {
          return escapeHtml(t);
        }
      }

      function renderAgentChat() {
        const el = document.getElementById('agent-messages');
        if (!el) return;
        const visible = agentSession.messages.filter((m) =>
          (m.role === 'user' && m.content) ||
          (m.role === 'assistant' && m.content && typeof m.content === 'string')
        );
        if (visible.length === 0) {
          el.innerHTML = '<div class="empty" style="font-size:13px;padding:32px 8px;color:var(--text-muted);">Start a conversation — pick a template below or type freely.</div>';
          return;
        }
        el.innerHTML = visible.map((m) => {
          if (m.role === 'user') {
            return `
              <div class="msg msg-user">
                <div class="msg-role" translate="no">you</div>
                <div class="msg-content">${escapeHtml(m.content)}</div>
              </div>
            `;
          }
          // assistant — render markdown
          return `
            <div class="msg msg-assistant">
              <div class="msg-role" translate="no">agent</div>
              <div class="msg-content md">${renderMarkdown(m.content)}</div>
            </div>
          `;
        }).join('');
        el.scrollTop = el.scrollHeight;
      }

      function renderAgentBrain() {
        const el = document.getElementById('brain-events');
        if (!el) return;
        if (agentSession.events.length === 0) {
          el.innerHTML = '<div class="empty" style="font-size:12px;padding:24px 8px;color:var(--text-muted);">Tool calls will stream here.</div>';
          return;
        }
        el.innerHTML = agentSession.events.map((e) => {
          const cls = e.status === 'pending' ? 'pending' : e.status === 'error' ? 'error' : 'done';
          const argsStr = JSON.stringify(e.args);
          const argsDisplay = argsStr.length > 100 ? argsStr.slice(0, 100) + '…' : argsStr;
          let stats = '';
          if (e.status === 'pending') {
            stats = '<span class="stat pending">running…</span>';
          } else if (e.status === 'error') {
            stats = `<span class="stat err">${escapeHtml((e.error || 'failed').slice(0, 60))}</span>`;
          } else {
            const costStr = (e.cost || 0).toFixed(6);
            let cacheCls = 'cache-miss';
            if (e.cache === 'hit') cacheCls = 'cache-hit';
            else if (e.cache === 'local') cacheCls = 'cache-local';
            const costOrLocal = e.cache === 'local' ? '<span class="stat cost">local</span>' : `<span class="stat cost">$${costStr}</span>`;
            stats = costOrLocal +
              `<span class="stat ${cacheCls}">${e.cache || 'miss'}</span>` +
              `<span class="stat latency">${e.latency || 0}ms</span>`;
          }
          const thumb = e.imageUrl
            ? `<img src="${e.imageUrl}" alt="generated" style="display:block;max-width:100%;margin-top:8px;border-radius:4px;" loading="lazy" />`
            : '';
          return `
            <div class="brain-event ${cls}">
              <div class="tool-name">${escapeHtml(e.tool)}</div>
              <div class="tool-args">${escapeHtml(argsDisplay)}</div>
              <div class="tool-stats">${stats}</div>

          `;
        }).join('');
        el.scrollTop = el.scrollHeight;

      async function callGroq(messages, tools, signal) {
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const res = await fetch(b + '/v1/call/groq/chat', {
          method: 'POST',
          signal,
          headers: {
            'Authorization': 'Bearer ' + k,
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            model: AGENT_MODEL,
            messages,
            tools,
            tool_choice: 'auto',
            max_tokens: 4096,
            temperature: 0.3,
          }),
        });
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const err = new Error(errBody.message || `groq/chat ${res.status}`);
          err.status = res.status; err.cost = cost; err.cache = cache; err.latency = latency;
          throw err;
        }
        const body = await res.json();
        return { body, cost, cache, latency };
      }

      async function executeTool(name, args) {
        const tool = AGENT_TOOLS.find((t) => t.function.name === name);
        if (!tool) throw new Error('Unknown tool: ' + name);

        // Local tools run in the browser — no Axon cost, no network
        if (tool._local) {
          const t0 = Date.now();
          try {
            const body = await Promise.resolve(tool._local(args));
            return { body, cost: 0, cache: 'local', latency: Date.now() - t0 };
          } catch (err) {
            err.cost = 0;
            err.cache = 'local';
            err.latency = Date.now() - t0;
            err.status = 'local-error';
            throw err;
          }
        }

        // Custom tools handle their own dispatch (possibly multi-step).
        // They must return { body, cost, cache, latency, [_imageUrl] }.
        if (tool._custom) {
          return await tool._custom(args);
        }

        const { api, endpoint, method, paramStyle, paramMap } = tool._axon;
        const k = localStorage.getItem(STORAGE_KEY);
        const b = localStorage.getItem(BASE_KEY) || 'https://axon-kedb.onrender.com';
        const params = paramMap(args);
        let url = `${b}/v1/call/${api}/${endpoint}`;
        const init = { method, headers: { 'Authorization': 'Bearer ' + k } };
        if (paramStyle === 'query') {
          const qs = new URLSearchParams();
          for (const [kk, vv] of Object.entries(params)) {
            if (vv !== undefined && vv !== null) qs.set(kk, String(vv));
          }
          url += '?' + qs.toString();
        } else {
          init.headers['content-type'] = 'application/json';
          init.body = JSON.stringify(params);
        }
        const controller = new AbortController();
        init.signal = controller.signal;
        const timer = setTimeout(() => controller.abort(), TOOL_TIMEOUT_MS);
        let res;
        try {
          res = await fetch(url, init);
        } finally {
          clearTimeout(timer);
        }
        const cost = parseFloat(res.headers.get('x-axon-cost-usdc') || '0') || 0;
        const cache = res.headers.get('x-axon-cache') || 'miss';
        const latency = parseInt(res.headers.get('x-axon-latency-ms') || '0', 10);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          const err = new Error(errBody.message || `${api}/${endpoint} ${res.status}`);
          err.status = res.status; err.cost = cost; err.cache = cache; err.latency = latency;
          throw err;
        }
        const body = await res.json();
        return { body, cost, cache, latency };
      }

      async function runAgentTurn(userText) {
        if (agentSession.running) return;

        if (agentSession.spend >= HARD_CAP) {
          alert('Session hard cap of $' + HARD_CAP.toFixed(2) + ' reached. Click Reset session to start over.');
          return;
        }
        if (agentSession.spend >= SOFT_CAP) {
          const ok = confirm(`This session has already spent $${agentSession.spend.toFixed(4)}. Continue? (Hard cap $${HARD_CAP.toFixed(2)})`);
          if (!ok) return;
        }

        agentSession.running = true;
        agentSession.abortController = new AbortController();
        const runBtn = document.getElementById('agent-run');
        const stopBtn = document.getElementById('agent-stop');
        if (runBtn) { runBtn.disabled = true; runBtn.textContent = 'Running…'; }
        if (stopBtn) stopBtn.hidden = false;

        agentSession.messages.push({ role: 'user', content: userText });
        renderAgentChat();

        try {
          for (let iter = 0; iter < MAX_TOOL_CALLS_PER_TURN; iter++) {
            const { body, cost } = await callGroq(agentSession.messages, AGENT_TOOLS, agentSession.abortController.signal);
            agentSession.spend += cost;
            renderAgentFooter();

            const choice = body.choices && body.choices[0];
            if (!choice) throw new Error('No response from model');
            const msg = choice.message || {};
            agentSession.messages.push(msg);

            const toolCalls = msg.tool_calls || [];
            if (toolCalls.length === 0) {
              renderAgentChat();
              break;
            }

            for (const tc of toolCalls) {
              let argsObj;
              try { argsObj = JSON.parse(tc.function.arguments || '{}'); }
              catch (_) { argsObj = {}; }
              const ev = { id: tc.id, tool: tc.function.name, args: argsObj, status: 'pending' };
              agentSession.events.push(ev);
              renderAgentBrain();

              try {
                const out = await executeTool(tc.function.name, argsObj);
                ev.status = 'done';
                ev.cost = out.cost; ev.cache = out.cache; ev.latency = out.latency;
                ev.result = out.body;
                if (out._imageUrl) ev.imageUrl = out._imageUrl;
                agentSession.spend += out.cost;
                if (out.cache === 'hit') {
                  // User paid 50% of live price; savings ≈ cost (they'd have paid ~2x without cache)
                  agentSession.cacheSaved += out.cost;
                }
                agentSession.messages.push({
                  role: 'tool',
                  tool_call_id: tc.id,
                  content: JSON.stringify(out.body).slice(0, 8000),
                });
              } catch (err) {
                ev.status = 'error';
                ev.error = err.message;
                ev.cost = err.cost || 0; ev.latency = err.latency || 0;
                agentSession.spend += (err.cost || 0);
                agentSession.messages.push({
                  role: 'tool',
                  tool_call_id: tc.id,
                  content: JSON.stringify({ error: err.message, status: err.status }),
                });
              }
              renderAgentBrain();
              renderAgentFooter();

              if (agentSession.spend >= HARD_CAP) {
                agentSession.messages.push({ role: 'assistant', content: '(hard cap reached mid-turn — stopping)' });
                renderAgentChat();
                return;
              }
            }
          }
        } catch (err) {
          if (err.name === 'AbortError') {
            agentSession.messages.push({ role: 'assistant', content: '(interrupted)' });
          } else {
            agentSession.messages.push({ role: 'assistant', content: '(error: ' + err.message + ')' });
          }
          renderAgentChat();
        } finally {
          agentSession.running = false;
          agentSession.abortController = null;
          if (runBtn) { runBtn.disabled = false; runBtn.textContent = 'Run'; }
          if (stopBtn) stopBtn.hidden = true;
        }
      }

      function initAgentChat() {
        if (localStorage.getItem(AGENT_CAP_ACK_KEY) !== '1') {
          showFirstRunModal();
        }
        resetAgentSession();
        document.getElementById('agent-run').onclick = () => {
          const input = document.getElementById('agent-input');
          const text = input.value.trim();
          if (!text) return;
          input.value = '';
          runAgentTurn(text);
        };
        document.getElementById('agent-stop').onclick = () => {
          if (agentSession.abortController) agentSession.abortController.abort();
        };
        document.getElementById('agent-reset').onclick = () => {
          if (agentSession.running && agentSession.abortController) {
            agentSession.abortController.abort();
          }
          resetAgentSession();
        };
        const input = document.getElementById('agent-input');
        if (input) {
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
              e.preventDefault();
              document.getElementById('agent-run').click();
            }
          });
        }
        // Quick-start chips: pre-fill textarea with template and focus
        document.querySelectorAll('#quick-chips .chip').forEach((chip) => {
          chip.addEventListener('click', () => {
            if (!input) return;
            const tpl = chip.getAttribute('data-tpl') || '';
            input.value = tpl;
            input.focus();
            // Move cursor to end
            input.setSelectionRange(input.value.length, input.value.length);
          });
        });
      }

      // ==========================================================

      const key = localStorage.getItem(STORAGE_KEY);
      if (key) renderApp();
      else renderLogin();
    </script>
  </body>
</html>
