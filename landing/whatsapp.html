<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axon · WhatsApp Brain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/_ui-kit.css" />
    <script src="/_ui-kit.js" defer></script>
    <style>
      :root {
        --bg: #0a0a0b;
        --bg-elev: #111114;
        --bg-card: #16161a;
        --bg-hover: #1c1c22;
        --border: #25252b;
        --text: #eeeef0;
        --text-dim: #9a9aa4;
        --text-muted: #6a6a76;
        --accent: #7c5cff;
        --accent-2: #19d5c6;
        --whatsapp: #25d366;
        --danger: #ff5f57;
        --warn: #ffd60a;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        overflow: hidden;
      }

      /* ─── Header ───────────────────────────────── */
      header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elev);
      }
      .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
      .logo-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }
      .header-actions { display: flex; gap: 12px; align-items: center; }
      .agent-select {
        background: var(--bg-card); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 6px 10px; font-size: 13px; font-family: inherit;
      }
      .key-chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px; color: var(--text-muted);
        background: var(--bg-card); padding: 5px 8px;
        border-radius: 5px; border: 1px solid var(--border);
      }
      .key-chip button {
        background: none; border: none; color: var(--text-dim);
        cursor: pointer; padding: 0 0 0 8px; font-size: 11px;
      }
      .nav-link {
        color: var(--text-dim); text-decoration: none; font-size: 13px;
      }
      .nav-link:hover { color: var(--text); }

      /* ─── Conn status bar ──────────────────────── */
      .conn-bar {
        display: flex; gap: 16px; align-items: center;
        padding: 10px 24px;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      .dot.green { background: var(--whatsapp); box-shadow: 0 0 8px var(--whatsapp); }
      .dot.yellow { background: var(--warn); }
      .dot.red { background: var(--danger); }

      /* ─── Main layout ──────────────────────────── */
      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: calc(100vh - 110px);
      }

      /* Left: contacts ─────────────────────────── */
      .contacts-pane {
        border-right: 1px solid var(--border);
        background: var(--bg-elev);
        overflow-y: auto;
      }
      .contacts-header {
        padding: 14px 18px;
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        position: sticky; top: 0; background: var(--bg-elev);
      }
      .contact-item {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.1s;
      }
      .contact-item:hover { background: var(--bg-hover); }
      .contact-item.active { background: var(--bg-card); border-left: 3px solid var(--accent); padding-left: 15px; }
      .contact-name { font-weight: 600; font-size: 14px; }
      .contact-phone {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px; color: var(--text-muted); margin-top: 2px;
      }
      .contact-meta {
        display: flex; gap: 8px; margin-top: 6px;
        font-size: 11px; color: var(--text-dim);
      }
      .badge {
        background: var(--bg-card); padding: 2px 6px; border-radius: 4px;
        font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
      }
      .badge.facts { color: var(--accent-2); border-color: var(--accent-2); }

      /* Right: chat + memory ────────────────────── */
      .detail-pane {
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }
      .memory-card {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 18px 24px;
        max-height: 40vh;
        overflow-y: auto;
      }
      .memory-card h2 {
        font-size: 14px; font-weight: 600; margin: 0 0 14px;
        color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;
      }
      .mem-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .mem-row { font-size: 13px; }
      .mem-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      .mem-value { font-weight: 500; margin-top: 2px; }
      .facts-table { width: 100%; font-size: 13px; }
      .facts-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
      .facts-table td:first-child {
        color: var(--accent-2); width: 40%;
        font-family: 'JetBrains Mono', monospace; font-size: 12px;
      }
      .facts-table tr:last-child td { border-bottom: none; }
      .source-pill {
        display: inline-block; padding: 1px 5px; border-radius: 3px;
        font-size: 9px; text-transform: uppercase; margin-left: 6px;
        border: 1px solid;
      }
      .source-pill.manual { color: var(--accent-2); border-color: var(--accent-2); }
      .source-pill.llm { color: var(--text-muted); border-color: var(--text-muted); }

      .chat-pane {
        overflow-y: auto;
        padding: 18px 24px;
      }
      .chat-pane h2 {
        font-size: 14px; font-weight: 600; margin: 0 0 14px;
        color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;
      }
      .turn { margin: 12px 0; max-width: 75%; }
      .turn.user { margin-left: auto; }
      .turn.assistant { margin-right: auto; }
      .bubble {
        padding: 10px 14px; border-radius: 12px;
        font-size: 14px; line-height: 1.45;
        white-space: pre-wrap; word-break: break-word;
      }
      .turn.user .bubble {
        background: var(--accent); color: white;
        border-bottom-right-radius: 4px;
      }
      .turn.assistant .bubble {
        background: var(--bg-card); border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .turn-meta {
        font-size: 10px; color: var(--text-muted);
        margin-top: 4px; padding: 0 6px;
      }
      .turn.user .turn-meta { text-align: right; }

      .empty {
        text-align: center; color: var(--text-muted);
        padding: 40px 20px; font-size: 14px;
      }
      .empty-emoji { font-size: 32px; opacity: 0.5; margin-bottom: 12px; }

      /* ─── Brain / reasoning panel ─────────────────────────────── */
      .brain-toggle {
        display: inline-flex; align-items: center; gap: 6px;
        margin-top: 6px; padding: 0 4px;
        background: none; border: none; color: var(--text-muted);
        font-size: 11px; font-family: inherit; cursor: pointer;
        border-radius: 4px;
      }
      .brain-toggle:hover { color: var(--accent-2); background: rgba(25,213,198,0.06); }
      .brain-toggle .chev { transition: transform 0.15s; display: inline-block; }
      .brain-toggle.open .chev { transform: rotate(90deg); }
      .brain-panel {
        margin-top: 6px;
        background: rgba(124,92,255,0.04);
        border: 1px solid rgba(124,92,255,0.18);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        color: var(--text-dim);
        display: none;
      }
      .brain-panel.open { display: block; }
      .brain-row { display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center; margin: 4px 0; }
      .brain-label { color: var(--text-muted); font-size: 10px;
        text-transform: uppercase; letter-spacing: 0.04em; min-width: 78px; }
      .brain-pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 7px; border-radius: 10px;
        font-size: 11px; background: var(--bg-card);
        border: 1px solid var(--border); color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
      }
      .brain-pill.intent-sales { color: #ffd60a; border-color: rgba(255,214,10,0.4); }
      .brain-pill.intent-personal { color: #19d5c6; border-color: rgba(25,213,198,0.4); }
      .brain-pill.intent-support { color: #ff5f57; border-color: rgba(255,95,87,0.4); }
      .brain-pill.cache { color: var(--accent-2); border-color: rgba(25,213,198,0.4); }
      .brain-pill.owner { color: #ffd60a; border-color: rgba(255,214,10,0.4); }
      .brain-tool-ok { color: var(--whatsapp); }
      .brain-tool-err { color: var(--danger); }
      .brain-footer {
        margin-top: 6px; padding-top: 6px;
        border-top: 1px dashed var(--border);
        font-family: 'JetBrains Mono', monospace; font-size: 10px;
        color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap;
      }

      /* ─── Score badge on assistant bubble ─────────────────────── */
      .score-badge {
        display: inline-flex; align-items: center; gap: 3px;
        padding: 1px 6px; border-radius: 8px; font-size: 10px;
        font-weight: 600; margin-left: 6px;
        font-family: 'JetBrains Mono', monospace;
      }
      .score-badge.great { background: rgba(37,211,102,0.15); color: var(--whatsapp);
        border: 1px solid rgba(37,211,102,0.4); }
      .score-badge.ok { background: rgba(124,92,255,0.15); color: var(--accent);
        border: 1px solid rgba(124,92,255,0.4); }
      .score-badge.ok_com_ressalva { background: rgba(255,214,10,0.12); color: var(--warn);
        border: 1px solid rgba(255,214,10,0.4); }
      .score-badge.ruim { background: rgba(255,95,87,0.12); color: var(--danger);
        border: 1px solid rgba(255,95,87,0.4); }
      .score-badge.pending {
        background: var(--bg-card); color: var(--text-muted);
        border: 1px solid var(--border); animation: pulse 2s infinite;
      }

      .eval-issues {
        margin: 4px 0 0; padding: 6px 8px;
        background: rgba(255,95,87,0.06);
        border-left: 2px solid var(--danger);
        font-size: 11px; color: var(--text-dim);
      }
      .eval-issues li { margin: 2px 0; }
      .eval-axes { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
      .axis-pill {
        font-size: 10px; padding: 1px 5px; border-radius: 3px;
        background: var(--bg-card); border: 1px solid var(--border);
        font-family: 'JetBrains Mono', monospace;
      }
      .axis-pill.fail { color: var(--danger); border-color: rgba(255,95,87,0.4); }
      .axis-pill.pass { color: var(--text-muted); }

      /* ─── Health pill in conn-bar ────────────────────────────── */
      .health-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 10px; border-radius: 14px;
        font-size: 12px; font-weight: 600;
        border: 1px solid var(--border);
        background: var(--bg-card);
        cursor: pointer;
      }
      .health-pill.high { color: var(--whatsapp); border-color: rgba(37,211,102,0.4); }
      .health-pill.mid { color: var(--warn); border-color: rgba(255,214,10,0.4); }
      .health-pill.low { color: var(--danger); border-color: rgba(255,95,87,0.4); }
      .trend-up { color: var(--whatsapp); }
      .trend-down { color: var(--danger); }
      .trend-flat { color: var(--text-muted); }

      /* ─── Arc pill on contact ─────────────────────────────────── */
      .arc-pill {
        display: inline-block; padding: 1px 6px; border-radius: 8px;
        font-size: 10px; font-weight: 600; margin-top: 4px;
      }
      .arc-progressing { background: rgba(37,211,102,0.12); color: var(--whatsapp); }
      .arc-stuck { background: rgba(255,214,10,0.12); color: var(--warn); }
      .arc-frustrated { background: rgba(255,95,87,0.12); color: var(--danger); }
      .arc-closing { background: rgba(124,92,255,0.15); color: var(--accent); }
      .arc-resolved { background: rgba(25,213,198,0.12); color: var(--accent-2); }

      /* ─── Patches drawer ─────────────────────────────────────── */
      .patches-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 8px; padding: 12px 14px; margin-top: 12px;
      }
      .patches-card h3 {
        font-size: 12px; margin: 0 0 8px;
        text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim);
      }
      .patch-item {
        padding: 8px; border: 1px solid var(--border); border-radius: 6px;
        margin: 6px 0; background: var(--bg);
      }
      .patch-issue { color: var(--danger); font-size: 11px;
        font-family: 'JetBrains Mono', monospace; }
      .patch-suggestion { color: var(--text); font-size: 13px; margin: 4px 0; }
      .patch-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
      .patch-btn-apply {
        background: var(--whatsapp); color: white; border: none;
        padding: 5px 12px; border-radius: 5px; font-size: 11px;
        font-weight: 600; cursor: pointer; font-family: inherit;
      }
      .patch-btn-apply:disabled { opacity: 0.4; cursor: not-allowed; background: var(--bg-card); color: var(--text-muted); }
      .patch-applied { color: var(--text-muted); font-size: 11px; }

      /* Login screen ─────────────────────────── */
      .login-screen {
        display: flex; align-items: center; justify-content: center;
        height: 100vh; padding: 20px;
      }
      .login-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 32px; max-width: 420px; width: 100%;
      }
      .login-card h1 { font-size: 22px; margin: 0 0 8px; }
      .login-card p { color: var(--text-dim); font-size: 14px; margin: 0 0 24px; }
      .input {
        width: 100%; background: var(--bg);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 12px; font-family: 'JetBrains Mono', monospace;
        font-size: 13px; color: var(--text);
      }
      .btn {
        background: var(--accent); color: white; border: none;
        border-radius: 6px; padding: 10px 18px; font-weight: 600;
        font-family: inherit; font-size: 14px; cursor: pointer;
        margin-top: 12px;
      }
      .btn:hover { opacity: 0.9; }

      .refresh-indicator {
        display: inline-block; width: 6px; height: 6px;
        border-radius: 50%; background: var(--accent-2);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* Mobile ─────────────────────────────── */
      @media (max-width: 800px) {
        main { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; height: calc(100vh - 130px); }
        .contacts-pane { max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
        .conn-bar { flex-wrap: wrap; gap: 8px; padding: 8px 14px; }
        .detail-pane { grid-template-rows: minmax(0, 0.5fr) minmax(0, 0.5fr); overflow: hidden; }
        .memory-card { max-height: 35vh; padding: 14px 16px; }
        .chat-pane { padding: 14px 16px; }
        header { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
        .header-actions { width: 100%; justify-content: space-between; }
        .agent-select { flex: 1; min-height: 40px; min-width: 0; }
        .key-chip { font-size: 10px; padding: 6px 9px; min-height: 36px; display: inline-flex; align-items: center; }
        .nav-link { padding: 8px 10px; min-height: 40px; display: inline-flex; align-items: center; }
        .turn { max-width: 88%; }
        .bubble { font-size: 13px; padding: 9px 12px; }
        .contacts-header { padding: 10px 14px; font-size: 11px; }
        .contact-item { padding: 12px 14px; }
        .contact-name { font-size: 13px; }
        .contact-phone { font-size: 10px; }
        .badge { padding: 3px 7px; font-size: 10px; }
        .mem-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        .facts-table td { font-size: 12px; padding: 5px 6px; }
      }
      @media (max-width: 480px) {
        .mem-grid { grid-template-columns: 1fr; }
        .conn-bar > span { font-size: 12px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const STORAGE_KEY = 'axon_api_key';
      const API_BASE = 'https://axon-kedb.onrender.com';
      const REFRESH_MS = 5000;

      let state = {
        apiKey: localStorage.getItem(STORAGE_KEY) || '',
        agents: [],
        selectedAgentId: null,
        contacts: [],
        selectedPhone: null,
        memory: null,
        messages: [],
        whatsappConn: null,
        // Brain instrumentation: agent-wide health summary + per-message
        // brain panel toggle state. openBrainIds is a Set of message ids
        // whose "🧠 raciocínio" panel is currently expanded — survives the
        // 5s auto-refresh so the operator can keep one open while traffic
        // flows in.
        health: null,
        patches: [],
        openBrainIds: new Set(),
      };

      let refreshTimer = null;

      // ─── API helpers ───────────────────────────
      async function api(path, opts = {}) {
        const r = await fetch(API_BASE + path, {
          ...opts,
          headers: {
            'x-api-key': state.apiKey,
            'Content-Type': 'application/json',
            ...(opts.headers || {}),
          },
        });
        if (!r.ok) {
          if (r.status === 401) {
            localStorage.removeItem(STORAGE_KEY);
            state.apiKey = '';
            render();
          }
          // Read the JSON body so callers can branch on `error` codes
          // (wrong_pay_mode, auto_provision_unavailable, etc) and show
          // the human `message` instead of a bare "400". Falls back to
          // statusText when the body isn't JSON.
          const body = await r.json().catch(() => ({}));
          const parts = [String(r.status)];
          if (body && body.error) parts.push(body.error);
          if (body && body.message) parts.push(body.message);
          else if (r.statusText) parts.push(r.statusText);
          throw new Error(parts.join(' '));
        }
        return r.json();
      }

      // ─── Render ────────────────────────────────
      function render() {
        if (!state.apiKey) { renderLogin(); return; }
        renderApp();
      }

      function renderLogin() {
        document.getElementById('app').innerHTML = `
          <div class="login-screen">
            <div class="login-card">
              <h1>WhatsApp Brain</h1>
              <p>Cole sua Axon API key pra ver os agentes WhatsApp e o cérebro de cada contato.</p>
              <input class="input" id="key-in" placeholder="ax_live_..." autofocus />
              <button class="btn" onclick="doLogin()">Entrar</button>
              <p style="margin-top: 16px; font-size: 12px;">
                Não tem? <a href="/" style="color: var(--accent)">Criar conta</a>
              </p>
            </div>
          </div>
        `;
        document.getElementById('key-in').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') doLogin();
        });
      }

      function renderApp() {
        const conn = state.whatsappConn;
        // Three visual states:
        //   no conn      → red dot, "+ Conectar" button (provisions new instance)
        //   pending pair → yellow dot, "📱 Continuar pareamento" (resumes existing instance, NO new provision)
        //   paired       → green dot, no button
        const isPending = !!(conn && conn.pending_pairing);
        const isPaired = !!(conn && !conn.pending_pairing && (conn.status === 'open' || conn.status === 'connected'));
        const connDot = !conn ? 'red' : (isPaired ? 'green' : 'yellow');
        const connLabel = !conn ? 'sem conexão WhatsApp neste agente' :
          isPaired ? 'WhatsApp conectado' :
          isPending ? 'aguardando você escanear o QR' :
          conn.status || 'desconhecido';
        const connectButton = !conn
          ? '<button onclick="showConnectModal()" style="margin-left:auto;background:var(--accent);color:white;border:none;padding:6px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;">+ Conectar WhatsApp</button>'
          : isPending
          ? '<button onclick="resumePairing()" style="margin-left:auto;background:var(--warn);color:#000;border:none;padding:6px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;">📱 Continuar pareamento</button>'
          : '';

        document.getElementById('app').innerHTML = `
          <header>
            <div class="brand">
              <div class="logo-dot"></div>
              <span>WhatsApp Brain</span>
            </div>
            <div class="header-actions">
              <a href="/dashboard" class="nav-link">← Dashboard</a>
              <select class="agent-select" id="agent-sel" onchange="onAgentChange(this.value)">
                ${state.agents.map(a => `
                  <option value="${a.id}" ${a.id === state.selectedAgentId ? 'selected' : ''}>${escapeHtml(a.name)}</option>
                `).join('')}
              </select>
              <span class="key-chip">
                ${state.apiKey.slice(0, 12)}…
                <button onclick="logout()">sair</button>
              </span>
            </div>
          </header>

          <div class="conn-bar">
            <span class="dot ${connDot}"></span>
            <span><strong>${connLabel}</strong></span>
            ${conn ? `<span style="color:var(--text-muted)">· ${escapeHtml(conn.instance_url || '')}</span>` : ''}
            ${conn ? `<span style="color:var(--text-muted)">· instância: ${escapeHtml(conn.instance_name || '')}</span>` : ''}
            ${conn && conn.owner_phone ? `<span style="color:var(--accent-2)" title="Quando você manda zap deste número, o agente vira seu assistente pessoal (gera imagens, etc).">· dono: +${escapeHtml(conn.owner_phone)} 👤</span>` : ''}
            ${renderHealthPill()}
            ${connectButton}
            <span style="margin-left: ${connectButton ? '12px' : 'auto'}; color: var(--text-muted); font-size: 12px;">
              <span class="refresh-indicator"></span> atualiza a cada ${REFRESH_MS/1000}s
            </span>
          </div>

          <main>
            <div class="contacts-pane">
              <div class="contacts-header">${state.contacts.length} contatos <span class="info-tip" data-tip="Lista de pessoas que conversaram com seu agente. Cada uma tem memória própria (nome, fatos, histórico).">?</span></div>
              ${state.contacts.length === 0 ? (!conn ? `
                <div class="empty">
                  <div class="empty-emoji">📲</div>
                  <strong style="color:var(--text);">WhatsApp não conectado</strong><br/>
                  <span style="font-size:12px;">Conecte uma instância Evolution<br/>pra começar a receber zaps</span><br/>
                  <button onclick="showConnectModal()" style="margin-top:14px;background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">Conectar agora →</button>
                </div>
              ` : `
                <div class="empty">
                  <div class="empty-emoji">💬</div>
                  <strong style="color:var(--text);">Nenhum contato ainda</strong><br/>
                  <span style="font-size:12px;">Mande um zap pro número conectado.<br/>O contato aparece aqui após a 1ª mensagem.</span>
                </div>
              `) : state.contacts.map(c => `
                <div class="contact-item ${c.phone === state.selectedPhone ? 'active' : ''}"
                     onclick="selectContact('${c.phone}')">
                  <div class="contact-name">${escapeHtml(c.display_name || 'sem nome')}</div>
                  <div class="contact-phone">+${escapeHtml(c.phone)}</div>
                  <div class="contact-meta">
                    <span class="badge" title="Mensagens trocadas com este contato">${c.message_count} msg</span>
                    ${c.facts_count > 0 ? `<span class="badge facts" title="Informações que o agente lembra deste contato (ex: alergia, plano, idade)">${c.facts_count} fatos</span>` : ''}
                    <span style="margin-left: auto;">${relTime(c.last_contact_at)}</span>
                  </div>
                  ${renderArcPill(c.arc)}
                </div>
              `).join('')}
            </div>

            <div class="detail-pane">
              <div class="memory-card">${renderMemory()}</div>
              <div class="chat-pane">${renderChat()}</div>
            </div>
          </main>
        `;
      }

      function renderMemory() {
        if (!state.selectedPhone) {
          return '<div class="empty"><div class="empty-emoji">🧠</div>Selecione um contato à esquerda<br/>para ver o que o agente lembra dele</div>';
        }
        const m = state.memory;
        if (!m) return '<div class="empty">carregando memória…</div>';
        const facts = Array.isArray(m.facts) ? m.facts : [];
        const tags = Array.isArray(m.tags) ? m.tags : [];

        return `
          <h2>🧠 Memória do contato <span class="info-tip" data-tip="Tudo que o agente sabe deste contato. Carregado automaticamente antes de cada resposta.">?</span></h2>
          <div class="mem-grid">
            <div class="mem-row">
              <div class="mem-label">Nome</div>
              <div class="mem-value">${escapeHtml(m.display_name || '—')}</div>
            </div>
            <div class="mem-row">
              <div class="mem-label">Idioma</div>
              <div class="mem-value">${escapeHtml(m.language || '—')}</div>
            </div>
            <div class="mem-row">
              <div class="mem-label">Tom <span class="info-tip" data-tip="Formal/informal — agente adapta a fala">?</span></div>
              <div class="mem-value">${escapeHtml(m.formality || '—')}</div>
            </div>
            <div class="mem-row">
              <div class="mem-label">Tags <span class="info-tip" data-tip="Marcadores que você define manualmente (ex: VIP, moroso)">?</span></div>
              <div class="mem-value">${tags.length ? tags.map(t => `<span class="badge">${escapeHtml(t)}</span>`).join(' ') : '—'}</div>
            </div>
            <div class="mem-row">
              <div class="mem-label">Mensagens</div>
              <div class="mem-value">${m.message_count}</div>
            </div>
            <div class="mem-row">
              <div class="mem-label">Primeiro contato</div>
              <div class="mem-value">${m.first_contact_at ? new Date(m.first_contact_at).toLocaleDateString('pt-BR') : '—'}</div>
            </div>
          </div>

          ${facts.length > 0 ? `
            <h2 style="margin-top: 16px;">📋 Fatos lembrados (${facts.length}) <span class="info-tip" data-tip="Informações extraídas automaticamente do que o cliente disse. Pílula 'manual' = você editou; 'llm' = agente capturou sozinho.">?</span></h2>
            <table class="facts-table">
              <tbody>
                ${facts.map(f => `
                  <tr>
                    <td>${escapeHtml(f.key)}</td>
                    <td>
                      ${escapeHtml(f.value)}
                      <span class="source-pill ${f.source}" title="${f.source === 'manual' ? 'Você editou esse fato' : 'O agente extraiu da conversa'}">${f.source}</span>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : '<p style="color: var(--text-muted); font-size: 13px;">Sem fatos lembrados ainda. Conforme o cliente conversar, o agente extrai automaticamente.</p>'}

          ${m.summary ? `
            <h2 style="margin-top: 16px;">📝 Resumo</h2>
            <p style="font-size: 13px; color: var(--text-dim);">${escapeHtml(m.summary)}</p>
          ` : ''}
        `;
      }

      // ─── Connect WhatsApp wizard ───────────────────────────
      // 4-state machine inside one modal: form → connecting → pairing → paired.
      // Polls /v1/agents/:id/whatsapp every 3s during pairing to detect when
      // the user successfully scans the QR / enters the pairing code.
      // Aborts after 90s if not paired (user can retry).
      let connectWizardState = { step: 'form', pollTimer: null, agentId: null };

      window.showConnectModal = () => {
        if (!state.selectedAgentId) {
          alert('Selecione um agente no menu acima antes de conectar.');
          return;
        }
        // Default = auto-provision: open modal, immediately fire /auto, show QR.
        // BYO Evolution remains accessible via "Modo avançado" link in the form.
        connectWizardState = { step: 'connecting', pollTimer: null, agentId: state.selectedAgentId, mode: 'auto' };
        const overlay = document.createElement('div');
        overlay.id = 'connect-modal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = '<div id="connect-modal-body" style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:560px;width:100%;max-height:92vh;overflow-y:auto;"></div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) closeConnectModal();
        });
        renderConnectStep();
        // Kick off auto-provision in the background. If it fails (server not
        // configured / network error), fall back to manual form.
        autoProvisionConnection();
      };

      async function autoProvisionConnection() {
        try {
          const r = await api(`/v1/agents/${connectWizardState.agentId}/whatsapp/auto`, {
            method: 'POST',
            body: JSON.stringify({}),
          });
          const conn = r.connection || {};
          connectWizardState.pairingData = { qr: conn.qr_base64, pairing: conn.pairing_code };
          connectWizardState.step = 'pairing';
          renderConnectStep();
        } catch (err) {
          const msg = (err.message || '').toLowerCase();
          // Wrong pay_mode = the agent is set to "visitor pays" but WhatsApp
          // visitors are anonymous (no API key) so the owner has to pay for
          // their conversations. We can fix this in one click instead of
          // throwing the user back to the form with a cryptic 400.
          if (msg.includes('wrong_pay_mode') || msg.includes('require pay_mode=owner')) {
            connectWizardState.step = 'pay-mode-fix';
            renderConnectStep();
            return;
          }
          // Auto-provision feature not configured on this server → manual form.
          if (msg.includes('auto_provision_unavailable') || msg.includes('503')) {
            connectWizardState.mode = 'manual';
            connectWizardState.step = 'form';
            renderConnectStep();
            setTimeout(() => showCwError('Auto-provisão indisponível neste servidor. Use o modo manual abaixo.'), 30);
          } else {
            connectWizardState.mode = 'manual';
            connectWizardState.step = 'form';
            renderConnectStep();
            setTimeout(() => showCwError('Falhou: ' + (err.message || err) + '. Tente o modo manual.'), 30);
          }
        }
      }

      // One-click pay_mode flip — turns visitor-pays agents into owner-pays
      // (required for WhatsApp since visitors are anon contacts). Then retries
      // the auto-provision flow so the user lands on the QR screen seamlessly.
      window.fixPayModeAndRetry = async () => {
        const body = document.getElementById('connect-modal-body');
        if (body) {
          const btn = document.getElementById('cw-fix-btn');
          if (btn) { btn.disabled = true; btn.textContent = 'Mudando…'; }
        }
        try {
          await api(`/v1/agents/${connectWizardState.agentId}`, {
            method: 'PATCH',
            body: JSON.stringify({ pay_mode: 'owner' }),
          });
          // Retry auto-provision now that pay_mode is correct.
          connectWizardState.step = 'connecting';
          connectWizardState.mode = 'auto';
          renderConnectStep();
          autoProvisionConnection();
        } catch (err) {
          const btn = document.getElementById('cw-fix-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Mudar para modo dono e tentar de novo'; }
          alert('Falhou ao mudar pay_mode: ' + (err.message || err));
        }
      };

      function closeConnectModal() {
        if (connectWizardState.pollTimer) clearInterval(connectWizardState.pollTimer);
        connectWizardState = { step: 'form', pollTimer: null, agentId: null };
        const m = document.getElementById('connect-modal');
        if (m) m.remove();
      }

      function renderConnectStep() {
        const body = document.getElementById('connect-modal-body');
        if (!body) return;
        const closeBtn = '<button onclick="closeConnectModal()" style="background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;line-height:1;">×</button>';
        const header = (title, sub) => `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
            <div>
              <h2 style="margin:0 0 4px 0;font-size:18px;">${title}</h2>
              ${sub ? `<div style="color:var(--text-muted);font-size:12px;">${sub}</div>` : ''}
            </div>
            ${closeBtn}
          </div>
        `;

        if (connectWizardState.step === 'form') {
          const subtitle = connectWizardState.mode === 'auto'
            ? 'Auto-provisão indisponível. Use suas credenciais Evolution.'
            : 'Modo avançado: conecte seu próprio servidor Evolution API.';
          body.innerHTML = `
            ${header('Conectar WhatsApp', subtitle)}
            <form id="cw-form" style="display:flex;flex-direction:column;gap:12px;">
              <label style="display:flex;flex-direction:column;gap:4px;font-size:13px;">
                <span>URL da Evolution <span style="color:var(--text-muted);font-size:11px;">(ex: https://sua-evolution.onrender.com)</span></span>
                <input id="cw-url" type="url" required placeholder="https://..." style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit;">
              </label>
              <label style="display:flex;flex-direction:column;gap:4px;font-size:13px;">
                <span>Nome da instância <span style="color:var(--text-muted);font-size:11px;">(o "instance name" no painel da Evolution)</span></span>
                <input id="cw-name" type="text" required placeholder="ex: minha-empresa" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit;">
              </label>
              <label style="display:flex;flex-direction:column;gap:4px;font-size:13px;">
                <span>API Key da Evolution <span style="color:var(--text-muted);font-size:11px;">(AUTHENTICATION_API_KEY do servidor)</span></span>
                <input id="cw-key" type="password" required placeholder="••••••••••••••••" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:'JetBrains Mono',monospace;">
              </label>
              <label style="display:flex;flex-direction:column;gap:4px;font-size:13px;">
                <span>Seu número <em style="color:var(--text-muted);font-weight:400;font-size:11px;">(opcional — modo dono)</em></span>
                <input id="cw-phone" type="tel" placeholder="5511999999999" pattern="[0-9]{10,15}" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:'JetBrains Mono',monospace;">
                <span style="color:var(--text-muted);font-size:11px;">Quando você mandar zap deste número pro bot, ele vira seu assistente pessoal (gera imagens, etc). DDI+DDD+número, só dígitos.</span>
              </label>
              <div id="cw-error" style="display:none;background:rgba(255,95,87,0.1);border:1px solid rgba(255,95,87,0.3);color:#ff5f57;padding:10px;border-radius:6px;font-size:12px;"></div>
              <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                <button type="button" onclick="closeConnectModal()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;">Cancelar</button>
                <button type="submit" style="background:var(--accent);color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">Conectar →</button>
              </div>
            </form>
            <details style="margin-top:14px;font-size:12px;color:var(--text-muted);">
              <summary style="cursor:pointer;">Não tem Evolution? Ver opções de servidor</summary>
              <div style="margin-top:8px;padding-left:8px;line-height:1.6;">
                • <strong>Z-API</strong> — z-api.io (BR, R$99/mês, simples)<br/>
                • <strong>Evolution Cloud</strong> — evolution-api.com (€9/mês oficial)<br/>
                • <strong>Self-hosted</strong> — github.com/EvolutionAPI/evolution-api (grátis, em VPS)
              </div>
            </details>
          `;
          document.getElementById('cw-form').addEventListener('submit', handleConnectSubmit);
        }

        if (connectWizardState.step === 'connecting') {
          const isAuto = connectWizardState.mode === 'auto';
          body.innerHTML = `
            ${header(isAuto ? 'Preparando WhatsApp…' : 'Conectando ao Evolution…', isAuto ? 'Estamos criando seu canal exclusivo. Em segundos.' : 'Validando credenciais e registrando webhook.')}
            <div style="display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:16px;">
              <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
              <div style="color:var(--text-muted);font-size:13px;">Geralmente leva 5-10 segundos…</div>
            </div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          `;
        }

        if (connectWizardState.step === 'pay-mode-fix') {
          body.innerHTML = `
            ${header('Esse agente está em modo cliente paga', 'Pra ativar WhatsApp, ele precisa estar em modo dono paga.')}
            <div style="background:rgba(255,214,10,0.08);border:1px solid rgba(255,214,10,0.3);border-radius:8px;padding:16px;margin-bottom:18px;font-size:13px;line-height:1.6;color:var(--text-dim);">
              <strong style="color:var(--text);">Por que isso?</strong><br/>
              No WhatsApp, quem manda zap é um número anônimo — seu agente não sabe quem é nem tem como cobrar dele. Por isso, o dono (você) cobre as conversas WhatsApp da sua wallet USDC.<br/><br/>
              <strong style="color:var(--text);">Quanto custa?</strong> Cada turno (mensagem do cliente + resposta do agente) custa entre <strong style="color:var(--accent-2);">$0,001 e $0,005</strong> dependendo das ferramentas usadas. Tu controla o teto diário (default: $5/dia) em <a href="/build" style="color:var(--accent-2);text-decoration:none;">/build</a>.
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
              <button onclick="closeConnectModal()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer;">Cancelar</button>
              <button id="cw-fix-btn" onclick="fixPayModeAndRetry()" style="background:var(--accent);color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">Mudar para modo dono e tentar de novo →</button>
            </div>
          `;
        }

        if (connectWizardState.step === 'pairing') {
          const { qr, pairing } = connectWizardState.pairingData || {};
          const qrImg = qr
            ? `<img alt="QR Code" src="data:image/png;base64,${qr}" style="width:240px;height:240px;background:white;border-radius:8px;padding:8px;display:block;margin:0 auto;">`
            : '<div style="width:240px;height:240px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:8px;color:var(--text-muted);font-size:12px;text-align:center;padding:16px;margin:0 auto;">QR não disponível agora — use o código de pareamento ↓</div>';
          const pairingDisplay = pairing
            ? pairing.replace(/(.{4})/g, '$1-').replace(/-$/, '')
            : null;
          body.innerHTML = `
            ${header('Escaneie o QR ou use o código', 'Abra WhatsApp → Aparelhos conectados → Conectar aparelho.')}
            ${qrImg}
            ${pairingDisplay ? `
              <div style="margin-top:18px;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;text-align:center;">
                <div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Ou use código de pareamento</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:0.15em;color:var(--accent-2);font-weight:600;">${pairingDisplay}</div>
                <div style="color:var(--text-muted);font-size:11px;margin-top:6px;">No WhatsApp: "Conectar com número" → digite esse código</div>
              </div>
            ` : ''}
            <div id="cw-poll-status" style="margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-muted);font-size:12px;">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--warn);box-shadow:0 0 6px var(--warn);"></div>
              <span>Aguardando você parear no celular… <span id="cw-poll-counter">0s</span></span>
            </div>
            <div style="display:flex;gap:8px;justify-content:space-between;margin-top:18px;flex-wrap:wrap;">
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button onclick="refreshConnectQR()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;">↻ Atualizar QR</button>
                <button onclick="resetWaInstance()" title="Apaga essa instância e gera uma nova" style="background:transparent;border:1px solid rgba(255,95,87,0.4);color:#ff5f57;padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;">🗑️ Recomeçar</button>
              </div>
              <button onclick="closeConnectModal()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;">Fechar</button>
            </div>
          `;
          startConnectPolling();
        }

        if (connectWizardState.step === 'paired') {
          body.innerHTML = `
            ${header('✅ WhatsApp conectado!', 'O bot já está pronto pra receber mensagens.')}
            <div style="display:flex;flex-direction:column;align-items:center;padding:32px 0;gap:14px;">
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(37,211,102,0.15);display:flex;align-items:center;justify-content:center;font-size:32px;">✓</div>
              <div style="color:var(--text);font-size:14px;text-align:center;line-height:1.5;">
                Mande qualquer mensagem pro número conectado<br/>
                pra testar a resposta automática.
              </div>
            </div>
            <div style="display:flex;justify-content:center;margin-top:8px;">
              <button onclick="closeConnectModal(); loadAgentData(); render();" style="background:var(--accent);color:white;border:none;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;">Fechar e voltar →</button>
            </div>
          `;
        }
      }

      async function handleConnectSubmit(e) {
        e.preventDefault();
        const url = document.getElementById('cw-url').value.trim().replace(/\/+$/, '');
        const name = document.getElementById('cw-name').value.trim();
        const apiKey = document.getElementById('cw-key').value.trim();
        const phone = document.getElementById('cw-phone').value.replace(/\D/g, '');
        const errBox = document.getElementById('cw-error');
        errBox.style.display = 'none';

        // Client-side validation
        if (!/^https?:\/\//.test(url)) { showCwError('URL precisa começar com http:// ou https://'); return; }
        if (!name || name.length < 2) { showCwError('Nome da instância obrigatório.'); return; }
        if (!apiKey || apiKey.length < 8) { showCwError('API Key parece inválida.'); return; }
        if (phone && (phone.length < 10 || phone.length > 15)) { showCwError('Número precisa ter 10–15 dígitos (com DDI+DDD).'); return; }

        connectWizardState.step = 'connecting';
        renderConnectStep();

        try {
          const r = await api(`/v1/agents/${connectWizardState.agentId}/whatsapp`, {
            method: 'POST',
            body: JSON.stringify({
              instance_url: url,
              instance_name: name,
              api_key: apiKey,
              ...(phone ? { owner_phone: phone } : {}),
            }),
          });
          const conn = r.connection || {};
          // If already paired (status=open) and no QR returned, jump straight to success.
          const isOpen = ['open', 'connected'].includes(String(conn.status || '').toLowerCase());
          if (isOpen && !conn.qr_base64 && !conn.pairing_code) {
            connectWizardState.step = 'paired';
          } else {
            connectWizardState.pairingData = { qr: conn.qr_base64, pairing: conn.pairing_code };
            connectWizardState.step = 'pairing';
          }
          renderConnectStep();
        } catch (err) {
          // Reset to form so user can fix and retry.
          connectWizardState.step = 'form';
          renderConnectStep();
          // showError after re-render so the error box exists in DOM.
          setTimeout(() => showCwError('Falhou: ' + (err.message || err)), 30);
        }
      }

      function showCwError(msg) {
        const box = document.getElementById('cw-error');
        if (!box) return;
        box.textContent = msg;
        box.style.display = 'block';
      }

      // Wipe the current Evolution instance and start the auto-provision flow
      // from scratch. Useful when an instance is wedged or the QR went stale.
      window.resetWaInstance = async () => {
        if (!confirm('Apagar essa instância e gerar uma nova?\n\nUse isso se o QR não está funcionando.')) return;
        if (connectWizardState.pollTimer) {
          clearInterval(connectWizardState.pollTimer);
          connectWizardState.pollTimer = null;
        }
        try {
          await api(`/v1/agents/${connectWizardState.agentId}/whatsapp`, { method: 'DELETE' });
        } catch { /* may already be gone */ }
        // Re-run auto-provision from the connecting step
        connectWizardState.step = 'connecting';
        connectWizardState.mode = 'auto';
        connectWizardState.pairingData = null;
        renderConnectStep();
        autoProvisionConnection();
      };

      window.refreshConnectQR = async () => {
        try {
          const r = await api(`/v1/agents/${connectWizardState.agentId}/whatsapp/qr`);
          if (r.paired) {
            connectWizardState.step = 'paired';
            renderConnectStep();
            return;
          }
          connectWizardState.pairingData = { qr: r.qr_base64, pairing: r.pairing_code };
          renderConnectStep();
        } catch (err) {
          showCwError('Falha ao atualizar QR: ' + err.message);
        }
      };

      function startConnectPolling() {
        if (connectWizardState.pollTimer) clearInterval(connectWizardState.pollTimer);
        let elapsed = 0;
        const intervalMs = 3000;
        const maxElapsed = 90; // seconds
        connectWizardState.pollTimer = setInterval(async () => {
          elapsed += intervalMs / 1000;
          const counter = document.getElementById('cw-poll-counter');
          if (counter) counter.textContent = `${Math.floor(elapsed)}s`;
          if (elapsed >= maxElapsed) {
            clearInterval(connectWizardState.pollTimer);
            connectWizardState.pollTimer = null;
            const status = document.getElementById('cw-poll-status');
            if (status) status.innerHTML = '<span style="color:var(--warn);">⏱ Tempo esgotado. Clique "↻ Atualizar QR" e tente de novo.</span>';
            return;
          }
          try {
            const r = await api(`/v1/agents/${connectWizardState.agentId}/whatsapp`);
            const isOpen = r.connected && ['open', 'connected'].includes(String(r.status || '').toLowerCase());
            if (isOpen) {
              clearInterval(connectWizardState.pollTimer);
              connectWizardState.pollTimer = null;
              connectWizardState.step = 'paired';
              renderConnectStep();
            }
          } catch (_) { /* network blip — keep polling */ }
        }, intervalMs);
      }

      function renderChat() {
        if (!state.selectedPhone) return '';
        const msgs = [...state.messages].reverse(); // chronological
        if (msgs.length === 0) {
          return '<div class="empty">Nenhuma mensagem com este contato ainda</div>';
        }
        return `
          <h2>💬 Conversa (${msgs.length} mensagens) <span class="info-tip" data-tip="Cada bolha do agente tem um botão 🧠 que abre o raciocínio: intent, tools usadas, custo, e nota dada por outro LLM avaliador.">?</span></h2>
          ${renderPatchesCard()}
          ${msgs.map(m => `
            <div class="turn ${m.role}">
              <div class="bubble">${escapeHtml(m.content)}${m.role === 'assistant' ? renderScoreBadge(m.meta) : ''}</div>
              <div class="turn-meta">${m.role === 'user' ? 'cliente' : '🤖 agente'} · ${relTime(m.created_at)}${renderEvalAxes(m)}</div>
              ${m.role === 'assistant' && m.meta ? renderBrainToggle(m) : ''}
              ${m.role === 'assistant' && m.meta ? renderBrainPanel(m) : ''}
            </div>
          `).join('')}
        `;
      }

      // ─── Brain instrumentation render helpers ─────────────────
      // All take the message (or its meta) and return an HTML fragment.
      // They tolerate null / missing fields so old messages and partial
      // turns render cleanly without showing empty "—" rows.

      function renderScoreBadge(meta) {
        if (!meta) return '';
        const ev = meta.eval;
        if (!ev) {
          // Judge hasn't run yet → show pulsing pending badge so the
          // operator knows a verdict is coming. Becomes color-coded once
          // the judge writes back (next refresh tick).
          return '<span class="score-badge pending" title="Avaliação assíncrona — chega no próximo refresh">…</span>';
        }
        const cls = ev.veredito || 'ok';
        const label = ev.score + '/100';
        const tip = `Veredito: ${ev.veredito} · julgado por ${escapeHtml(ev.judged_by || '?')}`;
        return `<span class="score-badge ${cls}" title="${tip}">${label}</span>`;
      }

      function renderEvalAxes(m) {
        // Show the failed axes as little chips next to the timestamp so the
        // operator can see at a glance WHY a turn was scored low — without
        // having to expand the brain panel. We only render failures (not
        // every axis that passed) to keep the row tight.
        if (m.role !== 'assistant' || !m.meta || !m.meta.eval) return '';
        const ev = m.meta.eval;
        const fails = [];
        if (!ev.respondeu_pergunta) fails.push('não respondeu');
        if (!ev.usou_tools_certas) fails.push('tools erradas');
        if (!ev.respeitou_business_info) fails.push('ignorou business info');
        if (!ev.manteve_persona) fails.push('quebrou persona');
        if (!ev.tom_adequado) fails.push('tom errado');
        if (ev.alucinou) fails.push('alucinou');
        if (fails.length === 0) return '';
        return ' · ' + fails.map(f => `<span class="axis-pill fail">${f}</span>`).join(' ');
      }

      function renderBrainToggle(m) {
        const isOpen = state.openBrainIds.has(m.id);
        return `<button class="brain-toggle ${isOpen ? 'open' : ''}" onclick="toggleBrain('${m.id}')">
          <span class="chev">▶</span> 🧠 ${isOpen ? 'fechar' : 'ver raciocínio'}
        </button>`;
      }

      function renderBrainPanel(m) {
        if (!state.openBrainIds.has(m.id)) return '';
        const meta = m.meta;
        const intent = meta.intent;
        const intentClass = intent ? `intent-${intent}` : '';
        const intentLabel = intent ? `${intent}` : null;

        const pills = [];
        if (intentLabel) pills.push(`<span class="brain-pill ${intentClass}">🎯 ${intentLabel}</span>`);
        if (meta.routed_agent) pills.push(`<span class="brain-pill">🚦 ${escapeHtml(meta.routed_agent)}</span>`);
        if (meta.owner_mode) pills.push('<span class="brain-pill owner">👤 modo dono</span>');
        if (meta.cache_hit) {
          const sim = meta.cache_similarity ? ` ${Math.round(meta.cache_similarity * 100)}%` : '';
          pills.push(`<span class="brain-pill cache">💾 cache hit${sim}</span>`);
        }
        if (meta.buffered_msgs && meta.buffered_msgs > 1) {
          pills.push(`<span class="brain-pill">📥 ${meta.buffered_msgs} msgs juntas</span>`);
        }

        const tools = Array.isArray(meta.tool_calls) ? meta.tool_calls : [];
        const offered = Array.isArray(meta.tools_offered) ? meta.tools_offered : [];
        const facts = Array.isArray(meta.facts_used) ? meta.facts_used : [];

        // Eval section — show issues + axes when present.
        const ev = meta.eval;
        let evalSection = '';
        if (ev) {
          const issues = Array.isArray(ev.issues) && ev.issues.length
            ? `<ul class="eval-issues">${ev.issues.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`
            : '';
          const axes = [
            ['respondeu_pergunta', 'respondeu'],
            ['usou_tools_certas', 'tools certas'],
            ['respeitou_business_info', 'business info'],
            ['manteve_persona', 'persona'],
            ['tom_adequado', 'tom'],
            ['pediu_clarificacao_quando_devia', 'clarificou'],
          ].map(([k, label]) => {
            const ok = ev[k];
            return `<span class="axis-pill ${ok ? 'pass' : 'fail'}">${ok ? '✓' : '✗'} ${label}</span>`;
          }).join('');
          const halluc = ev.alucinou
            ? `<span class="axis-pill fail">✗ alucinou</span>`
            : `<span class="axis-pill pass">✓ não alucinou</span>`;
          evalSection = `
            <div class="brain-row" style="margin-top:8px;">
              <span class="brain-label">Avaliação</span>
              <strong style="color:var(--text);">${ev.score}/100</strong>
              <span style="color:var(--text-muted);font-size:11px;">· julgado por ${escapeHtml(ev.judged_by || '?')}</span>
            </div>
            <div class="eval-axes">${axes}${halluc}</div>
            ${issues}
          `;
        }

        const footer = [
          meta.provider ? `provider: ${escapeHtml(meta.provider)}` : '',
          meta.iterations !== undefined ? `${meta.iterations} iter` : '',
          meta.latency_ms ? `${meta.latency_ms}ms` : '',
          meta.cost_usdc ? `$${meta.cost_usdc}` : '',
          meta.finish_reason ? `finish=${escapeHtml(meta.finish_reason)}` : '',
        ].filter(Boolean).join(' · ');

        return `
          <div class="brain-panel open">
            ${pills.length ? `<div class="brain-row">${pills.join('')}</div>` : ''}

            ${tools.length ? `
              <div class="brain-row" style="align-items:flex-start;">
                <span class="brain-label">Tools</span>
                <div style="flex:1;">
                  ${tools.map(t => `
                    <div style="margin:2px 0;">
                      <span class="${t.ok ? 'brain-tool-ok' : 'brain-tool-err'}">${t.ok ? '✓' : '✗'}</span>
                      <strong style="color:var(--text);">${escapeHtml(t.name)}</strong>
                      <span style="color:var(--text-muted);">(${escapeHtml(JSON.stringify(t.args || {}).slice(0, 80))})</span>
                      ${t.ms ? `<span style="color:var(--text-muted);"> · ${t.ms}ms</span>` : ''}
                      ${t.cost_usdc && parseFloat(t.cost_usdc) > 0 ? `<span style="color:var(--text-muted);"> · $${t.cost_usdc}</span>` : ''}
                      ${t.error ? `<div style="color:var(--danger);font-size:11px;margin-left:18px;">↳ ${escapeHtml(t.error)}</div>` : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : `
              <div class="brain-row">
                <span class="brain-label">Tools</span>
                <span style="color:var(--text-muted);font-size:11px;">nenhuma · resposta direta</span>
              </div>
            `}

            ${offered.length && offered.length !== tools.length ? `
              <div class="brain-row">
                <span class="brain-label">Disponíveis</span>
                <span style="color:var(--text-muted);font-size:11px;">selector ofereceu ${offered.length}: ${offered.slice(0, 8).map(escapeHtml).join(', ')}${offered.length > 8 ? '…' : ''}</span>
              </div>
            ` : ''}

            ${facts.length ? `
              <div class="brain-row">
                <span class="brain-label">Memória</span>
                <div>${facts.map(f => `<span class="brain-pill">${escapeHtml(f)}</span>`).join(' ')}</div>
              </div>
            ` : ''}

            ${evalSection}

            <div class="brain-footer">${footer}</div>
          </div>
        `;
      }

      function renderHealthPill() {
        const h = state.health;
        if (!h || h.avg_score === null || h.avg_score === undefined) return '';
        const score = h.avg_score;
        const cls = score >= 85 ? 'high' : score >= 70 ? 'mid' : 'low';
        let trendStr = '';
        if (h.score_trend !== null && h.score_trend !== undefined) {
          if (h.score_trend > 1) trendStr = `<span class="trend-up">↗ +${h.score_trend}</span>`;
          else if (h.score_trend < -1) trendStr = `<span class="trend-down">↘ ${h.score_trend}</span>`;
          else trendStr = '<span class="trend-flat">→ estável</span>';
        }
        const tip = h.top_issues && h.top_issues.length
          ? 'Top issues: ' + h.top_issues.slice(0, 3).map(i => `${i.issue} (${i.count}×)`).join(' · ')
          : `${h.total_judged} turnos avaliados nos últimos 100`;
        return `<span class="health-pill ${cls}" title="${escapeHtml(tip)}" onclick="alert('${escapeHtml(tip).replace(/'/g, '\\\\\\'')}')">
          🧠 saúde ${score}/100 ${trendStr}
        </span>`;
      }

      function renderArcPill(arc) {
        if (!arc || !arc.state) return '';
        const labels = {
          progressing: '📈 progredindo',
          stuck: '⚠️ travada',
          frustrated: '🚨 cliente frustrado',
          closing: '🎯 perto de fechar',
          resolved: '✅ resolvida',
        };
        const label = labels[arc.state] || arc.state;
        const tip = (arc.signals || []).slice(0, 3).join(' · ') || '';
        return `<span class="arc-pill arc-${arc.state}" title="${escapeHtml(tip)}">${label}</span>`;
      }

      function renderPatchesCard() {
        const patches = state.patches || [];
        const pending = patches.filter(p => !p.already_applied);
        if (pending.length === 0) return '';
        return `
          <div class="patches-card">
            <h3>🔧 Correções sugeridas (${pending.length}) <span class="info-tip" data-tip="O avaliador detectou padrões. Aplicar adiciona uma linha ao system_prompt do agente — você pode reverter editando o prompt no /build.">?</span></h3>
            ${pending.map((p, i) => `
              <div class="patch-item" id="patch-${i}">
                <div class="patch-issue">⚠ ${escapeHtml(p.issue)} <span style="color:var(--text-muted);font-weight:400;">(${p.count}×)</span></div>
                <div class="patch-suggestion">→ ${escapeHtml(p.patch_text)}</div>
                <div class="patch-actions">
                  <button class="patch-btn-apply" onclick="applyPatch(${i})">✓ aplicar correção</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      window.toggleBrain = (msgId) => {
        if (state.openBrainIds.has(msgId)) state.openBrainIds.delete(msgId);
        else state.openBrainIds.add(msgId);
        render();
      };

      window.applyPatch = async (idx) => {
        const patch = state.patches[idx];
        if (!patch) return;
        const el = document.getElementById('patch-' + idx);
        const btn = el?.querySelector('.patch-btn-apply');
        if (btn) { btn.disabled = true; btn.textContent = 'Aplicando…'; }
        try {
          const r = await api(`/v1/agents/${state.selectedAgentId}/patches/apply`, {
            method: 'POST',
            body: JSON.stringify({ patch_text: patch.patch_text }),
          });
          if (el) {
            el.innerHTML = `<div class="patch-applied">✓ aplicado ao system_prompt (${r.system_prompt_length} chars)</div>`;
          }
          // Refresh next tick to pull the updated patches list (this one
          // will now show as already_applied and be filtered out).
          setTimeout(() => loadAgentData().then(render), 1500);
        } catch (e) {
          alert('Falhou: ' + e.message);
          if (btn) { btn.disabled = false; btn.textContent = '✓ aplicar correção'; }
        }
      };

      // ─── Actions ───────────────────────────────
      window.doLogin = async () => {
        const k = document.getElementById('key-in').value.trim();
        if (!k.startsWith('ax_')) { alert('API key precisa começar com ax_'); return; }
        state.apiKey = k;
        localStorage.setItem(STORAGE_KEY, k);
        try {
          await loadAgents();
          render();
          startRefresh();
        } catch (e) {
          alert('Falha login: ' + e.message);
          state.apiKey = '';
          localStorage.removeItem(STORAGE_KEY);
        }
      };

      window.logout = () => {
        localStorage.removeItem(STORAGE_KEY);
        state = { ...state, apiKey: '', agents: [], selectedAgentId: null, contacts: [], selectedPhone: null, memory: null, messages: [], whatsappConn: null, health: null, patches: [], openBrainIds: new Set() };
        stopRefresh();
        render();
      };

      window.onAgentChange = async (agentId) => {
        state.selectedAgentId = agentId;
        state.selectedPhone = null;
        state.memory = null;
        state.messages = [];
        await loadAgentData();
        render();
      };

      window.selectContact = async (phone) => {
        state.selectedPhone = phone;
        await loadContactDetails();
        render();
      };

      // ─── Data ─────────────────────────────────
      async function loadAgents() {
        const r = await api('/v1/agents');
        state.agents = r.data || [];
        if (state.agents.length === 0) {
          alert('Nenhum agente nesta conta. Crie um em /build primeiro.');
          return;
        }
        if (!state.selectedAgentId || !state.agents.find(a => a.id === state.selectedAgentId)) {
          state.selectedAgentId = state.agents[0].id;
        }
        await loadAgentData();
      }

      async function loadAgentData() {
        if (!state.selectedAgentId) return;
        const [contacts, conn, health, patches] = await Promise.all([
          api(`/v1/agents/${state.selectedAgentId}/contacts`).catch(() => ({ contacts: [] })),
          api(`/v1/agents/${state.selectedAgentId}/whatsapp`).catch(() => ({ connected: false })),
          api(`/v1/agents/${state.selectedAgentId}/health`).catch(() => null),
          api(`/v1/agents/${state.selectedAgentId}/patches`).catch(() => ({ patches: [] })),
        ]);
        state.contacts = contacts.contacts || [];
        // Keep the conn object whenever an Evolution row exists — that way
        // we can distinguish "row exists but not yet paired" (pending_pairing)
        // from "no row at all" (clean slate). Only null out when truly absent.
        state.whatsappConn = (conn.connected || conn.pending_pairing) ? conn : null;
        state.health = health;
        state.patches = patches?.patches || [];
        if (state.selectedPhone) await loadContactDetails();
      }

      // Open the pairing modal for an EXISTING Evolution instance (no new
      // provision). Uses the QR + pairing_code that GET already returned, or
      // falls back to /whatsapp/qr to fetch a fresh one.
      window.resumePairing = async () => {
        if (!state.whatsappConn) return;
        connectWizardState = {
          step: 'pairing',
          pollTimer: null,
          agentId: state.selectedAgentId,
          mode: 'auto',
          pairingData: {
            qr: state.whatsappConn.qr_base64,
            pairing: state.whatsappConn.pairing_code,
          },
        };
        const overlay = document.createElement('div');
        overlay.id = 'connect-modal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = '<div id="connect-modal-body" style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:560px;width:100%;max-height:92vh;overflow-y:auto;"></div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeConnectModal(); });

        // If GET didn't include the QR (e.g. Evolution flap), fetch it.
        if (!connectWizardState.pairingData.qr && !connectWizardState.pairingData.pairing) {
          try {
            const r = await api(`/v1/agents/${state.selectedAgentId}/whatsapp/qr`);
            connectWizardState.pairingData = { qr: r.qr_base64, pairing: r.pairing_code };
          } catch { /* fall through — UI will show "QR não disponível" placeholder */ }
        }
        renderConnectStep();
        startConnectPolling();
      };

      async function loadContactDetails() {
        if (!state.selectedAgentId || !state.selectedPhone) return;
        const sessionId = 'wa:' + state.selectedPhone;
        const [mem, msgs] = await Promise.all([
          api(`/v1/agents/${state.selectedAgentId}/contacts/${state.selectedPhone}`),
          api(`/v1/agents/${state.selectedAgentId}/messages?session_id=${encodeURIComponent(sessionId)}&limit=100`),
        ]);
        state.memory = mem;
        state.messages = msgs.data || [];
      }

      // ─── Refresh loop ─────────────────────────
      function startRefresh() {
        stopRefresh();
        refreshTimer = setInterval(async () => {
          try { await loadAgentData(); render(); } catch (e) { console.warn('refresh failed', e); }
        }, REFRESH_MS);
      }
      function stopRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = null;
      }

      // ─── Utils ────────────────────────────────
      function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[c]);
      }
      function relTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
        if (diffSec < 60) return 'agora';
        if (diffSec < 3600) return `${Math.floor(diffSec / 60)}m atrás`;
        if (diffSec < 86400) return `${Math.floor(diffSec / 3600)}h atrás`;
        return d.toLocaleDateString('pt-BR');
      }

      // ─── Boot ─────────────────────────────────
      (async () => {
        if (state.apiKey) {
          try { await loadAgents(); render(); startRefresh(); }
          catch (e) {
            console.error(e);
            state.apiKey = '';
            localStorage.removeItem(STORAGE_KEY);
            render();
          }
        } else {
          render();
        }
      })();
    </script>
    <link rel="stylesheet" href="/_i18n.css" />
    <script src="/_i18n.js" defer></script>
  </body>
</html>
