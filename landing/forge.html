<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forjar agente — Axon</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="styles.css" />
<style>
:root {
  --rare-common:    #94a3b8;
  --rare-uncommon:  #19d5c6;
  --rare-rare:      #7c5cff;
  --rare-epic:      #c084fc;
  --rare-legendary: #ffd60a;
}

/* ─── Aurora background (same as agent-card) ─────────────── */
.aurora {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}
.aurora::before, .aurora::after {
  content: "";
  position: absolute;
  width: 90vw; height: 90vw;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.30;
  mix-blend-mode: screen;
}
.aurora::before {
  background: radial-gradient(circle, #7c5cff 0%, transparent 60%);
  top: -30vw; right: -20vw;
  animation: drift1 24s ease-in-out infinite;
}
.aurora::after {
  background: radial-gradient(circle, #19d5c6 0%, transparent 60%);
  bottom: -30vw; left: -20vw;
  animation: drift2 28s ease-in-out infinite;
}
@keyframes drift1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50%      { transform: translate(-8vw, 6vw) scale(1.1); }
}
@keyframes drift2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50%      { transform: translate(6vw, -8vw) scale(1.15); }
}

/* ─── Page layout ─────────────────────────────────────────── */
.forge-page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 24px 80px;
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 24px;
  align-items: start;
}
@media (max-width: 980px) {
  .forge-page { grid-template-columns: 1fr; }
}

/* ─── Chat column ─────────────────────────────────────────── */
.chat {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 70vh;
}
.bubble-row { display: flex; gap: 10px; max-width: 600px; }
.bubble-row.user { margin-left: auto; flex-direction: row-reverse; max-width: 580px; }
.bubble-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(124, 92, 255, 0.30);
}
.bubble-row.user .bubble-avatar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-size: 14px;
}
.bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  position: relative;
}
.bubble.assistant { border-top-left-radius: 4px; }
.bubble.user-msg {
  background: rgba(124, 92, 255, 0.12);
  border: 1px solid rgba(124, 92, 255, 0.30);
  border-top-right-radius: 4px;
  color: var(--text);
}
.bubble small { color: var(--text-dim); font-size: 12px; }

/* Typing indicator */
.typing {
  display: flex; gap: 4px;
  padding: 14px 16px;
}
.typing span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: blink 1.4s infinite ease-in-out both;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.7); }
  40%           { opacity: 1; transform: scale(1); }
}

/* Step appearance */
.step {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.45s ease, transform 0.45s ease;
  display: flex; flex-direction: column; gap: 12px;
}
.step.show { opacity: 1; transform: translateY(0); }

/* Picker grids */
.picker {
  margin-left: 42px;
  max-width: 560px;
}
@media (max-width: 540px) { .picker { margin-left: 0; } }

.picker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
  gap: 8px;
}
.picker-tile {
  aspect-ratio: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  user-select: none;
}
.picker-tile:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  background: rgba(124, 92, 255, 0.08);
}
.picker-tile.selected {
  border-color: var(--accent);
  background: rgba(124, 92, 255, 0.12);
  box-shadow: 0 0 0 2px rgba(124, 92, 255, 0.30);
}
.picker-tile.upload {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  flex-direction: column;
  gap: 4px;
}
.picker-tile.upload::before {
  content: "📷";
  font-size: 22px;
}

.picker-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}
.picker-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
}
.picker-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}
.picker-card.selected {
  border-color: var(--accent);
  background: rgba(124, 92, 255, 0.06);
  box-shadow: 0 0 0 2px rgba(124, 92, 255, 0.30);
}
.picker-card .ttl {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.picker-card .sub { font-size: 12px; color: var(--text-dim); line-height: 1.45; }

.picker-checks {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.picker-check {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  cursor: pointer;
  display: flex; gap: 10px; align-items: flex-start;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.picker-check:hover { border-color: var(--accent); }
.picker-check.checked {
  border-color: var(--accent-2);
  background: rgba(25, 213, 198, 0.06);
}
.picker-check .icon {
  width: 32px; height: 32px;
  flex-shrink: 0;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--rarity-color, var(--border));
}
.picker-check .body { flex: 1; min-width: 0; }
.picker-check .nm { font-size: 13px; font-weight: 700; }
.picker-check .ds { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-top: 2px; }
.picker-check .rar {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.10em;
  color: var(--rarity-color);
  font-weight: 700;
  position: absolute;
  top: 8px; right: 10px;
}
.picker-check::after {
  content: "✓";
  position: absolute;
  bottom: 8px; right: 10px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent-2);
  color: #0a0a0b;
  font-size: 11px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.15s, transform 0.15s;
}
.picker-check.checked::after { opacity: 1; transform: scale(1); }

.input-row {
  margin-left: 42px;
  max-width: 560px;
  display: flex; gap: 8px;
}
@media (max-width: 540px) { .input-row { margin-left: 0; } }
.input-row input {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
.input-row input:focus { border-color: var(--accent); }
.input-row .btn { flex-shrink: 0; }

.action-row {
  margin-left: 42px;
  max-width: 560px;
  display: flex; gap: 10px;
  flex-wrap: wrap;
}
@media (max-width: 540px) { .action-row { margin-left: 0; } }

/* Final celebration card */
.celebrate {
  margin-left: 42px;
  max-width: 560px;
  background:
    radial-gradient(400px 200px at 100% 0%, rgba(25, 213, 198, 0.20), transparent 70%),
    var(--bg-card);
  border: 1px solid rgba(25, 213, 198, 0.40);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
@media (max-width: 540px) { .celebrate { margin-left: 0; } }
.celebrate h3 {
  font-size: 22px;
  margin: 0 0 8px;
  letter-spacing: -0.01em;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.celebrate p {
  color: var(--text-dim);
  font-size: 13px;
  margin: 0 0 16px;
  line-height: 1.5;
}
.celebrate .btn { margin-right: 8px; }

/* ─── Right column: live preview card ─────────────────────── */
.preview-col {
  position: sticky;
  top: 88px;
}
@media (max-width: 980px) {
  .preview-col { position: relative; top: auto; margin-top: 24px; }
}
.preview-card {
  background:
    radial-gradient(360px 220px at 100% 0%, rgba(124, 92, 255, 0.16), transparent 70%),
    var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.preview-card::before {
  content: "PREVIEW EM TEMPO REAL";
  position: absolute;
  top: 12px; left: 16px;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--accent-2);
  font-weight: 700;
}
.preview-card::after {
  content: "";
  position: absolute;
  top: 14px; right: 14px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-2);
  box-shadow: 0 0 10px var(--accent-2);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 50% { opacity: 0.4; } }

.pv-avatar-wrap {
  position: relative;
  width: 110px; height: 110px;
  margin: 24px auto 14px;
}
.pv-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #7c5cff, #19d5c6, #c084fc, #7c5cff);
  animation: ringSpin 8s linear infinite;
  opacity: 0.7;
  transition: opacity 0.6s ease;
}
.pv-ring::after {
  content: "";
  position: absolute; inset: 4px;
  border-radius: 50%;
  background: var(--bg-card);
}
@keyframes ringSpin { to { transform: rotate(360deg); } }
.pv-core {
  position: absolute; inset: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a1a22, #0f0f14);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  overflow: hidden;
  transition: font-size 0.3s ease;
}
.pv-core.empty { font-size: 28px; color: var(--text-muted); }
.pv-core.empty::before { content: "?"; }
.pv-name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  min-height: 24px;
  transition: color 0.3s ease;
}
.pv-name.empty { color: var(--text-muted); font-style: italic; font-weight: 500; }
.pv-slug {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 14px;
  min-height: 14px;
}
.pv-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center;
  margin-bottom: 16px;
  min-height: 22px;
}
.pv-tag {
  font-size: 11px;
  padding: 3px 10px;
  background: rgba(25, 213, 198, 0.10);
  border: 1px solid rgba(25, 213, 198, 0.30);
  color: var(--accent-2);
  border-radius: 999px;
  font-weight: 600;
}

.pv-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 18px;
  text-align: left;
}
.pv-stat {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  font-size: 12px;
}
.pv-stat .lab {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-weight: 700;
  margin-bottom: 2px;
}
.pv-stat .val {
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
}

.pv-powers {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}
.pv-power-chip {
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(124, 92, 255, 0.10);
  border: 1px solid rgba(124, 92, 255, 0.25);
  color: var(--accent);
  border-radius: 999px;
  font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
}
.pv-empty-state {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}

/* progress dots */
.progress-dots {
  display: flex; gap: 6px;
  justify-content: center;
  margin-top: 18px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.25s, transform 0.25s;
}
.dot.done { background: var(--accent-2); }
.dot.active { background: var(--accent); transform: scale(1.4); }

/* ─── Helpers ─────────────────────────────────────────────── */
.hint { font-size: 12px; color: var(--text-muted); margin-left: 42px; max-width: 560px; }
@media (max-width: 540px) { .hint { margin-left: 0; } }
.skip-link {
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: underline;
  text-decoration-color: var(--border);
  cursor: pointer;
}
.skip-link:hover { color: var(--text-dim); }
</style>
</head>
<body>

<div class="aurora"></div>

<header class="nav">
  <div class="container nav-inner">
    <a href="/" class="brand"><span class="logo-dot"></span> axon</a>
    <nav class="nav-links">
      <a href="/explore">Agentes</a>
      <a href="/build">Forjar</a>
      <a href="/dashboard">Painel</a>
      <a href="/upgrade">Planos</a>
      <a href="/learn">Learn</a>
    </nav>
  </div>
</header>

<div class="forge-page">

  <!-- ═══════════ CHAT (esquerda) ═══════════ -->
  <div class="chat" id="chat">

    <!-- Step 1 — boas-vindas + escolha de avatar -->
    <div class="step show" data-step="1">
      <div class="bubble-row">
        <div class="bubble-avatar">⚡</div>
        <div class="bubble assistant">
          <strong>Vamos forjar seu agente.</strong><br>
          <small>Começa pela cara — a primeira coisa que seus clientes vão ver.</small>
        </div>
      </div>

      <div class="picker">
        <div class="picker-grid" id="avatar-grid">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>

    <!-- Steps subsequentes são clonados via JS -->
  </div>

  <!-- ═══════════ PREVIEW (direita) ═══════════ -->
  <div class="preview-col">
    <div class="preview-card">
      <div class="pv-avatar-wrap">
        <div class="pv-ring"></div>
        <div class="pv-core empty" id="pv-core"></div>
      </div>
      <div class="pv-name empty" id="pv-name">seu agente, ainda sem nome</div>
      <div class="pv-slug" id="pv-slug">/agent/...</div>
      <div class="pv-tags" id="pv-tags"></div>

      <div class="pv-stats">
        <div class="pv-stat">
          <div class="lab">Nível</div>
          <div class="val">1</div>
        </div>
        <div class="pv-stat">
          <div class="lab">Custo/conversa</div>
          <div class="val" id="pv-cost">~R$ 0,02</div>
        </div>
      </div>

      <div class="pv-powers" id="pv-powers">
        <span class="pv-empty-state">poderes vão aparecer aqui</span>
      </div>

      <div class="progress-dots" id="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  // ─── State ────────────────────────────────────────────────
  const state = {

  const POWERS_BY_BUSINESS = {

    restaurante: ['lookup_cep','route_distance','generate_pix','world_holidays','wttr_weather'],
    loja:        ['lookup_cep','lookup_cnpj','generate_pix','mercadolivre_search','generate_image'],
    imobiliaria: ['lookup_cep','geocode_address','route_distance','ibge_city','generate_pix'],
    auto:        ['lookup_fipe','fipe_brands','lookup_bank','bcb_indicator','generate_pix'],
    clinica:     ['lookup_cep','time_zone','world_holidays','generate_pix','translate_text'],
    consultor:   ['lookup_cnpj','search_web','wikipedia_summary','github_repo','translate_text'],

  const POWERS_META = {
    lookup_cep:        { emoji: '📍', name: 'Cartógrafo de CEP',      desc: 'Calcula entrega por endereço',     rare: 'common' },

    wttr_weather:      { emoji: '🌧️', name: 'Bússola Meteorológica',  desc: 'Previsão rápida via wttr',         rare: 'common' },
    geocode_address:   { emoji: '🗺️', name: 'Cartógrafo Global',      desc: 'Endereço → coordenadas',           rare: 'uncommon' },
    route_distance:    { emoji: '🛣️', name: 'Calculista de Rotas',    desc: 'Distância e tempo entre 2 pontos', rare: 'uncommon' },
    ibge_city:         { emoji: '🏛️', name: 'Arquivos IBGE',          desc: 'Demografia de município',          rare: 'common' },
    bcb_indicator:     { emoji: '📊', name: 'Voz do Bacen',           desc: 'Selic, IPCA, dólar histórico',     rare: 'rare' },
    world_holidays:    { emoji: '🎉', name: 'Calendário Mundial',     desc: 'Feriados de qualquer país',        rare: 'common' },
    time_zone:         { emoji: '🕐', name: 'Mestre dos Fusos',       desc: 'Hora em qualquer cidade',          rare: 'common' },
    search_web:        { emoji: '🔎', name: 'Caçador da Web',         desc: 'Pesquisa em tempo real',           rare: 'uncommon' },
    wikipedia_summary: { emoji: '📚', name: 'Erudito Wikipedia',      desc: 'Resumo de qualquer tópico',        rare: 'common' },
    github_repo:       { emoji: '💻', name: 'Bibliotecário do Código',desc: 'Info de repositório GitHub',       rare: 'rare' },
    mercadolivre_search:{emoji: '🛒', name: 'Caçador de Preço ML',    desc: 'Compara preço no Mercado Livre',   rare: 'rare' },
    translate_text:    { emoji: '🌐', name: 'Tradutor Universal',     desc: 'Vai e vem entre idiomas',          rare: 'uncommon' },
    generate_image:    { emoji: '🎨', name: 'Pintor Visual',          desc: 'Gera imagens do que pedir',        rare: 'epic' },
    generate_pix:      { emoji: '💸', name: 'Pix Instantâneo',        desc: 'Cobra cliente direto no chat',     rare: 'legendary' },
  };

  // ─── DOM helpers ──────────────────────────────────────────
  const chat = document.getElementById('chat');

  function bubble(content, who = 'assistant') {
    const row = document.createElement('div');
    row.className = 'bubble-row' + (who === 'user' ? ' user' : '');
    row.innerHTML = `
      <div class="bubble-avatar">${who === 'user' ? '🧑' : '⚡'}</div>
      <div class="bubble ${who === 'user' ? 'user-msg' : 'assistant'}">${content}</div>
    `;
    return row;
  }

  function typing() {
    const row = document.createElement('div');
    row.className = 'bubble-row';
    row.innerHTML = `
      <div class="bubble-avatar">⚡</div>
      <div class="bubble assistant typing"><span></span><span></span><span></span></div>
    `;
    return row;
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  // Show next step with typing animation, then content
  async function nextStep(num, builder) {
    await sleep(200);
    const t = typing();
    chat.appendChild(t);
    scrollToBottom();
    await sleep(900);
    t.remove();

    const wrap = document.createElement('div');
    wrap.className = 'step';
    wrap.dataset.step = num;
    builder(wrap);
    chat.appendChild(wrap);
    requestAnimationFrame(() => wrap.classList.add('show'));
    scrollToBottom();
    setProgress(num);
  }

  function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

  function setProgress(stepNum) {
    const dots = document.querySelectorAll('#progress-dots .dot');
    dots.forEach((d, i) => {
      d.classList.toggle('done', i < stepNum - 1);
      d.classList.toggle('active', i === stepNum - 1);
    });
  }

  // ─── Preview update ───────────────────────────────────────
  function updatePreview() {
    const core = document.getElementById('pv-core');
    if (state.avatar) {
      core.classList.remove('empty');
      core.textContent = state.avatar;
    }

    const nm = document.getElementById('pv-name');
    if (state.name) {
      nm.classList.remove('empty');
      nm.textContent = state.name;
    }

    const slugEl = document.getElementById('pv-slug');
    if (state.name) {
      const slug = state.name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      state.slug = slug;
      slugEl.textContent = '/agent/' + slug;
    }

    const tagsEl = document.getElementById('pv-tags');
    tagsEl.innerHTML = '';
    if (state.business) {
      const b = BUSINESSES.find((x) => x.id === state.business);
      if (b) {
        const t = document.createElement('span');
        t.className = 'pv-tag';
        t.textContent = b.emoji + ' ' + b.title;
        tagsEl.appendChild(t);
      }
    }
    if (state.persona) {
      const p = PERSONAS.find((x) => x.id === state.persona);
      if (p) {
        const t = document.createElement('span');
        t.className = 'pv-tag';
        t.textContent = p.emoji + ' ' + p.title;
        tagsEl.appendChild(t);
      }
    }

    const powEl = document.getElementById('pv-powers');
    powEl.innerHTML = '';
    if (state.powers.size === 0) {
      powEl.innerHTML = '<span class="pv-empty-state">poderes vão aparecer aqui</span>';
    } else {
      state.powers.forEach((id) => {
        const m = POWERS_META[id];
        if (m) {
          const c = document.createElement('span');
          c.className = 'pv-power-chip';
          c.innerHTML = `<span>${m.emoji}</span> ${m.name}`;
          powEl.appendChild(c);
        }
      });
    }

    // Cost calc — rough: each power adds R$ 0.005
    const baseCost = 2; // R$ 0.02 base
    const extra = state.powers.size * 0.5;
    const total = (baseCost + extra) / 100;
    document.getElementById('pv-cost').textContent = '~R$ ' + total.toFixed(2).replace('.', ',');
  }

  // ─── Build steps ──────────────────────────────────────────

  // Step 1: Avatar grid (already in HTML, just fill it)
  function renderAvatarGrid() {
    const grid = document.getElementById('avatar-grid');
    AVATARS.forEach((emoji) => {
      const tile = document.createElement('div');
      tile.className = 'picker-tile';
      tile.textContent = emoji;
      tile.addEventListener('click', () => onAvatarPick(tile, emoji));
      grid.appendChild(tile);
    });
    const upload = document.createElement('div');
    upload.className = 'picker-tile upload';
    upload.innerHTML = 'subir<br>foto';
    upload.addEventListener('click', () => alert('Upload de foto vem na próxima versão.'));
    grid.appendChild(upload);
  }

  function onAvatarPick(tile, emoji) {
    document.querySelectorAll('#avatar-grid .picker-tile').forEach((t) => t.classList.remove('selected'));
    tile.classList.add('selected');
    state.avatar = emoji;
    updatePreview();

    chat.appendChild(bubble(`Escolhi <strong>${emoji}</strong>`, 'user'));
    scrollToBottom();
    nextStep(2, buildNameStep);
  }

  // Step 2: Nome
  function buildNameStep(wrap) {
    wrap.appendChild(bubble(`Curti! Agora <strong>como vou chamar ele</strong>? Pode ser qualquer coisa — Camila, Robô do João, Pet Carinhoso...`, 'assistant'));
    const row = document.createElement('div');
    row.className = 'input-row';
    row.innerHTML = `
      <input type="text" id="name-input" placeholder="Digite o nome do agente" maxlength="40" />
      <button class="btn btn-primary" id="name-confirm">Continuar →</button>
    `;
    wrap.appendChild(row);
    setTimeout(() => document.getElementById('name-input').focus(), 100);

    document.getElementById('name-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('name-confirm').click();
    });
    document.getElementById('name-confirm').addEventListener('click', () => {
      const v = document.getElementById('name-input').value.trim();
      if (!v) return;
      state.name = v;
      updatePreview();
      chat.appendChild(bubble(v, 'user'));
      scrollToBottom();
      nextStep(3, buildBusinessStep);
    });
  }

  // Step 3: Tipo de negócio
  function buildBusinessStep(wrap) {
    wrap.appendChild(bubble(`Massa, <strong>${state.name}</strong>. <strong>Sobre que negócio</strong> ele vai conversar?`, 'assistant'));
    const grid = document.createElement('div');
    grid.className = 'picker picker-cards';
    BUSINESSES.forEach((b) => {
      const c = document.createElement('div');
      c.className = 'picker-card';
      c.innerHTML = `
        <div class="ttl">${b.emoji} ${b.title}</div>
        <div class="sub">${b.sub}</div>
      `;
      c.addEventListener('click', () => {
        document.querySelectorAll('.picker-card').forEach((x) => x.classList.remove('selected'));
        c.classList.add('selected');
        state.business = b.id;
        updatePreview();
        chat.appendChild(bubble(`${b.emoji} ${b.title}`, 'user'));
        scrollToBottom();
        nextStep(4, buildPersonaStep);
      });
      grid.appendChild(c);
    });
    wrap.appendChild(grid);
  }

  // Step 4: Persona
  function buildPersonaStep(wrap) {
    wrap.appendChild(bubble(`<strong>Como ele fala</strong>? Cada estilo atende um tipo de cliente diferente.`, 'assistant'));
    const grid = document.createElement('div');
    grid.className = 'picker picker-cards';
    PERSONAS.forEach((p) => {
      const c = document.createElement('div');
      c.className = 'picker-card';
      c.innerHTML = `
        <div class="ttl">${p.emoji} ${p.title}</div>
        <div class="sub">${p.sub}</div>
      `;
      c.addEventListener('click', () => {
        document.querySelectorAll('.picker-card').forEach((x) => x.classList.remove('selected'));
        c.classList.add('selected');
        state.persona = p.id;
        updatePreview();
        chat.appendChild(bubble(`${p.emoji} ${p.title}`, 'user'));
        scrollToBottom();
        nextStep(5, buildPowersStep);
      });
      grid.appendChild(c);
    });
    wrap.appendChild(grid);
  }

  // Step 5: Super poderes
  function buildPowersStep(wrap) {
    const suggested = POWERS_BY_BUSINESS[state.business] || [];
    suggested.forEach((id) => state.powers.add(id));

    wrap.appendChild(bubble(
      `Já equipei <strong>${suggested.length} super-poderes</strong> que combinam com o negócio. Tira ou adiciona à vontade — depois você pode equipar mais na forja.`,
      'assistant'
    ));

    const grid = document.createElement('div');
    grid.className = 'picker picker-checks';
    Object.entries(POWERS_META).forEach(([id, m]) => {
      const c = document.createElement('div');
      c.className = 'picker-check';
      if (state.powers.has(id)) c.classList.add('checked');
      c.style.setProperty('--rarity-color', `var(--rare-${m.rare})`);
      c.innerHTML = `
        <div class="icon">${m.emoji}</div>
        <div class="body">
          <div class="nm">${m.name}</div>
          <div class="ds">${m.desc}</div>
        </div>
        <div class="rar">${m.rare}</div>
      `;
      c.addEventListener('click', () => {
        if (state.powers.has(id)) {
          state.powers.delete(id);
          c.classList.remove('checked');
        } else {
          state.powers.add(id);
          c.classList.add('checked');
        }
        updatePreview();
      });
      grid.appendChild(c);
    });
    wrap.appendChild(grid);

    const action = document.createElement('div');
    action.className = 'action-row';
    action.innerHTML = `
      <button class="btn btn-primary" id="powers-confirm">Forjar agente →</button>
      <a class="skip-link" id="powers-skip">já está bom assim</a>
    `;
    wrap.appendChild(action);

    updatePreview();

    document.getElementById('powers-confirm').addEventListener('click', () => {
      chat.appendChild(bubble(`${state.powers.size} super-poderes equipados`, 'user'));
      scrollToBottom();
      nextStep(6, buildFinalStep);
    });
    document.getElementById('powers-skip').addEventListener('click', () => {
      document.getElementById('powers-confirm').click();
    });
  }

  // Step 6: Final
  function buildFinalStep(wrap) {
    const slug = state.slug || 'novo-agente';
    wrap.innerHTML = `
      <div class="bubble-row">
        <div class="bubble-avatar">⚡</div>
        <div class="bubble assistant">
          🎉 <strong>${state.name}</strong> está pronto. Mintando o NFT na rede Base agora...
        </div>
      </div>

      <div class="celebrate">
        <h3>Bem-vindo ao mundo, ${state.name}!</h3>
        <p>
          Seu agente já é seu — token #${1248 + Math.floor(Math.random() * 50)} na Base.
          Cada conversa que ele atender adiciona XP, sobe nível, valoriza o ativo.<br><br>
          <strong>Próximo passo:</strong> conectar ao WhatsApp ou compartilhar o link do chat público.
        </p>
        <a href="/agent-card.html" class="btn btn-primary">Ver perfil do agente →</a>
        <a href="#" class="btn btn-ghost">📱 Conectar WhatsApp</a>
      </div>
    `;
    setProgress(6);
  }

  // ─── Boot ─────────────────────────────────────────────────
  renderAvatarGrid();
})();
</script>
