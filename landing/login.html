<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar — Nexus Inovation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #0a0a0b; --bg-card: #16161a; --bg-elev: #111114;
        --border: #25252b; --text: #eeeef0; --text-dim: #9a9aa4; --text-muted: #6a6a76;
        --accent: #7c5cff; --accent-2: #19d5c6; --danger: #ff5f57; --warn: #ffd60a;
        --whatsapp: #25d366; --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg); color: var(--text);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px;
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 32px; font-weight: 800; font-size: 22px;
      }
      .logo-dot {
        width: 12px; height: 12px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 36px 32px;
        max-width: 440px; width: 100%;
        box-shadow: 0 4px 32px rgba(0,0,0,0.3);
      }
      h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
      .subtitle { color: var(--text-dim); font-size: 14px; margin: 0 0 24px; }

      .field { margin-bottom: 14px; }
      .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
      .field input {
        width: 100%;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 12px 14px; font-size: 14px; font-family: inherit;
        transition: border-color 0.15s;
      }
      .field input:focus { outline: none; border-color: var(--accent); }

      .btn {
        width: 100%;
        background: var(--accent); color: white;
        border: none; border-radius: 8px;
        padding: 12px 16px; font-size: 14px; font-weight: 600;
        cursor: pointer; font-family: inherit;
        transition: opacity 0.15s;
        margin-bottom: 10px;
      }
      .btn:hover:not(:disabled) { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-secondary {
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-elev); }

      .divider {
        display: flex; align-items: center; gap: 12px;
        color: var(--text-muted); font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.1em;
        margin: 16px 0;
      }
      .divider::before, .divider::after {
        content: ''; flex: 1; height: 1px; background: var(--border);
      }

      .meta {
        margin-top: 18px; font-size: 13px; color: var(--text-dim);
        text-align: center;
      }
      .meta a { color: var(--accent-2); text-decoration: none; }
      .meta a:hover { color: var(--text); }

      .alert {
        padding: 10px 12px; border-radius: 8px;
        font-size: 13px; margin-bottom: 14px;
      }
      .alert.error { background: rgba(255, 95, 87, 0.1); border: 1px solid rgba(255, 95, 87, 0.4); color: var(--danger); }
      .alert.success { background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.4); color: var(--whatsapp); }
      .alert.info { background: rgba(124, 92, 255, 0.1); border: 1px solid rgba(124, 92, 255, 0.4); color: var(--accent); }

      .config-warning {
        max-width: 440px; width: 100%; padding: 14px;
        background: rgba(255, 214, 10, 0.1);
        border: 1px solid rgba(255, 214, 10, 0.4);
        color: var(--warn); border-radius: 8px;
        font-size: 13px; margin-bottom: 18px;
      }
    </style>
  </head>
  <body>
    <div class="brand"><span class="logo-dot"></span><span>Nexus Inovation</span></div>

    <div id="config-warn" class="config-warning" hidden>
      Login por Supabase ainda não configurado pelo operador. Use o método antigo de API key (paste).
      <a href="/dashboard" style="color:inherit;text-decoration:underline;">→ login com API key</a>
    </div>

    <div class="card" id="login-card">
      <h1>Entrar</h1>
      <p class="subtitle">Acesse seu painel Nexus Inovation com email e senha.</p>

      <div id="alert" class="alert" hidden></div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="email" required placeholder="voce@exemplo.com" />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" autocomplete="current-password" required minlength="6" />
        </div>
        <button class="btn" type="submit" id="submit-btn">Entrar</button>
      </form>

      <div class="divider">ou</div>
      <button class="btn btn-secondary" id="magic-btn">Receber link mágico por e-mail</button>

      <div class="meta">
        Ainda não tem conta? <a href="/signup">Cadastre-se</a><br>
        <a href="#" id="reset-link" style="font-size:12px;">Esqueci minha senha</a>
      </div>
    </div>

    <script>
      const API_BASE = 'https://axon-kedb.onrender.com';
      const STORAGE_KEY = 'axon.apiKey';      // matches dashboard.html / build.html
      const STORAGE_KEY_LEGACY = 'axon_api_key'; // matches whatsapp.html / contacts.html

      let supabase = null;
      let supabaseReady = false;

      // Disable any button that requires Supabase until init finishes,
      // so the user doesn't click and silently get no feedback.
      function setReady(ready) {
        supabaseReady = ready;
        ['submit-btn', 'magic-btn'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) {
            el.disabled = !ready;
            if (!ready) el.style.opacity = '0.5';
            else el.style.opacity = '';
          }
        });
      }

      function showAlert(kind, msg) {
        const el = document.getElementById('alert');
        el.className = `alert ${kind}`;
        el.textContent = msg;
        el.hidden = false;
      }
      function clearAlert() { document.getElementById('alert').hidden = true; }

      async function bootstrap() {
        setReady(false);
        // Wait for the Supabase CDN script to load. In rare network conditions
        // (slow CDN, mid-load click) window.supabase is undefined when our
        // bootstrap fires — without this guard, click handlers would silently
        // do nothing.
        let waited = 0;
        while (!window.supabase && waited < 5000) {
          await new Promise((r) => setTimeout(r, 100));
          waited += 100;
        }
        if (!window.supabase) {
          showAlert('error', 'Não consegui carregar o cliente Supabase do CDN. Tente recarregar a página.');
          return;
        }

        // 1. Fetch Supabase config from backend
        try {
          const r = await fetch(API_BASE + '/v1/auth/supabase/config');
          const cfg = await r.json();
          if (!cfg.configured) {
            document.getElementById('config-warn').hidden = false;
            return;
          }
          supabase = window.supabase.createClient(cfg.project_url, cfg.anon_key);
          setReady(true);
        } catch (e) {
          showAlert('error', 'Não consegui carregar config de auth: ' + e.message);
          return;
        }

        // 2. If we already have a Supabase session, exchange for API key & redirect
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.access_token) {
          await exchangeAndRedirect(session.access_token);
        }
      }

      async function exchangeAndRedirect(accessToken) {
        showAlert('info', 'Verificando seu acesso…');
        try {
          const r = await fetch(API_BASE + '/v1/auth/supabase/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: accessToken }),
          });
          const data = await r.json();
          if (!r.ok || !data.ok) {
            throw new Error(data.message || data.error || `HTTP ${r.status}`);
          }
          // Persist for both legacy keys (different pages use different names).
          localStorage.setItem(STORAGE_KEY, data.api_key);
          localStorage.setItem(STORAGE_KEY_LEGACY, data.api_key);
          showAlert('success', data.created ? 'Conta criada — abrindo painel…' : 'Login OK — abrindo painel…');
          // Honor ?return=<path> so the user lands back where they tried to go.
          const params = new URLSearchParams(location.search);
          const back = params.get('return');
          const safeBack = back && back.startsWith('/') && !back.startsWith('//') ? back : '/dashboard';
          setTimeout(() => { location.href = safeBack; }, 600);
        } catch (e) {
          showAlert('error', 'Falha no exchange: ' + e.message);
        }
      }

      document.getElementById('login-form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        clearAlert();
        if (!supabase) return;
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.textContent = 'Entrando…';
        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          await exchangeAndRedirect(data.session.access_token);
        } catch (e) {
          showAlert('error', e.message || String(e));
          btn.disabled = false; btn.textContent = 'Entrar';
        }
      });

      document.getElementById('magic-btn').addEventListener('click', async () => {
        clearAlert();
        if (!supabaseReady || !supabase) {
          showAlert('error', 'Auth ainda carregando — aguarde 1 segundo e tente de novo.');
          return;
        }
        const email = document.getElementById('email').value.trim().toLowerCase();
        if (!email) { showAlert('error', 'Digite seu e-mail acima.'); return; }
        const btn = document.getElementById('magic-btn');
        const orig = btn.textContent;
        btn.disabled = true; btn.textContent = 'Enviando…';
        try {
          const { error } = await supabase.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: location.origin + '/login' },
          });
          if (error) throw error;
          showAlert('success', `Link mágico enviado pra ${email}. Cheque sua caixa de entrada (e a pasta de spam).`);
        } catch (e) {
          showAlert('error', 'Falha: ' + (e.message || String(e)) + '. Verifique se o domínio está nos Redirect URLs do Supabase.');
        } finally {
          btn.disabled = false;
          btn.textContent = orig;
        }
      });

      document.getElementById('reset-link').addEventListener('click', async (ev) => {
        ev.preventDefault();
        clearAlert();
        if (!supabase) return;
        const email = document.getElementById('email').value.trim().toLowerCase();
        if (!email) { showAlert('error', 'Digite seu e-mail acima primeiro.'); return; }
        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: location.origin + '/login',
          });
          if (error) throw error;
          showAlert('success', `E-mail de reset enviado pra ${email}.`);
        } catch (e) {
          showAlert('error', e.message || String(e));
        }
      });

      bootstrap();
    </script>
  </body>
</html>
