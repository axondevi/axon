<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexus Inovation Status · axon.dev</title>
    <meta name="description" content="Live status of Nexus Inovation gateway. Health, uptime, and API response times in real time." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nexus Inovation · Status" />
    <meta property="og:description" content="Live gateway health and API uptime." />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .status-wrap { padding: 80px 0; }
      .status-wrap h1 { font-size: clamp(32px, 5vw, 48px); letter-spacing: -0.03em; font-weight: 800; margin: 0 0 12px; }
      .status-wrap .intro { color: var(--text-dim); font-size: 17px; margin-bottom: 40px; }

      .overall {
        display: flex; gap: 16px; align-items: center;
        padding: 24px 28px;
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 14px; margin-bottom: 32px;
      }
      .pulse {
        width: 16px; height: 16px; border-radius: 50%;
        background: #4ade80; box-shadow: 0 0 12px #4ade80;
        animation: pulse 2s ease-in-out infinite;
      }
      .pulse.bad { background: #ff5f57; box-shadow: 0 0 12px #ff5f57; }
      .pulse.unk { background: #9a9aa4; box-shadow: none; animation: none; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .overall h2 { margin: 0; font-size: 22px; font-weight: 700; }
      .overall p { margin: 2px 0 0; color: var(--text-muted); font-size: 14px; }

      .check-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px; margin-bottom: 40px;
      }
      .check {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 10px; padding: 18px 20px;
        display: flex; justify-content: space-between; align-items: center;
      }
      .check .label { font-size: 14px; font-weight: 500; }
      .check .value {
        font-family: 'JetBrains Mono', monospace; font-size: 13px;
        color: var(--text-dim);
      }
      .check.up    { border-color: rgba(74,222,128,0.3); }
      .check.down  { border-color: rgba(255,95,87,0.3); }
      .check .value.up    { color: #4ade80; }
      .check .value.down  { color: #ff5f57; }

      .foot-note { color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 24px; }
    </style>
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a href="/" class="brand"><span class="logo-dot"></span> Nexus Inovation</a>
        <nav class="nav-links">
          <a href="/#apis">APIs</a>
          <a href="/#pricing" data-pt="Preço" data-en="Pricing">Preço</a>
          <a href="/stats" data-pt="Estatísticas" data-en="Stats">Estatísticas</a>
          <a href="/status" style="color: var(--text)" data-pt="Status" data-en="Status">Status</a>
          <button id="lang-toggle" class="lang-toggle" type="button" aria-label="Trocar idioma" style="margin-left:8px;">
            <span data-active="pt">🇧🇷 PT</span>
            <span data-active="en">🇺🇸 EN</span>
          </button>
        </nav>
      </div>
    </header>

    <main>
      <section class="status-wrap">
        <div class="container">
          <h1 data-pt="Status do sistema" data-en="System status">Status do sistema</h1>
          <p class="intro" data-pt="Saúde em tempo real de cada parte do gateway. Atualiza a cada 30 segundos." data-en="Real-time health of every piece of the gateway. Refreshes every 30 seconds.">Saúde em tempo real de cada parte do gateway. Atualiza a cada 30 segundos.</p>

          <div class="overall" id="overall">
            <span class="pulse unk" id="pulse"></span>
            <div>
              <h2 id="overall-status">Checking…</h2>
              <p id="overall-sub">Fetching health endpoints</p>
            </div>
          </div>

          <div class="check-grid" id="checks"></div>

          <p class="foot-note" id="foot">Last checked: never</p>
        </div>
      </section>
    </main>

    <script>
      const BASE = window.location.host.startsWith('axon.')
        ? `https://api.${window.location.host.replace(/^axon\./, '')}`
        : (window.location.host.includes('pages.dev')
            ? 'https://api.nexusinovation.com.br'
            : `${window.location.protocol}//${window.location.host}`);

      const checks = [
        { name: 'Gateway',       url: `${BASE}/health`,            kind: 'json', want: 'status=ok' },
        { name: 'Database',      url: `${BASE}/health/ready`,      kind: 'json', want: 'status=ready' },
        { name: 'Redis cache',   url: `${BASE}/health/ready`,      kind: 'json', want: 'status=ready' },
        { name: 'Public stats',  url: `${BASE}/v1/stats/public`,   kind: 'any' },
        { name: 'Catalog',       url: `${BASE}/v1/apis`,           kind: 'any' },
      ];

      async function check(c) {
        const ctrl = new AbortController();
        const timeout = setTimeout(() => ctrl.abort(), 8000);
        try {
          const t0 = performance.now();
          const res = await fetch(c.url, { cache: 'no-store', signal: ctrl.signal });
          clearTimeout(timeout);
          const t = Math.round(performance.now() - t0);
          if (!res.ok) return { ok: false, value: `HTTP ${res.status}` };
          if (c.kind === 'json') {
            const body = await res.json();
            if (c.want) {
              const [k, v] = c.want.split('=');
              if (body[k] !== v) return { ok: false, value: `unexpected ${k}=${body[k]}` };
            }
          }
          return { ok: true, value: `${t}ms` };
        } catch (err) {
          clearTimeout(timeout);
          if (err.name === 'AbortError') return { ok: false, value: 'timeout (>8s)' };
          return { ok: false, value: err.message || 'fetch failed' };
        }
      }

      function renderInitialSkeleton() {
        const grid = document.getElementById('checks');
        grid.innerHTML = checks.map(c => `
          <div class="check" data-name="${c.name}">
            <span class="label">${c.name}</span>
            <span class="value" style="color:var(--text-muted);">checking…</span>
          </div>
        `).join('');
      }

      async function render() {
        // Em paralelo (mais rápido que sequencial), atualiza individualmente conforme cada check responde
        const grid = document.getElementById('checks');
        renderInitialSkeleton();
        let allUp = true;
        await Promise.all(checks.map(async (c) => {
          const r = await check(c);
          if (!r.ok) allUp = false;
          const node = grid.querySelector(`[data-name="${c.name}"]`);
          if (node) {
            node.className = `check ${r.ok ? 'up' : 'down'}`;
            node.innerHTML = `
              <span class="label">${c.name}</span>
              <span class="value ${r.ok ? 'up' : 'down'}">${r.ok ? '✓ ' : '✗ '}${r.value}</span>
            `;
          }
        }));

        const pulse = document.getElementById('pulse');
        pulse.classList.remove('unk', 'bad');
        if (!allUp) pulse.classList.add('bad');
        document.getElementById('overall-status').textContent =
          allUp ? 'All systems operational' : 'Some services are degraded';
        document.getElementById('overall-sub').textContent =
          allUp ? 'Everything is responding as expected.' : 'One or more checks failed. The team is investigating.';
        document.getElementById('foot').textContent =
          'Last checked: ' + new Date().toLocaleString();
      }

      render();
      setInterval(render, 30_000);
    </script>
    <link rel="stylesheet" href="/_i18n.css" />
    <script src="/_i18n.js" defer></script>
  </body>
</html>
