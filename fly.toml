app = "axon"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 15

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_FORMAT = "json"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    path = "/health/ready"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Scheduler process — second machine with different entry point.
# Deploy via: fly launch --from-repo --name axon-scheduler
# with `start_command = "bun run scheduler"`.
[processes]
  app = "bun run src/index.ts"
