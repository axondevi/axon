name: keepalive

# Render's free tier sleeps a service after ~15 minutes of inactivity.
# When that happens to the Evolution WhatsApp gateway, inbound webhooks
# from WhatsApp time out (cold start ~30-50s) and the message is lost
# from the customer's point of view — agent silently misses replies.
#
# This workflow pings both URLs every 10 minutes so neither service
# ever idles long enough to be put to sleep. Cost: ~150 GitHub Actions
# minutes/month, well under the 2000-minute free quota for private repos
# (and unlimited for public).

on:
  schedule:
    # Every 10 minutes. Cron uses UTC. The */10 pattern hits :00, :10,
    # :20, :30, :40, :50 of each hour.
    - cron: '*/10 * * * *'
  # Allow manual trigger from the Actions tab for ad-hoc warmup.
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      # Render free-tier cold-start can exceed 60s when the Docker image
      # is large. We retry up to 3× with 150s per attempt — first call
      # triggers wakeup, subsequent calls hit a warm instance.
      - name: Ping Axon Evolution gateway (dedicated)
        run: |
          for i in 1 2 3; do
            if curl -sSf --max-time 150 https://axon-evolution.onrender.com/ \
                 -o /dev/null -w "axon-evolution attempt $i: HTTP %{http_code} time=%{time_total}s\n"; then
              exit 0
            fi
            echo "attempt $i failed — sleeping 5s before retry"
            sleep 5
          done
          exit 1

      # Kept around for connections paired BEFORE the dedicated
      # axon-evolution server was set up — those instance_url values
      # in whatsapp_connections still point here. Once all customers
      # are migrated this step can drop.
      - name: Ping Feirinha Evolution gateway (legacy)
        run: |
          for i in 1 2 3; do
            if curl -sSf --max-time 150 https://evolution-api-feirinha.onrender.com/ \
                 -o /dev/null -w "evolution-feirinha attempt $i: HTTP %{http_code} time=%{time_total}s\n"; then
              exit 0
            fi
            echo "attempt $i failed — sleeping 5s before retry"
            sleep 5
          done
          exit 1

      - name: Ping Axon backend
        run: |
          for i in 1 2 3; do
            if curl -sSf --max-time 150 https://axon-kedb.onrender.com/health/ready \
                 -o /dev/null -w "axon attempt $i: HTTP %{http_code} time=%{time_total}s\n"; then
              exit 0
            fi
            echo "attempt $i failed — sleeping 5s before retry"
            sleep 5
          done
          exit 1
