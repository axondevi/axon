name: deploy-landing

# Automatically deploy the landing page to Cloudflare Pages on every push
# to main that touches the landing/ folder.
#
# Prereqs (repo secrets):
#   CF_API_TOKEN      — Cloudflare API token with Pages:Edit permission
#   CF_ACCOUNT_ID     — your Cloudflare account ID
# Project name defaults to 'axon' — adjust below if taken.

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'registry/**'
      - 'scripts/build-catalog.py'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Publish to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # wrangler-action@v3 auto-detects the package manager from lockfiles
      # in the repo. We ship bun.lock at the root, so the action tried to
      # `bun install -g wrangler` and crashed with "Unable to locate
      # executable file: bun". The GitHub runner image doesn't ship Bun by
      # default. Setup Node + pin the action to npm.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate static catalog from registry
        run: python scripts/build-catalog.py

      - name: Publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy landing --project-name=axon
          packageManager: npm
