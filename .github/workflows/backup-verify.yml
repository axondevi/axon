name: backup-verify

# Weekly run of scripts/backup-verify.ts against production. Goes red
# when row counts regress, RPO breaches, or schema drifts.

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC
  workflow_dispatch: {}

jobs:
  verify:
    name: Verify production backup state
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run backup-verify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run scripts/backup-verify.ts
