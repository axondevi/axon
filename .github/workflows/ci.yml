name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Build (smoke — fails on bundler errors)
        run: bun run build

  sdk-js:
    name: Build JS SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build

  registry-validate:
    name: Validate registry JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Each registry file parses and has required fields
        run: |
          set -e
          for f in registry/*.json; do
            echo "─ $f"
            jq -e '.slug and .provider and .category and .base_url and .auth.type and (.endpoints | length > 0)' "$f" > /dev/null
          done
          echo "✓ ${f} files validated"
